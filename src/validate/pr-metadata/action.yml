name: Validate PR Metadata
description: "Auto-assigns the PR author if no assignee is set (skips bot accounts)."

inputs:
  github-token:
    description: GitHub token with pull-requests write permission
    required: true
  dry-run:
    description: "When true, log what would happen without making changes"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Auto-assign PR author
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      env:
        DRY_RUN: ${{ inputs.dry-run }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const pr = context.payload.pull_request;
          const dryRun = process.env.DRY_RUN === 'true';

          if (pr.assignees?.length > 0) {
            console.log(`PR already has assignees: ${pr.assignees.map(a => a.login).join(', ')}`);
            return;
          }

          const author = pr.user.login;
          const authorType = pr.user.type;

          if (authorType === 'Bot' || author.endsWith('[bot]') || author === 'dependabot') {
            console.log(`Skipping auto-assign — author '${author}' is a bot`);
            return;
          }

          if (dryRun) {
            core.notice(`DRY RUN — would auto-assign '${author}' to the PR`);
            return;
          }

          console.log(`No assignees found. Auto-assigning author '${author}'`);
          await github.rest.issues.addAssignees({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            assignees: [author]
          });
          console.log(`✅ Assigned '${author}' to the PR`);
