name: Validate PR Description
description: "Validates that the PR template checkboxes are properly filled."

runs:
  using: composite
  steps:
    - name: Validate PR description
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      with:
        script: |
          const body = context.payload.pull_request.body || '';
          const errors = [];

          // --- Check that at least one "Type of Change" checkbox is checked ---
          const typeMatch = body.match(/## Type of Change\s*\n([\s\S]*?)(?=\n## |$)/);
          if (typeMatch) {
            const checked = typeMatch[1].match(/- \[x\]/gi);
            if (!checked) {
              errors.push('No "Type of Change" checkbox is checked. Please mark at least one.');
            }
          } else {
            errors.push('Missing "Type of Change" section. Please use the PR template.');
          }

          // --- Check that at least one "Testing" checkbox is checked ---
          const testMatch = body.match(/## Testing\s*\n([\s\S]*?)(?=\n## |\n\*\*Caller|$)/);
          if (testMatch) {
            const checked = testMatch[1].match(/- \[x\]/gi);
            if (!checked) {
              errors.push('No "Testing" checkbox is checked. Please mark at least one.');
            }
          }

          // --- Report ---
          if (errors.length > 0) {
            core.setFailed(errors.join('\n'));
          }
