name: Validate LerianStudio Library Versions
description: |
  Parses go.mod for github.com/LerianStudio/* direct dependencies, compares each
  against the latest stable release on GitHub, and fails when any are outdated or
  when no Lerian libs are detected (company-standards violation). Honors an
  optional .lerianstudiolibignore file (gitignore-style) for temporary pins or
  full skips. Posts a sticky PR comment with a status table.

inputs:
  github-token:
    description: GitHub token used to query LerianStudio repo releases and post the PR comment.
    required: true
  go-mod-path:
    description: Path to go.mod (relative to repo root).
    required: false
    default: "go.mod"
  ignore-file:
    description: Path to optional .lerianstudiolibignore file (relative to repo root). Missing file is a warning, not a failure.
    required: false
    default: ".lerianstudiolibignore"
  check-indirect:
    description: Also check transitive (// indirect) dependencies. Off by default.
    required: false
    default: "false"
  major-bump-grace-days:
    description: Grace window (in days) for major-version bumps. A major bump is tolerated while the latest release is younger than this many days; minor and patch bumps are always enforced immediately. Set to "0" to disable and enforce major bumps immediately.
    required: false
    default: "3"
  comment-on-pr:
    description: Post or update a sticky comment on the PR with the result table.
    required: false
    default: "true"
  comment-token:
    description: Token used to post the sticky PR comment. Must have pull-requests:write on the caller repo. Defaults to github-token when unset.
    required: false
    default: ""
  dry-run:
    description: Verbose log of all resolved versions; never fails the build.
    required: false
    default: "false"

outputs:
  has_outdated:
    description: "true if at least one direct Lerian lib is behind the latest stable release."
    value: ${{ steps.check.outputs.has_outdated }}
  outdated_count:
    description: Number of outdated direct Lerian libs.
    value: ${{ steps.check.outputs.outdated_count }}
  grace_count:
    description: Number of direct Lerian libs within the major-bump grace window (not counted as outdated).
    value: ${{ steps.check.outputs.grace_count }}
  has_lerian_libs:
    description: "true if at least one Lerian lib was detected in go.mod."
    value: ${{ steps.check.outputs.has_lerian_libs }}
  report_path:
    description: Filesystem path to the generated markdown report (for downstream use).
    value: ${{ steps.check.outputs.report_path }}

runs:
  using: composite
  steps:
    - name: Verify go.mod exists
      shell: bash
      env:
        GO_MOD_PATH: ${{ inputs.go-mod-path }}
      run: |
        if [[ ! -f "${GO_MOD_PATH}" ]]; then
          echo "::error title=go.mod not found::Expected go.mod at '${GO_MOD_PATH}'. This composite only supports Go projects."
          exit 1
        fi

    - name: Parse Lerian dependencies, resolve latest releases, compare
      id: check
      shell: bash
      env:
        GO_MOD_PATH: ${{ inputs.go-mod-path }}
        IGNORE_FILE: ${{ inputs.ignore-file }}
        CHECK_INDIRECT: ${{ inputs.check-indirect }}
        GRACE_DAYS: ${{ inputs.major-bump-grace-days }}
        DRY_RUN: ${{ inputs.dry-run }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        REPORT_PATH="${RUNNER_TEMP:-/tmp}/lerian-lib-report.md"
        : > "${REPORT_PATH}"

        log() { echo "$@"; }
        debug() { if [[ "${DRY_RUN}" == "true" ]]; then echo "::debug::$*"; fi; }

        # Empty / non-numeric grace value disables the major-bump grace window.
        if ! [[ "${GRACE_DAYS:-}" =~ ^[0-9]+$ ]]; then
          GRACE_DAYS=0
        fi

        # ---------- 1. Parse go.mod ----------
        # Collect lines like:
        #   github.com/LerianStudio/lib-commons/v5 v5.1.0
        #   github.com/LerianStudio/lib-commons/v2 v2.9.1 // indirect
        # awk strips the leading 'require (' block markers and trailing comments.
        log "Parsing ${GO_MOD_PATH} for LerianStudio dependencies..."
        DEPS_RAW=$(awk '
          /^require[[:space:]]*\(/ { in_block=1; next }
          in_block && /^\)/        { in_block=0; next }
          {
            line=$0
            # strip leading whitespace
            sub(/^[[:space:]]+/, "", line)
            # only consider lines that start with the module path
            if (line ~ /^github\.com\/LerianStudio\//) print line
          }
        ' "${GO_MOD_PATH}")

        if [[ -z "${DEPS_RAW}" ]]; then
          # No Lerian libs at all — company standards violation
          echo "has_lerian_libs=false" >> "${GITHUB_OUTPUT}"
          echo "has_outdated=false" >> "${GITHUB_OUTPUT}"
          echo "outdated_count=0" >> "${GITHUB_OUTPUT}"
          echo "grace_count=0" >> "${GITHUB_OUTPUT}"
          echo "report_path=${REPORT_PATH}" >> "${GITHUB_OUTPUT}"

          {
            echo "## 🔴 Lerian Library Version Check — action required"
            echo
            echo "**No \`github.com/LerianStudio/*\` dependencies found in \`${GO_MOD_PATH}\`.**"
            echo
            echo "Every Lerian Go service is expected to depend on at least one Lerian library (typically \`lib-commons\`). This is a company-standards requirement."
            echo
            echo "If this repository is genuinely exempt, please raise it with the platform team."
          } >> "${REPORT_PATH}"

          echo "::error title=No Lerian libraries found::No github.com/LerianStudio/* dependencies in ${GO_MOD_PATH}. Every Lerian Go service must use at least one Lerian library."
          # Terminate here either way — do NOT fall through to has_lerian_libs=true.
          # Dry run: surface the failure report in the step summary and exit 0.
          cat "${REPORT_PATH}" >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${DRY_RUN}" == "true" ]]; then
            log "DRY RUN: would fail (no Lerian libraries) — reporting and stopping."
            exit 0
          fi
          exit 1
        fi

        echo "has_lerian_libs=true" >> "${GITHUB_OUTPUT}"

        # ---------- 2. Load ignore file (optional) ----------
        # Format:
        #   # comment
        #   lib-name/vN                          -> skip entirely (permanent)
        #   lib-name/vN@vX.Y.Z                   -> pin: only fail if current < pinned target
        #   lib-name/vN|ttl:YYYY-MM-DD           -> skip until TTL date (expires on/after that date)
        #   lib-name/vN@vX.Y.Z|ttl:YYYY-MM-DD   -> pin until TTL date
        declare -A IGNORE_SKIP=()       # key: module path  -> "1"
        declare -A IGNORE_PIN=()        # key: module path  -> pinned version (vX.Y.Z)
        declare -A IGNORE_TTL=()        # key: module path  -> TTL date (YYYY-MM-DD)

        TODAY=$(date -u +%Y-%m-%d)

        if [[ -f "${IGNORE_FILE}" ]]; then
          log "Loading ignore rules from ${IGNORE_FILE}"
          while IFS= read -r raw || [[ -n "${raw}" ]]; do
            line="${raw%%#*}"
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [[ -z "${line}" ]] && continue

            # Extract optional TTL suffix: lib-name/vN[|ttl:YYYY-MM-DD]
            ttl=""
            if [[ "${line}" == *"|ttl:"* ]]; then
              ttl="${line##*|ttl:}"
              line="${line%%|ttl:*}"
            fi

            # Validate TTL date format and check expiry
            if [[ -n "${ttl}" ]]; then
              _ttl_ok=true
              if ! [[ "${ttl}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                _ttl_ok=false
              else
                # Portable full calendar check (no GNU date required).
                # Pre-expand with $(( 10#... )) to avoid SC2309 in [[ -lt/-gt ]].
                _ttl_yi=$(( 10#${ttl:0:4} ))
                _ttl_mi=$(( 10#${ttl:5:2} ))
                _ttl_di=$(( 10#${ttl:8:2} ))
                if [[ "${_ttl_mi}" -lt 1 || "${_ttl_mi}" -gt 12 ]]; then
                  _ttl_ok=false
                else
                  case "${_ttl_mi}" in
                    1|3|5|7|8|10|12) _ttl_max_day=31 ;;
                    4|6|9|11)        _ttl_max_day=30 ;;
                    2)
                      if (( (_ttl_yi % 400 == 0) || (_ttl_yi % 4 == 0 && _ttl_yi % 100 != 0) )); then
                        _ttl_max_day=29
                      else
                        _ttl_max_day=28
                      fi
                      ;;
                  esac
                  if [[ "${_ttl_di}" -lt 1 || "${_ttl_di}" -gt "${_ttl_max_day}" ]]; then
                    _ttl_ok=false
                  fi
                fi
              fi
              if [[ "${_ttl_ok}" != "true" ]]; then
                echo "::warning title=Invalid TTL format::Ignore rule for '${line}' has invalid TTL '${ttl}' (expected YYYY-MM-DD). Treating as expired."
                continue
              fi
              if ! [[ "${TODAY}" < "${ttl}" ]]; then
                echo "::warning title=Expired ignore rule::Ignore rule for '${line}' (ttl: ${ttl}) has expired as of ${TODAY}. Version check enforced."
                continue
              fi
            fi

            if [[ "${line}" == *"@"* ]]; then
              mod="${line%@*}"
              pin="${line##*@}"
              IGNORE_PIN["${mod}"]="${pin}"
              unset "IGNORE_TTL[${mod}]"
              [[ -n "${ttl}" ]] && IGNORE_TTL["${mod}"]="${ttl}"
              debug "ignore-pin: ${mod} -> ${pin}${ttl:+ (ttl: ${ttl})}"
            else
              IGNORE_SKIP["${line}"]="1"
              unset "IGNORE_TTL[${line}]"
              [[ -n "${ttl}" ]] && IGNORE_TTL["${line}"]="${ttl}"
              debug "ignore-skip: ${line}${ttl:+ (ttl: ${ttl})}"
            fi
          done < "${IGNORE_FILE}"
        else
          echo "::warning title=Ignore file not found::Optional ignore file '${IGNORE_FILE}' not found. Proceeding without ignore rules."
        fi

        # ---------- 3. Resolve latest stable release per repo ----------
        # resolve_latest runs inside command substitution (a subshell), so it cannot
        # export the resolved publish date via a shell variable. It writes the date of
        # the chosen release to this file instead; the caller reads it right after.
        LATEST_DATE_FILE="${RUNNER_TEMP:-/tmp}/lerian-latest-date.txt"

        resolve_latest() {
          local repo="$1"
          local major_filter="$2"   # e.g. "v5" or "" for v0/v1 modules
          : > "${LATEST_DATE_FILE}"

          # We page through up to 100 releases and pick the highest stable tag that
          # matches the requested major (when set). Pre-releases are excluded both by
          # the `prerelease == false` API flag and by a tag-name filter below, since
          # the flag is not reliable (a -beta/-rc release may be published with it unset).
          local http_code
          local releases_json
          http_code=$(curl -sS -o "${RUNNER_TEMP:-/tmp}/releases.json" -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/LerianStudio/${repo}/releases?per_page=100" 2>/dev/null || echo "000")

          if [[ "${http_code}" == "404" ]]; then
            http_code=$(curl -sS -o "${RUNNER_TEMP:-/tmp}/releases.json" -w '%{http_code}' \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/LerianStudio/${repo}/releases?per_page=100" 2>/dev/null || echo "000")
          fi

          releases_json=$(cat "${RUNNER_TEMP:-/tmp}/releases.json" 2>/dev/null || echo "[]")

          if [[ "${http_code}" == "404" ]]; then
            log "::warning title=Cannot read LerianStudio/${repo}::Repository is private and not accessible. Provide the LERIAN_LIB_READ_TOKEN secret."
            echo ""
            return 0
          fi

          if [[ "${http_code}" != "200" ]]; then
            log "::warning title=Cannot read LerianStudio/${repo}::Releases API returned HTTP ${http_code}. Check that LERIAN_LIB_READ_TOKEN has Contents:read and is approved by the org."
            echo ""
            return 0
          fi

          local tags
          tags=$(echo "${releases_json}" | jq -r '.[]? | select(.draft==false) | select(.prerelease==false) | .tag_name' 2>/dev/null || true)

          # Belt-and-suspenders: drop any pre-release tag name (e.g. v2.7.0-beta.8)
          # even when the GitHub release's `prerelease` flag was not set. Per semver,
          # a hyphen after the patch denotes a pre-release; keep stable vMAJOR.MINOR.PATCH only.
          tags=$(printf '%s\n' "${tags}" | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' || true)

          if [[ -z "${tags}" ]]; then
            echo ""
            return 0
          fi

          local filtered="${tags}"
          if [[ -n "${major_filter}" ]]; then
            filtered=$(echo "${tags}" | awk -v m="${major_filter}." '$0 ~ "^"m {print}')
            if [[ -z "${filtered}" ]]; then
              # fall back: some libs publish only un-prefixed (no /vN module)
              filtered="${tags}"
            fi
          fi

          local latest
          latest=$(echo "${filtered}" | sed 's/^v//' | sort -V | tail -n1)
          if [[ -n "${latest}" ]]; then
            latest="v${latest}"
          fi

          # Record the publish date (YYYY-MM-DD) of the chosen tag so the caller
          # can measure release age for the major-bump grace window.
          local latest_date
          latest_date=$(echo "${releases_json}" | jq -r --arg t "${latest}" '
            [ .[]? | select(.tag_name == $t or ("v" + .tag_name) == $t) | .published_at ] | .[0] // ""
          ' 2>/dev/null || echo "")
          printf '%s' "${latest_date%%T*}" > "${LATEST_DATE_FILE}"

          echo "${latest}"
        }

        # semver compare: returns 0 if $1 >= $2, 1 otherwise
        ver_ge() {
          local a="${1#v}" b="${2#v}"
          [[ "${a}" == "${b}" ]] && return 0
          local first
          first=$(printf '%s\n%s\n' "${a}" "${b}" | sort -V | head -n1)
          [[ "${first}" == "${b}" ]]
        }

        # ---------- 4. Iterate, compare, build report ----------
        OUTDATED=0
        CURRENT=0
        SKIPPED=0
        UNKNOWN=0
        GRACE=0

        # Use a temp file for the table rows so we control ordering and avoid heredoc quoting traps.
        ROWS_FILE="${RUNNER_TEMP:-/tmp}/lerian-rows.txt"
        : > "${ROWS_FILE}"

        IGNORE_DOCS_URL="https://github.com/LerianStudio/github-actions-shared-workflows/blob/main/docs/lerian-lib-version-check.md#lerianstudiolibignore-format"

        while IFS= read -r dep_line; do
          [[ -z "${dep_line}" ]] && continue
          # split: <module> <version> [// indirect]
          module=$(echo "${dep_line}" | awk '{print $1}')
          current=$(echo "${dep_line}" | awk '{print $2}')
          is_indirect="false"
          if echo "${dep_line}" | grep -q "// indirect"; then
            is_indirect="true"
          fi

          if [[ "${is_indirect}" == "true" && "${CHECK_INDIRECT}" != "true" ]]; then
            debug "skip indirect: ${module} ${current}"
            continue
          fi

          # short_path = lib-commons/v5    (strip github.com/LerianStudio/)
          short_path="${module#github.com/LerianStudio/}"

          # repo + major filter
          if [[ "${short_path}" =~ ^([^/]+)/(v[0-9]+)$ ]]; then
            repo="${BASH_REMATCH[1]}"
            major_filter="${BASH_REMATCH[2]}"
          else
            repo="${short_path%%/*}"
            major_filter=""
          fi

          # Ignore rules
          if [[ -n "${IGNORE_SKIP[${short_path}]:-}" ]]; then
            SKIPPED=$((SKIPPED+1))
            ttl_suffix=""
            [[ -n "${IGNORE_TTL[${short_path}]:-}" ]] && ttl_suffix=", expires ${IGNORE_TTL[${short_path}]}"
            printf '| `%s` | `%s` | _skipped_ | ⏭️ Skipped — ignore file%s · [why?](%s) |\n' "${short_path}" "${current}" "${ttl_suffix}" "${IGNORE_DOCS_URL}" >> "${ROWS_FILE}"
            continue
          fi

          # A pin takes precedence over the releases API: when a lib is pinned
          # via .lerianstudiolibignore, compare against the pin and skip the API
          # call entirely, so the pin is still honoured even if the API is
          # degraded (non-200). Only unpinned libs depend on resolve_latest.
          is_pinned="false"
          pin_note=""
          rel_date=""
          if [[ -n "${IGNORE_PIN[${short_path}]:-}" ]]; then
            target="${IGNORE_PIN[${short_path}]}"
            latest="${target}"
            is_pinned="true"
            [[ -n "${IGNORE_TTL[${short_path}]:-}" ]] && pin_note=" (expires ${IGNORE_TTL[${short_path}]})"
            pin_note="${pin_note} · [why?](${IGNORE_DOCS_URL})"
          else
            latest=$(resolve_latest "${repo}" "${major_filter}")
            rel_date=$(cat "${LATEST_DATE_FILE}" 2>/dev/null || true)

            if [[ -z "${latest}" ]]; then
              UNKNOWN=$((UNKNOWN+1))
              printf '| `%s` | `%s` | _unknown_ | ⚠️ Unknown — could not resolve latest release |\n' "${short_path}" "${current}" >> "${ROWS_FILE}"
              log "::warning title=Could not resolve latest release::Failed to fetch latest stable release for LerianStudio/${repo}"
              continue
            fi

            target="${latest}"
          fi

          if ver_ge "${current}" "${target}"; then
            CURRENT=$((CURRENT+1))
            if [[ "${is_pinned}" == "true" ]]; then
              printf '| `%s` | `%s` | `%s` | 📌 Pinned%s |\n' "${short_path}" "${current}" "${latest}" "${pin_note}" >> "${ROWS_FILE}"
            else
              printf '| `%s` | `%s` | `%s` | ✅ Current |\n' "${short_path}" "${current}" "${latest}" >> "${ROWS_FILE}"
            fi
            continue
          fi

          # Outdated. Major bumps (higher major on an unpinned, API-resolved lib)
          # are tolerated while the latest release is younger than GRACE_DAYS;
          # minor/patch bumps are always enforced immediately.
          cur_major="${current#v}"; cur_major="${cur_major%%.*}"
          tgt_major="${target#v}"; tgt_major="${tgt_major%%.*}"
          if [[ "${cur_major}" =~ ^[0-9]+$ && "${tgt_major}" =~ ^[0-9]+$ ]] \
             && (( tgt_major > cur_major )) \
             && [[ "${GRACE_DAYS}" -gt 0 && -n "${rel_date}" ]]; then
            pub_epoch=$(date -u -d "${rel_date}" +%s 2>/dev/null || echo "")
            today_epoch=$(date -u -d "${TODAY}" +%s 2>/dev/null || echo "")
            if [[ -n "${pub_epoch}" && -n "${today_epoch}" ]]; then
              age_days=$(( (today_epoch - pub_epoch) / 86400 ))
              if (( age_days < GRACE_DAYS )); then
                GRACE=$((GRACE+1))
                expires=$(date -u -d "${rel_date} +${GRACE_DAYS} days" +%Y-%m-%d 2>/dev/null || echo "${rel_date}")
                printf '| `%s` | `%s` | `%s` | 🕒 Grace (major bump, expires %s) |\n' "${short_path}" "${current}" "${latest}" "${expires}" >> "${ROWS_FILE}"
                debug "grace: ${short_path} ${current} -> ${latest} (released ${rel_date}, age ${age_days}d, expires ${expires})"
                continue
              fi
            fi
          fi

          OUTDATED=$((OUTDATED+1))
          if [[ "${is_pinned}" == "true" ]]; then
            printf '| `%s` | `%s` | `%s` | 🔴 Needs update — below pin%s |\n' "${short_path}" "${current}" "${latest}" "${pin_note}" >> "${ROWS_FILE}"
          else
            printf '| `%s` | `%s` | `%s` | 🔴 Needs update |\n' "${short_path}" "${current}" "${latest}" >> "${ROWS_FILE}"
          fi
        done <<< "${DEPS_RAW}"

        # ---------- 5. Build markdown report ----------
        # Header reflects the overall outcome at a glance.
        if [[ "${OUTDATED}" -gt 0 ]]; then
          HEADER="## 🔴 Lerian Library Version Check — action required"
        elif [[ "${GRACE}" -gt 0 || "${SKIPPED}" -gt 0 || "${UNKNOWN}" -gt 0 ]]; then
          HEADER="## ⚠️ Lerian Library Version Check — review needed"
        else
          HEADER="## ✅ Lerian Library Version Check — all up to date"
        fi

        {
          echo "${HEADER}"
          echo
          echo "| Library | Current | Latest | Status |"
          echo "|---------|---------|--------|--------|"
          cat "${ROWS_FILE}"
          echo
          echo "✅ ${CURRENT} current · 🔴 ${OUTDATED} needs update · 🕒 ${GRACE} in grace · ⏭️ ${SKIPPED} skipped · ⚠️ ${UNKNOWN} unknown"
          echo
          if [[ "${OUTDATED}" -gt 0 ]]; then
            echo "> Bump the outdated libraries, or add temporary entries to \`${IGNORE_FILE}\`."
          fi
          if [[ "${GRACE}" -gt 0 ]]; then
            echo "> 🕒 ${GRACE} major bump(s) are within the grace period. The grace period applies to major bumps only and lasts ${GRACE_DAYS} days — bump them before it expires, or the check will start failing."
          fi
        } >> "${REPORT_PATH}"

        # Step summary
        cat "${REPORT_PATH}" >> "${GITHUB_STEP_SUMMARY}"

        # Outputs
        {
          echo "outdated_count=${OUTDATED}"
          echo "grace_count=${GRACE}"
          if [[ "${OUTDATED}" -gt 0 ]]; then
            echo "has_outdated=true"
          else
            echo "has_outdated=false"
          fi
          echo "report_path=${REPORT_PATH}"
        } >> "${GITHUB_OUTPUT}"

        # Final verdict
        if [[ "${OUTDATED}" -gt 0 ]]; then
          if [[ "${DRY_RUN}" == "true" ]]; then
            log "::warning title=Outdated Lerian libraries detected::${OUTDATED} direct dependency(ies) are behind latest stable. (dry-run, not failing)"
          else
            echo "::error title=Outdated Lerian libraries::${OUTDATED} direct dependency(ies) are behind latest stable. Bump them, or add to ${IGNORE_FILE}."
            exit 1
          fi
        fi

    - name: Post sticky PR comment
      if: ${{ always() && inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        REPORT_PATH: ${{ steps.check.outputs.report_path }}
        DRY_RUN: ${{ inputs.dry-run }}
      with:
        github-token: ${{ inputs.comment-token || inputs.github-token }}
        script: |
          const fs = require('fs');
          const path = process.env.REPORT_PATH;
          if (!path || !fs.existsSync(path)) {
            core.info(`No report file at ${path}; skipping PR comment.`);
            return;
          }
          const marker = '<!-- lerian-lib-version-check -->';
          const dryRunBanner = process.env.DRY_RUN === 'true'
            ? '> 🧪 _Dry run — no failures enforced._\n\n'
            : '';
          const body = `${marker}\n${dryRunBanner}${fs.readFileSync(path, 'utf8')}`;

          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request?.number;
          if (!issue_number) {
            core.info('Not a pull_request event; skipping comment.');
            return;
          }

          const { data: comments } = await github.rest.issues.listComments({
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find(c => c.body && c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
            core.info(`Updated sticky comment #${existing.id}.`);
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body,
            });
            core.info('Created sticky comment.');
          }
