name: PR Checks Summary
description: "Generates a summary table of all PR validation check results."

inputs:
  source-branch-result:
    description: Result of source branch validation
    required: false
    default: skipped
  title-result:
    description: Result of PR title validation
    required: false
    default: skipped
  size-result:
    description: Result of PR size check
    required: false
    default: skipped
  description-result:
    description: Result of PR description check
    required: false
    default: skipped
  label-result:
    description: Result of auto-label step
    required: false
    default: skipped
  metadata-result:
    description: Result of PR metadata check
    required: false
    default: skipped
  changelog-result:
    description: Result of changelog check
    required: false
    default: skipped
  dry-run:
    description: Whether this is a dry run
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Summary
      shell: bash
      env:
        SOURCE_BRANCH_RESULT: ${{ inputs.source-branch-result }}
        TITLE_RESULT: ${{ inputs.title-result }}
        SIZE_RESULT: ${{ inputs.size-result }}
        DESCRIPTION_RESULT: ${{ inputs.description-result }}
        LABEL_RESULT: ${{ inputs.label-result }}
        METADATA_RESULT: ${{ inputs.metadata-result }}
        CHANGELOG_RESULT: ${{ inputs.changelog-result }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        icon() {
          case "$1" in
            success) echo "✅" ;;
            failure) echo "❌" ;;
            *)       echo "⚠️" ;;
          esac
        }

        {
          echo "## PR Checks Summary"
          echo ""
          if [ "$DRY_RUN" = "true" ]; then
            echo "> **DRY RUN** — no comments, labels, or reviews were posted"
            echo ""
          fi
          echo "$(icon "$SOURCE_BRANCH_RESULT") Source Branch: $SOURCE_BRANCH_RESULT"
          echo "$(icon "$TITLE_RESULT") PR Title: $TITLE_RESULT"
          echo "$(icon "$SIZE_RESULT") PR Size: $SIZE_RESULT"
          echo "$(icon "$DESCRIPTION_RESULT") PR Description: $DESCRIPTION_RESULT"
          echo "$(icon "$LABEL_RESULT") Auto-label: $LABEL_RESULT"
          echo "$(icon "$METADATA_RESULT") Metadata: $METADATA_RESULT"
          echo "$(icon "$CHANGELOG_RESULT") Changelog: $CHANGELOG_RESULT"
        } >> "$GITHUB_STEP_SUMMARY"
