name: Ungoliant Release Diff
description: Resolve a release diff and fire the release-diff webhook at the Ungoliant controller to trigger chaos/fuzz analysis.

inputs:
  app:
    description: App slug (midaz, reporter, plugin-fees, …)
    required: true
  version:
    description: Tag to test (e.g. v1.3.4-beta.1)
    required: true
  previous:
    description: Previous tag for the diff. Auto-resolved from the GitHub API when empty.
    required: false
    default: ""
  env:
    description: Release channel — beta | rc | stable
    required: false
    default: "beta"
  env-type:
    description: Environment/testing type — chaos | fuzzing. Empty produces a legacy target env.
    required: false
    default: "chaos"
  tenancy:
    description: Tenancy — st (single-tenant) | mt (multi-tenant)
    required: false
    default: "st"
  base-env:
    description: Base environment — dev | stg | prd
    required: false
    default: "dev"
  controller-url:
    description: Ungoliant controller base URL (reachable over Tailscale)
    required: false
    default: "https://ungoliant-controller.anacleto.lerian.net"
  repo-owner:
    description: GitHub owner/org that hosts the app repository
    required: false
    default: "LerianStudio"
  github-token:
    description: GitHub token used to read tags, compare and diff via the API
    required: true
  webhook-token:
    description: Ungoliant webhook token sent as the X-Ungoliant-Token header
    required: false
    default: ""
  max-diff-bytes:
    description: Maximum diff size forwarded to the controller (bytes)
    required: false
    default: "262144"
  skip-globs:
    description: 'Space-separated glob patterns. When every file in the diff matches one of these, the release is CI/meta-only and the controller is never contacted. Empty disables the check.'
    required: false
    default: ".releaserc.yml .github/*"
  curl-timeout:
    description: Timeout for the webhook POST in seconds (LLM inference can take 60-120s, longer for large/complex diffs). Must stay in lockstep with ungoliant-controller's NEMOCLAW_TIMEOUT_SECONDS and its ingress proxy timeouts.
    required: false
    default: "900"
  dry-run:
    description: Resolve and preview the payload without firing the webhook
    required: false
    default: "false"

outputs:
  status:
    description: Controller response status (e.g. analysis_completed)
    value: ${{ steps.webhook.outputs.status }}
  run-id:
    description: Controller run_id for the analysis
    value: ${{ steps.webhook.outputs.run_id }}
  schema:
    description: Response schema (release-plan | release-summary)
    value: ${{ steps.webhook.outputs.schema }}
  risk-level:
    description: Risk level reported by the controller
    value: ${{ steps.webhook.outputs.risk_level }}
  target-env:
    description: Composed target env forwarded to the controller
    value: ${{ steps.resolve.outputs.target_env }}
  outcome:
    description: High-level outcome — executed (smoke/chaos ran) | skipped (no tests warranted) | skipped_ci_only (diff matched skip-globs; controller was never contacted)
    value: ${{ steps.diff.outputs.ci_only == 'true' && 'skipped_ci_only' || steps.webhook.outputs.outcome }}
  k6:
    description: Number of k6 smoke scenarios selected by the controller
    value: ${{ steps.webhook.outputs.k6 }}
  chaos:
    description: Number of chaos experiments selected by the controller
    value: ${{ steps.webhook.outputs.chaos }}

runs:
  using: composite
  steps:
    # ----------------- Resolve Repo & Target Env -----------------
    - name: Resolve config
      id: resolve
      shell: bash
      env:
        APP: ${{ inputs.app }}
        REPO_OWNER: ${{ inputs.repo-owner }}
        ENV_TYPE: ${{ inputs.env-type }}
        TENANCY: ${{ inputs.tenancy }}
        BASE_ENV: ${{ inputs.base-env }}
      run: |
        set -euo pipefail

        if [ -z "$APP" ]; then
          echo "::error::app input is required"
          exit 1
        fi

        if [ -n "$ENV_TYPE" ] && [ "$ENV_TYPE" != "chaos" ] && [ "$ENV_TYPE" != "fuzzing" ]; then
          echo "::error::env-type must be 'chaos' or 'fuzzing' (got: $ENV_TYPE)"
          exit 1
        fi
        if [ -n "$TENANCY" ] && [ "$TENANCY" != "st" ] && [ "$TENANCY" != "mt" ]; then
          echo "::error::tenancy must be 'st' or 'mt' (got: $TENANCY)"
          exit 1
        fi

        REPO="${REPO_OWNER}/${APP}"

        if [ -n "$ENV_TYPE" ]; then
          TARGET_ENV="${ENV_TYPE}-${BASE_ENV}-${TENANCY}"
        else
          TARGET_ENV="${BASE_ENV}"
        fi

        {
          echo "repo=$REPO"
          echo "target_env=$TARGET_ENV"
        } >> "$GITHUB_OUTPUT"

    # ----------------- Resolve Previous Tag -----------------
    - name: Resolve previous tag
      id: previous
      shell: bash
      env:
        REPO: ${{ steps.resolve.outputs.repo }}
        VERSION: ${{ inputs.version }}
        PREVIOUS: ${{ inputs.previous }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        if [ -z "$VERSION" ]; then
          echo "::error::version input is required"
          exit 1
        fi

        PREV="$PREVIOUS"
        if [ -z "$PREV" ]; then
          echo "Resolving previous tag for $REPO..."
          # The /tags API guarantees no ordering and caps at 100 per page, so
          # collect every page and sort deterministically instead of trusting
          # the response order (which could resolve the wrong previous tag).
          ALL_TAGS=""
          page=1
          while [ "$page" -le 20 ]; do
            PAGE_JSON="$(curl -sf --retry 2 --retry-delay 2 --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/tags?per_page=100&page=${page}")"
            COUNT="$(printf '%s' "$PAGE_JSON" | jq 'length')"
            [ "$COUNT" -gt 0 ] || break
            ALL_TAGS="${ALL_TAGS}$(printf '%s' "$PAGE_JSON" | jq -r '.[].name')"$'\n'
            [ "$COUNT" -lt 100 ] && break
            page=$((page + 1))
          done
          # Version-sort descending and take the tag immediately below VERSION.
          PREV="$(printf '%s' "$ALL_TAGS" | grep -v '^$' | grep -vFx "$VERSION" \
            | { printf '%s\n' "$VERSION"; cat; } | sort -rV \
            | awk -v v="$VERSION" 'found { print; exit } $0 == v { found = 1 }')" || true
          [ -n "$PREV" ] || { echo "::error::Could not resolve previous tag — pass it explicitly"; exit 1; }
          echo "Previous tag resolved: $PREV"
        fi

        echo "previous=$PREV" >> "$GITHUB_OUTPUT"

    # ----------------- Fetch Compare Metadata & CI-only Detection -----------------
    # Cheap JSON-only compare, done before the health check / heavy diff fetch
    # so a release limited to skip-globs (workflow/config changes) never
    # contacts the controller at all — not even a health-check ping.
    - name: Fetch compare metadata
      id: diff
      shell: bash
      env:
        REPO: ${{ steps.resolve.outputs.repo }}
        VERSION: ${{ inputs.version }}
        PREVIOUS: ${{ steps.previous.outputs.previous }}
        SKIP_GLOBS: ${{ inputs.skip-globs }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        API="https://api.github.com/repos/${REPO}"

        echo "Fetching compare ${PREVIOUS} -> ${VERSION} from ${REPO}..."
        COMPARE="$(curl -sf --retry 2 --retry-delay 2 --max-time 60 \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "${API}/compare/${PREVIOUS}...${VERSION}")"

        REVISION="$(printf '%s' "$COMPARE" | jq -r 'if (.commits | length) > 0 then .commits[-1].sha[0:12] else "" end')"
        if [ -z "$REVISION" ]; then
          REVISION="$(curl -sf --retry 2 --retry-delay 2 --max-time 30 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${API}/git/ref/tags/${VERSION}" | jq -r '.object.sha[0:12]')"
        fi

        PREV_SHA="$(curl -sf --retry 2 --retry-delay 2 --max-time 30 \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "${API}/git/ref/tags/${PREVIOUS}" | jq -r '.object.sha[0:12]')"

        FILES="$(printf '%s' "$COMPARE" | jq -r '.files | length')"
        echo "Revision: $REVISION  |  Previous: $PREV_SHA  |  Files changed: $FILES"

        # ----------------- CI-only change detection -----------------
        # When every changed file matches a skip-glob, this release is
        # CI/meta-only (e.g. workflow bumps under .github/*): skip Ungoliant
        # entirely instead of spending a chaos/fuzz analysis on it.
        read -ra skip_patterns <<< "$SKIP_GLOBS"
        CI_ONLY=false
        if [ "$FILES" -gt 0 ] && [ "${#skip_patterns[@]}" -gt 0 ]; then
          CI_ONLY=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            matched=false
            for glob in "${skip_patterns[@]}"; do
              # shellcheck disable=SC2254
              case "$file" in
                $glob) matched=true; break ;;
              esac
            done
            if [ "$matched" = false ]; then
              CI_ONLY=false
              break
            fi
          done < <(printf '%s' "$COMPARE" | jq -r '.files[].filename')
        fi

        if [ "$CI_ONLY" = "true" ]; then
          echo "::notice::All ${FILES} changed file(s) match skip-globs (${SKIP_GLOBS}) — release is CI/meta-only, Ungoliant will not be contacted"
        else
          echo "CI-only check: not all files match skip-globs (${SKIP_GLOBS:-<none>}) — proceeding with Ungoliant"
        fi

        {
          echo "revision=$REVISION"
          echo "prev_sha=$PREV_SHA"
          echo "files=$FILES"
          echo "ci_only=$CI_ONLY"
        } >> "$GITHUB_OUTPUT"

    # ----------------- Health Check (fail fast before the heavy diff fetch) -----------------
    - name: Health check controller
      if: steps.diff.outputs.ci_only != 'true'
      shell: bash
      env:
        CONTROLLER_URL: ${{ inputs.controller-url }}
      run: |
        set -euo pipefail
        echo "Checking controller at ${CONTROLLER_URL}..."
        HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${CONTROLLER_URL}/healthz" || true)"
        [ "$HTTP_CODE" = "200" ] || { echo "::error::Controller not reachable ($HTTP_CODE). Is the runner on Tailscale?"; exit 1; }
        echo "Controller is up"

    # ----------------- Fetch Diff Text -----------------
    - name: Fetch diff text
      id: diff-text
      if: steps.diff.outputs.ci_only != 'true'
      shell: bash
      env:
        REPO: ${{ steps.resolve.outputs.repo }}
        VERSION: ${{ inputs.version }}
        PREVIOUS: ${{ steps.previous.outputs.previous }}
        MAX_DIFF_BYTES: ${{ inputs.max-diff-bytes }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        API="https://api.github.com/repos/${REPO}"

        echo "Fetching diff (cap ${MAX_DIFF_BYTES} bytes)..."
        curl -sf --retry 2 --retry-delay 2 --max-time 120 \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github.diff" \
          "${API}/compare/${PREVIOUS}...${VERSION}" -o diff.raw

        head -c "$MAX_DIFF_BYTES" diff.raw > diff.trunc
        # Strip any UTF-8 sequence left incomplete by the byte-level truncation.
        iconv -f UTF-8 -t UTF-8 -c diff.trunc > diff.txt 2>/dev/null || cp diff.trunc diff.txt

        DIFF_SIZE="$(wc -c < diff.txt | tr -d ' ')"
        echo "Diff size: ${DIFF_SIZE} bytes"
        [ "$DIFF_SIZE" -gt 0 ] || { echo "::error::Empty diff — check tags exist in $REPO"; exit 1; }

    # ----------------- Build Payload -----------------
    - name: Build payload
      if: steps.diff.outputs.ci_only != 'true'
      shell: bash
      env:
        APP: ${{ inputs.app }}
        ENV: ${{ inputs.env }}
        REPO: ${{ steps.resolve.outputs.repo }}
        VERSION: ${{ inputs.version }}
        REVISION: ${{ steps.diff.outputs.revision }}
        PREV_SHA: ${{ steps.diff.outputs.prev_sha }}
        TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
      run: |
        set -euo pipefail
        jq -n \
          --rawfile diff diff.txt \
          --arg app "$APP" \
          --arg env "$ENV" \
          --arg repo "$REPO" \
          --arg version "$VERSION" \
          --arg revision "$REVISION" \
          --arg previous "$PREV_SHA" \
          --arg target_env "$TARGET_ENV" \
          '{app: $app, env: $env, repository: $repo, version: $version, revision: $revision, previous: $previous, diff: $diff}
           + (if $target_env == "" then {} else {target_env: $target_env} end)' > payload.json

    # ----------------- Dry Run -----------------
    - name: Dry run summary
      if: inputs.dry-run == 'true' && steps.diff.outputs.ci_only != 'true'
      shell: bash
      env:
        APP: ${{ inputs.app }}
        VERSION: ${{ inputs.version }}
        ENV: ${{ inputs.env }}
        TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
        REPO: ${{ steps.resolve.outputs.repo }}
        PREVIOUS: ${{ steps.previous.outputs.previous }}
        REVISION: ${{ steps.diff.outputs.revision }}
      run: |
        set -euo pipefail
        echo "::notice::DRY RUN — release-diff webhook will not be sent"
        echo "  app         : $APP"
        echo "  repository  : $REPO"
        echo "  version     : $VERSION"
        echo "  previous    : $PREVIOUS"
        echo "  revision    : $REVISION"
        echo "  env         : $ENV"
        echo "  target_env  : $TARGET_ENV"
        echo "  payload size: $(wc -c < payload.json | tr -d ' ') bytes"

    # ----------------- CI-only Skip Summary -----------------
    - name: CI-only skip summary
      if: steps.diff.outputs.ci_only == 'true'
      shell: bash
      env:
        APP: ${{ inputs.app }}
        VERSION: ${{ inputs.version }}
        SKIP_GLOBS: ${{ inputs.skip-globs }}
        FILES: ${{ steps.diff.outputs.files }}
      run: |
        set -euo pipefail
        echo "::notice::Ungoliant skipped — all ${FILES} changed file(s) in ${VERSION} matched skip-globs (${SKIP_GLOBS})"
        {
          echo "### Ungoliant release-diff — SKIPPED (CI-only change)"
          echo ""
          echo "| Field | Value |"
          echo "| --- | --- |"
          echo "| outcome | \`skipped_ci_only\` |"
          echo "| app | \`$APP\` |"
          echo "| version | \`$VERSION\` |"
          echo "| files changed | \`$FILES\` |"
          echo "| skip_globs | \`$SKIP_GLOBS\` |"
        } >> "$GITHUB_STEP_SUMMARY"

    # ----------------- Fire Webhook -----------------
    - name: Send release-diff webhook
      id: webhook
      if: inputs.dry-run != 'true' && steps.diff.outputs.ci_only != 'true'
      shell: bash
      env:
        CONTROLLER_URL: ${{ inputs.controller-url }}
        CURL_TIMEOUT: ${{ inputs.curl-timeout }}
        WEBHOOK_TOKEN: ${{ inputs.webhook-token }}
        APP: ${{ inputs.app }}
        VERSION: ${{ inputs.version }}
        ENV: ${{ inputs.env }}
        TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
      run: |
        set -euo pipefail

        echo "Sending release-diff webhook (timeout ${CURL_TIMEOUT}s)..."
        echo "  app=$APP  version=$VERSION  env=$ENV  target_env=$TARGET_ENV"
        [ -n "$WEBHOOK_TOKEN" ] || echo "::warning::UNGOLIANT_WEBHOOK_TOKEN not set — sending unauthenticated"

        # The payload is streamed via --data-binary @- to avoid the per-argument
        # length limit (E2BIG) that a large diff would hit if passed as argv.
        CURL_ARGS=(-s --max-time "$CURL_TIMEOUT" -X POST
          "${CONTROLLER_URL}/webhook/release-diff"
          -H "Content-Type: application/json"
          --data-binary @payload.json)
        [ -n "$WEBHOOK_TOKEN" ] && CURL_ARGS+=(-H "X-Ungoliant-Token: $WEBHOOK_TOKEN")

        START="$(date +%s)"
        RESPONSE="$(curl "${CURL_ARGS[@]}" 2>&1 || true)"
        ELAPSED=$(( $(date +%s) - START ))

        echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
        echo "Elapsed: ${ELAPSED}s"

        STATUS="$(printf '%s' "$RESPONSE" | jq -r '.status // "parse_error"' 2>/dev/null || echo "parse_error")"
        RUN_ID="$(printf '%s' "$RESPONSE" | jq -r '.run_id // ""' 2>/dev/null || echo "")"
        SCHEMA="$(printf '%s' "$RESPONSE" | jq -r '.schema // "?"' 2>/dev/null || echo "?")"
        RISK="$(printf '%s' "$RESPONSE" | jq -r '.risk_level // "?"' 2>/dev/null || echo "?")"
        K6_COUNT="$(printf '%s' "$RESPONSE" | jq -r '.k6 // 0' 2>/dev/null || echo 0)"
        CHAOS_COUNT="$(printf '%s' "$RESPONSE" | jq -r '.chaos // 0' 2>/dev/null || echo 0)"

        # A completed analysis that selected neither smoke nor chaos is a
        # deliberate skip: the controller judged the diff low-risk / provably
        # trivial (doc-only or CI/linter cosmetics) and ran no tests. Surface
        # that as a first-class outcome so the release makes the decision clear
        # instead of it hiding behind a generic "analysis_completed".
        OUTCOME="failed"
        if [ "$STATUS" = "analysis_completed" ]; then
          if [ "$K6_COUNT" = "0" ] && [ "$CHAOS_COUNT" = "0" ]; then
            OUTCOME="skipped"
          else
            OUTCOME="executed"
          fi
        fi

        {
          echo "status=$STATUS"
          echo "run_id=$RUN_ID"
          echo "schema=$SCHEMA"
          echo "risk_level=$RISK"
          echo "k6=$K6_COUNT"
          echo "chaos=$CHAOS_COUNT"
          echo "outcome=$OUTCOME"
        } >> "$GITHUB_OUTPUT"

        if [ "$OUTCOME" = "skipped" ]; then
          SUMMARY_TITLE="### Ungoliant release-diff — SKIPPED (no tests warranted)"
        elif [ "$OUTCOME" = "executed" ]; then
          SUMMARY_TITLE="### Ungoliant release-diff — EXECUTED (full flow)"
        else
          SUMMARY_TITLE="### Ungoliant release-diff — FAILED"
        fi

        {
          echo "$SUMMARY_TITLE"
          echo ""
          echo "| Field | Value |"
          echo "| --- | --- |"
          echo "| outcome | \`$OUTCOME\` |"
          echo "| status | \`$STATUS\` |"
          echo "| run_id | \`$RUN_ID\` |"
          echo "| schema | \`$SCHEMA\` |"
          echo "| risk_level | \`$RISK\` |"
          echo "| target_env | \`$TARGET_ENV\` |"
          echo "| k6 | \`$K6_COUNT\` |"
          echo "| chaos | \`$CHAOS_COUNT\` |"
          echo "| elapsed | \`${ELAPSED}s\` |"
        } >> "$GITHUB_STEP_SUMMARY"

        if [ "$OUTCOME" = "failed" ]; then
          echo "::error::Ungoliant analysis failed — status: $STATUS (elapsed ${ELAPSED}s)"
          exit 1
        fi
        if [ "$OUTCOME" = "skipped" ]; then
          echo "::notice::Ungoliant SKIPPED test execution in ${ELAPSED}s — no smoke/chaos warranted (run_id=$RUN_ID, risk=$RISK)"
        else
          echo "::notice::Ungoliant EXECUTED full flow in ${ELAPSED}s (run_id=$RUN_ID, schema=$SCHEMA, risk=$RISK, k6=$K6_COUNT, chaos=$CHAOS_COUNT)"
        fi

    # ----------------- Comment on Originating PR -----------------
    # Best-effort: post/update a comment on the PR that produced this release
    # stating whether Ungoliant ran the full flow, skipped it, or was never
    # contacted (CI-only change). Never fails the release — an API/permission
    # hiccup only logs a warning.
    - name: Comment ungoliant outcome on originating PR
      if: >-
        inputs.dry-run != 'true' &&
        (steps.webhook.outputs.outcome == 'executed' || steps.webhook.outputs.outcome == 'skipped' || steps.diff.outputs.ci_only == 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        RUN_REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        SERVER_URL: ${{ github.server_url }}
        RUN_ID_GH: ${{ github.run_id }}
        APP: ${{ inputs.app }}
        VERSION: ${{ inputs.version }}
        TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
        CI_ONLY: ${{ steps.diff.outputs.ci_only }}
        SKIP_GLOBS: ${{ inputs.skip-globs }}
        OUTCOME: ${{ steps.webhook.outputs.outcome }}
        STATUS: ${{ steps.webhook.outputs.status }}
        SCHEMA: ${{ steps.webhook.outputs.schema }}
        RISK: ${{ steps.webhook.outputs.risk_level }}
        K6_COUNT: ${{ steps.webhook.outputs.k6 }}
        CHAOS_COUNT: ${{ steps.webhook.outputs.chaos }}
        RUN_ID: ${{ steps.webhook.outputs.run_id }}
      run: |
        set -uo pipefail
        API="https://api.github.com/repos/${RUN_REPO}"
        AUTH=(-H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")

        if [ "$CI_ONLY" = "true" ]; then
          OUTCOME="skipped_ci_only"
        fi

        # Resolve the PR behind this release commit. Primary: PRs GitHub
        # associates with the tagged commit. Fallback: the last (#NNN) in the
        # commit message (squash-merge title).
        PR_NUMBER="$(curl -sf --max-time 30 "${AUTH[@]}" \
          "${API}/commits/${SHA}/pulls" 2>/dev/null \
          | jq -r 'if length > 0 then .[0].number else "" end' 2>/dev/null || echo "")"
        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          MSG="$(curl -sf --max-time 30 "${AUTH[@]}" "${API}/commits/${SHA}" 2>/dev/null \
            | jq -r '.commit.message' 2>/dev/null || echo "")"
          PR_NUMBER="$(printf '%s' "$MSG" | grep -oE '#[0-9]+' | tail -1 | tr -d '#' || echo "")"
        fi
        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          echo "::warning::Could not resolve an originating PR for ${SHA} — skipping PR comment"
          exit 0
        fi
        echo "Originating PR: #${PR_NUMBER}"

        RUN_URL="${SERVER_URL}/${RUN_REPO}/actions/runs/${RUN_ID_GH}"
        MARKER="<!-- ungoliant-release-diff:${VERSION} -->"
        if [ "$OUTCOME" = "skipped_ci_only" ]; then
          HEADER="## Ungoliant Release Diff — Skipped (CI-only change)"
          BLURB="This release only touched files matched by skip-globs (\`${SKIP_GLOBS}\`), so Ungoliant was never contacted — no health check and no webhook call were made."
        elif [ "$OUTCOME" = "skipped" ]; then
          HEADER="## Ungoliant Release Diff — Skipped"
          BLURB="No smoke or chaos tests were run for this release. Ungoliant judged the diff low-risk / provably trivial (doc-only or CI/linter cosmetics), so test execution was skipped."
        else
          HEADER="## Ungoliant Release Diff — Executed"
          BLURB="The full chaos/fuzz analysis flow ran for this release."
        fi

        BODY=""
        add() { BODY="${BODY}${1}"$'\n'; }
        add "$MARKER"
        add "$HEADER"
        add ""
        add "$BLURB"
        add ""
        add "| Field | Value |"
        add "| --- | --- |"
        add "| outcome | \`${OUTCOME}\` |"
        add "| app | \`${APP}\` |"
        add "| version | \`${VERSION}\` |"
        add "| target_env | \`${TARGET_ENV}\` |"
        if [ "$OUTCOME" != "skipped_ci_only" ]; then
          add "| risk_level | \`${RISK}\` |"
          add "| k6 smoke scenarios | \`${K6_COUNT}\` |"
          add "| chaos experiments | \`${CHAOS_COUNT}\` |"
          add "| schema | \`${SCHEMA}\` |"
          add "| run_id | \`${RUN_ID}\` |"
        fi
        add ""
        add "[Workflow run](${RUN_URL})"

        jq -n --arg body "$BODY" '{body: $body}' > comment.json

        # Upsert: update the existing comment for this version if present,
        # otherwise create a new one.
        EXISTING_ID="$(curl -sf --max-time 30 "${AUTH[@]}" \
          "${API}/issues/${PR_NUMBER}/comments?per_page=100" 2>/dev/null \
          | jq -r --arg m "$MARKER" '[.[] | select((.body // "") | contains($m))] | if length > 0 then .[-1].id else "" end' 2>/dev/null || echo "")"

        if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
          METHOD="PATCH"; URL="${API}/issues/comments/${EXISTING_ID}"; WHAT="update comment ${EXISTING_ID}"
        else
          METHOD="POST"; URL="${API}/issues/${PR_NUMBER}/comments"; WHAT="post comment"
        fi
        HTTP_CODE="$(curl -s -o /tmp/ungoliant_comment_resp.json -w '%{http_code}' --max-time 30 \
          "${AUTH[@]}" -X "$METHOD" "$URL" --data-binary @comment.json 2>/dev/null || echo "000")"
        if [ "${HTTP_CODE:0:1}" = "2" ]; then
          echo "Ungoliant PR comment ${METHOD}ed on #${PR_NUMBER} (HTTP ${HTTP_CODE})"
        else
          echo "::warning::Failed to ${WHAT} on PR #${PR_NUMBER} — HTTP ${HTTP_CODE}: $(head -c 300 /tmp/ungoliant_comment_resp.json 2>/dev/null)"
        fi
