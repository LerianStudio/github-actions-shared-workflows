name: GPT Changelog
description: Generates CHANGELOG.md files using GPT (OpenRouter) and creates a PR with the updates.

inputs:
  github-token:
    description: GitHub token with contents write and pull-requests write permissions
    required: true
  gpg-private-key:
    description: GPG private key for signing commits
    required: true
  gpg-passphrase:
    description: Passphrase for the GPG private key
    required: true
  git-committer-name:
    description: Git committer name for signed commits
    required: true
  git-committer-email:
    description: Git committer email for signed commits
    required: true
  openrouter-api-key:
    description: OpenRouter API key for GPT changelog generation
    required: true
  filter-paths:
    description: Newline-separated list of path prefixes for monorepo support. Empty means single-app mode.
    required: false
    default: ''
  stable-releases-only:
    description: Only generate changelogs for stable releases (skip beta/rc/alpha tags)
    required: false
    default: 'true'
  openai-model:
    description: Model to use for changelog generation (OpenRouter format)
    required: false
    default: 'openai/gpt-4o'

outputs:
  has-changes:
    description: Whether the composite identified apps eligible for changelog generation
    value: ${{ steps.set-matrix.outputs.has_changes }}
  apps-updated:
    description: Comma-separated list of apps whose CHANGELOGs were updated (empty if none)
    value: ${{ steps.generate.outputs.apps_updated }}

runs:
  using: composite
  steps:
    # ----------------- Setup -----------------
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        token: ${{ inputs.github-token }}

    - name: Sync with remote ref
      shell: bash
      run: |
        # shellcheck disable=SC2193
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "📌 Triggered by tag: $GITHUB_REF_NAME"
          echo "✅ Already at tag commit"
        else
          echo "📌 Triggered by branch: $GITHUB_REF_NAME"
          git fetch origin "$GITHUB_REF_NAME"
          git reset --hard "origin/$GITHUB_REF_NAME"
        fi

    # ----------------- Stability Gate -----------------
    - name: Check if tag is stable release on main
      id: check-tag
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        STABLE_RELEASES_ONLY: ${{ inputs.stable-releases-only }}
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          TAG_NAME="${GITHUB_REF##*/}"
          echo "📌 Triggered by tag push: $TAG_NAME"
        else
          echo "📌 Triggered by branch/workflow_run, finding latest stable tags..."
          git fetch --tags --force

          LATEST_TAGS=$(git tag --sort=-creatordate | head -20 || true)
          echo "📌 Recent tags: $LATEST_TAGS"

          TAG_NAME=""
          for tag in $LATEST_TAGS; do
            if [[ ! "$tag" =~ -(beta|rc|alpha|dev|snapshot) ]]; then
              TAG_NAME="$tag"
              echo "📌 Found stable tag: $TAG_NAME"
              break
            fi
          done

          if [ -z "$TAG_NAME" ]; then
            echo "⚠️ No stable tags found"
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        echo "📌 Processing tag: $TAG_NAME"

        TAG_COMMIT=$(git rev-list -n 1 "$TAG_NAME" 2>/dev/null || echo "")
        if [ -z "$TAG_COMMIT" ]; then
          echo "❌ Could not find commit for tag: $TAG_NAME"
          echo "is_stable=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name')
        echo "📌 Default branch: $DEFAULT_BRANCH"

        if git merge-base --is-ancestor "$TAG_COMMIT" "origin/$DEFAULT_BRANCH" 2>/dev/null; then
          echo "✅ Tag commit is on $DEFAULT_BRANCH branch"
        else
          echo "❌ Tag commit is NOT on $DEFAULT_BRANCH branch - skipping changelog"
          echo "is_stable=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$TAG_NAME" =~ -(beta|rc|alpha|dev|snapshot) ]]; then
          echo "is_stable=false" >> "$GITHUB_OUTPUT"
          echo "⚠️ Prerelease tag detected: $TAG_NAME"
          if [ "$STABLE_RELEASES_ONLY" == "true" ]; then
            echo "🛑 stable-releases-only=true, skipping changelog generation"
          fi
        else
          echo "is_stable=true" >> "$GITHUB_OUTPUT"
          echo "✅ Stable release tag on $DEFAULT_BRANCH: $TAG_NAME"
        fi

    - name: Set changelog matrix
      id: set-matrix
      shell: bash
      env:
        STABLE_RELEASES_ONLY: ${{ inputs.stable-releases-only }}
        IS_STABLE: ${{ steps.check-tag.outputs.is_stable }}
        FILTER_PATHS: ${{ inputs.filter-paths }}
      run: |
        if [ "$STABLE_RELEASES_ONLY" == "true" ] && [ "$IS_STABLE" != "true" ]; then
          echo "matrix=[]" >> "$GITHUB_OUTPUT"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "🛑 Skipping: prerelease tag with stable-releases-only=true"
          exit 0
        fi

        git fetch --tags --force

        if [ -z "$FILTER_PATHS" ]; then
          APP_NAME="${GITHUB_REPOSITORY##*/}"
          MATRIX=$(jq -nc --arg name "$APP_NAME" '[{name: $name, working_dir: "."}]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "📦 Single app mode: ${APP_NAME}"
        else
          MATRIX='[]'

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [[ ! -d "$path" || "$path" == -* ]]; then
              echo "⚠️ Invalid filter path: $path"
              continue
            fi
            APP_NAME=$(basename "$path")
            # shellcheck disable=SC2001,SC2016
            APP_NAME_ESCAPED=$(echo "$APP_NAME" | sed 's/[.[\*^$()+?{}|\\]/\\&/g')
            LATEST_TAG=$(git tag --sort=-creatordate | grep "^${APP_NAME_ESCAPED}-v" | grep -v -e "-beta" -e "-rc" -e "-alpha" -e "-dev" -e "-snapshot" | head -1 || true)

            if [ -n "$LATEST_TAG" ]; then
              echo "📦 Found stable tag for $APP_NAME: $LATEST_TAG"
              MATRIX=$(jq -c \
                --arg name "$APP_NAME" \
                --arg working_dir "$path" \
                '. + [{name: $name, working_dir: $working_dir}]' <<< "$MATRIX")
            else
              echo "⚠️ No stable tag found for $APP_NAME"
            fi
          done <<< "$FILTER_PATHS"

          if [[ "$(jq 'length' <<< "$MATRIX")" -eq 0 ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No apps with stable tags found"
          else
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "📦 Monorepo mode - found apps: $MATRIX"
          fi
        fi

    # ----------------- Changelog Generation -----------------
    - name: Import GPG key
      if: steps.set-matrix.outputs.has_changes == 'true'
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
      with:
        gpg_private_key: ${{ inputs.gpg-private-key }}
        passphrase: ${{ inputs.gpg-passphrase }}
        git_committer_name: ${{ inputs.git-committer-name }}
        git_committer_email: ${{ inputs.git-committer-email }}
        git_config_global: true
        git_user_signingkey: true
        git_commit_gpgsign: true

    - name: Generate changelog for all apps
      id: generate
      if: steps.set-matrix.outputs.has_changes == 'true'
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        GH_TOKEN: ${{ inputs.github-token }}
        MATRIX: ${{ steps.set-matrix.outputs.matrix }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
        REPO_URL: https://github.com/${{ github.repository }}
      run: |
        git fetch --tags --force

        echo "📦 Processing apps from matrix: $MATRIX"
        : > /tmp/apps_updated.txt

        while read -r APP; do
          APP_NAME=$(echo "$APP" | jq -r '.name')
          WORKING_DIR=$(echo "$APP" | jq -r '.working_dir')

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📝 Processing: $APP_NAME (dir: $WORKING_DIR)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # shellcheck disable=SC2001,SC2016
          APP_NAME_ESCAPED=$(echo "$APP_NAME" | sed 's/[.[\*^$()+?{}|\\]/\\&/g')
          if [ "$WORKING_DIR" != "." ]; then
            TAG_GREP_PATTERN="^${APP_NAME_ESCAPED}-v"
          else
            TAG_GREP_PATTERN="^v"
          fi

          LAST_TAG=$(git tag --sort=-version:refname | grep "$TAG_GREP_PATTERN" | grep -v -e "-beta" -e "-rc" -e "-alpha" -e "-dev" -e "-snapshot" | head -1 || true)

          if [ -z "$LAST_TAG" ]; then
            echo "⚠️ No stable tag found for $APP_NAME - skipping"
            continue
          fi

          echo "📌 Latest stable tag: $LAST_TAG"

          if ! git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            echo "❌ Tag $LAST_TAG does not exist - skipping"
            continue
          fi

          PREV_TAG=$(git tag --sort=-version:refname | grep "$TAG_GREP_PATTERN" | grep -v -e "-beta" -e "-rc" -e "-alpha" -e "-dev" -e "-snapshot" | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            SINCE="$PREV_TAG"
            echo "🟢 Range: $PREV_TAG → $LAST_TAG"
          else
            SINCE=$(git rev-list --max-parents=0 HEAD)
            echo "🟡 First stable release - Range: first commit → $LAST_TAG"
          fi

          # shellcheck disable=SC2001
          if [ "$WORKING_DIR" != "." ]; then
            VERSION=$(echo "$LAST_TAG" | sed 's/.*-v//')
          else
            VERSION=$(echo "$LAST_TAG" | sed 's/^v//')
          fi

          # Collect SHA, short-hash, and subject in one git log pass (unit-separator delimited)
          # to avoid a redundant git log -1 subprocess per commit.
          if [ "$WORKING_DIR" != "." ]; then
            GIT_LOG_DATA=$(git log "$SINCE".."$LAST_TAG" --format='%H%x1f%h%x1f%s' -- "$WORKING_DIR" 2>/dev/null || true)
          else
            GIT_LOG_DATA=$(git log "$SINCE".."$LAST_TAG" --format='%H%x1f%h%x1f%s' 2>/dev/null || true)
          fi

          COMMIT_COUNT=$(echo "$GIT_LOG_DATA" | grep -c . || true)
          echo "📊 Found $COMMIT_COUNT commits for $APP_NAME"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "⚠️ No commits found for $APP_NAME in range - skipping"
            continue
          fi

          # Build annotated commit list: "short-hash subject [@author]"
          # Each commit carries its author handle so GPT can attribute inline.
          COMMITS_ANNOTATED=""
          while IFS=$'\x1f' read -r SHA SHORT_HASH SUBJECT; do
            [[ -z "$SHA" ]] && continue
            LOGIN=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}" \
              --jq '.author.login // empty' 2>/dev/null || true)
            if [[ -n "$LOGIN" && "$LOGIN" != *"[bot]" ]]; then
              COMMITS_ANNOTATED+="${SHORT_HASH} ${SUBJECT} [@${LOGIN}]"$'\n'
            else
              COMMITS_ANNOTATED+="${SHORT_HASH} ${SUBJECT}"$'\n'
            fi
          done <<< "$GIT_LOG_DATA"
          echo "📝 Annotated commits:"$'\n'"${COMMITS_ANNOTATED}"

          PROMPT="Generate a changelog for ${APP_NAME} ONLY. Each commit below includes the author handle in brackets. Commits: ${COMMITS_ANNOTATED} --- STRICT RULES: 1) NEVER mention other components - only ${APP_NAME}. 2) Use bullet points under section headers only — do NOT repeat the commit type prefix (feat:, fix:, etc.) inside each bullet; the section header already conveys the category. 3) Group entries under plain section headers: 'Features:', 'Fixes:', 'Improvements:' (skip empty sections). Each bullet is plain prose describing WHAT changed, not the raw commit message. 4) No markdown headers (no #). 5) Max 5 bullet points total across all sections. 6) For each bullet point add the GitHub handle(s) of the author(s) in parentheses at the end, indented on the same line, e.g. 'Ensure normalize_to_filter is a boolean in extra_build. (@bedatty)'. If a bullet combines multiple commits, list all unique handles. Omit handles only when none were detected. 7) ALWAYS wrap version references in backticks - this includes tag names (\`v1\`, \`v1.28.8\`, \`v2.0.0-beta.1\`), action refs (\`@v1\`, \`@v1.28.8\`), and any semver-like token. Never emit a bare version."

          REQUEST_BODY=$(jq -n \
            --arg model "$OPENAI_MODEL" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [{role: "user", content: $prompt}],
              temperature: 0.3,
              max_tokens: 1000
            }')

          MAX_ATTEMPTS=3
          BACKOFF=(10 30)
          HTTP_CODE="000"
          for _attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -w "%{http_code}" --max-time 60 --connect-timeout 10 \
              -o /tmp/api_response.json \
              https://openrouter.ai/api/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -H "HTTP-Referer: https://github.com/${GITHUB_REPOSITORY}" \
              -H "X-Title: GPT Changelog" \
              -d "$REQUEST_BODY") || HTTP_CODE="000"

            if [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] && [ "$HTTP_CODE" -lt 400 ]; then
              break
            fi

            # Permanent client errors (4xx except 429) — no point retrying
            if [[ "$HTTP_CODE" =~ ^4 ]] && [ "$HTTP_CODE" != "429" ]; then
              echo "⚠️ Permanent API error HTTP $HTTP_CODE for $APP_NAME — skipping"
              cat /tmp/api_response.json 2>/dev/null || true
              break
            fi

            if [ "$_attempt" -lt "$MAX_ATTEMPTS" ]; then
              WAIT=${BACKOFF[$((_attempt - 1))]}
              echo "⚠️ Attempt $_attempt/$MAX_ATTEMPTS failed (HTTP $HTTP_CODE) — retrying in ${WAIT}s"
              cat /tmp/api_response.json 2>/dev/null || true
              sleep "$WAIT"
            else
              echo "⚠️ All $MAX_ATTEMPTS attempts failed for $APP_NAME (last HTTP $HTTP_CODE) — skipping"
              cat /tmp/api_response.json 2>/dev/null || true
            fi
          done

          if ! [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] || [ "$HTTP_CODE" -ge 400 ]; then
            rm -f /tmp/api_response.json
            continue
          fi

          CONTENT=$(jq -r '.choices[0].message.content // empty' /tmp/api_response.json)
          rm -f /tmp/api_response.json

          if [ -z "$CONTENT" ]; then
            echo "⚠️ No content generated for $APP_NAME"
            continue
          fi

          CONTENT=$(echo "$CONTENT" | sed '/^```/d')

          if [ "$WORKING_DIR" != "." ]; then
            CHANGELOG_PATH="${WORKING_DIR}/CHANGELOG.md"
          else
            CHANGELOG_PATH="CHANGELOG.md"
          fi

          if [ -n "$PREV_TAG" ]; then
            COMPARE_LINK="[Compare changes](${REPO_URL}/compare/${PREV_TAG}...${LAST_TAG})"
          else
            COMPARE_LINK="[View all changes](${REPO_URL}/commits/${LAST_TAG})"
          fi

          if [ -f "$CHANGELOG_PATH" ]; then
            EXISTING_CONTENT=$(awk '/^## \[/{found=1} found{print}' "$CHANGELOG_PATH")
          else
            EXISTING_CONTENT=""
            echo "📜 Creating new changelog"
          fi

          {
            echo "# ${APP_NAME^} Changelog"
            echo ""
            echo "## [${VERSION}](${REPO_URL}/releases/tag/${LAST_TAG})"
            echo ""
            echo "$CONTENT"
            echo ""
            echo "$COMPARE_LINK"
            if [ -n "$EXISTING_CONTENT" ]; then
              echo ""
              echo "---"
              echo ""
              echo "$EXISTING_CONTENT"
            fi
            echo ""
          } > "$CHANGELOG_PATH"

          echo "📄 Updated: $CHANGELOG_PATH"
          echo "${APP_NAME}:v${VERSION}:${WORKING_DIR}" >> /tmp/apps_updated.txt

          {
            echo "## ${APP_NAME^} v${VERSION}"
            echo ""
            echo "$CONTENT"
            echo ""
            echo "$COMPARE_LINK"
          } > /tmp/app_release_notes.md

          gh release edit "$LAST_TAG" --notes-file /tmp/app_release_notes.md || \
            echo "⚠️ Could not update release for $LAST_TAG"

          echo "✅ Processed $APP_NAME"
        done < <(echo "$MATRIX" | jq -c '.[]')

        if [ -s /tmp/apps_updated.txt ]; then
          APPS_LIST=$(cut -d: -f1,2 < /tmp/apps_updated.txt | tr '\n' ', ' | sed 's/,$//')
          echo "apps_updated=$APPS_LIST" >> "$GITHUB_OUTPUT"
          echo "✅ Per-app changelogs created for: $APPS_LIST"
        else
          echo "⚠️ No changelog content generated"
          echo "apps_updated=" >> "$GITHUB_OUTPUT"
        fi

    - name: Show generated changelogs
      if: steps.set-matrix.outputs.has_changes == 'true'
      shell: bash
      run: |
        echo "📄 Generated per-app CHANGELOGs:"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if [ -f /tmp/apps_updated.txt ]; then
          while IFS=: read -r APP_NAME _VERSION WORKING_DIR; do
            if [ "$WORKING_DIR" != "." ]; then
              CHANGELOG_PATH="${WORKING_DIR}/CHANGELOG.md"
            else
              CHANGELOG_PATH="CHANGELOG.md"
            fi
            echo ""
            echo "📦 ${APP_NAME} (${CHANGELOG_PATH}):"
            echo "---"
            head -50 "$CHANGELOG_PATH" 2>/dev/null || echo "File not found"
            echo ""
          done < /tmp/apps_updated.txt
        fi
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ----------------- Commit & Push -----------------
    - name: Commit changelog to default branch
      if: steps.generate.outputs.apps_updated != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        APPS_UPDATED: ${{ steps.generate.outputs.apps_updated }}
      run: |
        # shellcheck disable=SC2193
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          BASE_BRANCH=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name')
          echo "📌 Triggered by tag, pushing to default branch: $BASE_BRANCH"
        else
          BASE_BRANCH="$GITHUB_REF_NAME"
          echo "📌 Pushing CHANGELOGs directly to: $BASE_BRANCH"
        fi

        # Stage per-app CHANGELOG.md files written by the generate step
        if [ -f /tmp/apps_updated.txt ]; then
          while IFS=: read -r _APP_NAME _VERSION WORKING_DIR; do
            if [ "$WORKING_DIR" != "." ]; then
              CHANGELOG_PATH="${WORKING_DIR}/CHANGELOG.md"
            else
              CHANGELOG_PATH="CHANGELOG.md"
            fi
            git add "$CHANGELOG_PATH" 2>/dev/null || true
          done < /tmp/apps_updated.txt
        fi

        if git diff --cached --quiet; then
          echo "⚠️ No changelog changes to commit"
          exit 0
        fi

        git commit -S -m "chore(release): Update CHANGELOGs for ${APPS_UPDATED} [skip ci]"

        # Retry push on race: rebase onto latest base branch keeping our
        # changelog content (-X ours) and re-push.
        attempt=1
        max_attempts=3
        while [ $attempt -le $max_attempts ]; do
          if git push origin "HEAD:$BASE_BRANCH"; then
            echo "✅ CHANGELOGs pushed to $BASE_BRANCH"
            exit 0
          fi
          echo "⚠️ Push rejected (attempt $attempt/$max_attempts) — rebasing onto latest $BASE_BRANCH"
          git fetch origin "$BASE_BRANCH"
          if ! git rebase "origin/$BASE_BRANCH" -X ours; then
            echo "❌ Rebase failed — manual intervention required"
            git rebase --abort 2>/dev/null || true
            exit 1
          fi
          attempt=$((attempt + 1))
        done
        echo "❌ Failed to push after $max_attempts attempts"
        exit 1

    - name: Backmerge default branch into develop
      if: steps.generate.outputs.apps_updated != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name')
        TARGET_BRANCH="develop"

        if ! git ls-remote --heads origin develop | grep -q develop; then
          echo "⚠️ No develop branch found — skipping backmerge"
          exit 0
        fi

        echo "📌 Backmerging $DEFAULT_BRANCH → $TARGET_BRANCH"

        git fetch origin "$DEFAULT_BRANCH" "$TARGET_BRANCH"
        git checkout "$TARGET_BRANCH"
        git reset --hard "origin/$TARGET_BRANCH"

        if git merge-base --is-ancestor "origin/$DEFAULT_BRANCH" "HEAD"; then
          echo "✅ $TARGET_BRANCH already contains $DEFAULT_BRANCH — nothing to backmerge"
          exit 0
        fi

        # Try clean merge first — push directly if no conflicts
        set +e
        git merge --no-ff -S \
          -m "chore(changelog): backmerge $DEFAULT_BRANCH into $TARGET_BRANCH [skip ci]" \
          "origin/$DEFAULT_BRANCH"
        MERGE_EXIT=$?
        set -e

        if [ $MERGE_EXIT -eq 0 ]; then
          if git push origin "$TARGET_BRANCH"; then
            echo "✅ Backmerged $DEFAULT_BRANCH into $TARGET_BRANCH (direct push)"
            exit 0
          fi
          echo "⚠️ Direct push to $TARGET_BRANCH rejected — falling back to PR"
        elif [ $MERGE_EXIT -eq 1 ]; then
          echo "⚠️ Merge conflict between $DEFAULT_BRANCH and $TARGET_BRANCH — falling back to PR for manual resolution"
          git merge --abort 2>/dev/null || true
        else
          echo "⚠️ Merge failed (exit $MERGE_EXIT) — falling back to PR"
          git merge --abort 2>/dev/null || true
        fi

        # Fallback: open a backmerge PR for manual resolution
        BACKMERGE_BRANCH="release/backmerge-${DEFAULT_BRANCH}-into-${TARGET_BRANCH}"
        echo "📌 Creating backmerge branch: $BACKMERGE_BRANCH"
        # Fetch the backmerge branch (if it exists) so --force-with-lease
        # compares against the current remote state, not a stale tracking ref.
        git fetch origin "$BACKMERGE_BRANCH" 2>/dev/null || true
        git checkout -B "$BACKMERGE_BRANCH" "origin/$DEFAULT_BRANCH"
        git push --force-with-lease origin "$BACKMERGE_BRANCH"

        if [[ "$(gh pr list --head "$BACKMERGE_BRANCH" --base "$TARGET_BRANCH" --state open --json number --jq 'length')" == "0" ]]; then
          gh pr create \
            --title "chore(changelog): backmerge $DEFAULT_BRANCH into $TARGET_BRANCH" \
            --body "Automated backmerge from \`$DEFAULT_BRANCH\` into \`$TARGET_BRANCH\` could not be completed automatically. Please review and merge manually." \
            --base "$TARGET_BRANCH" \
            --head "$BACKMERGE_BRANCH"
          echo "✅ Backmerge PR created"
        else
          echo "⚠️ Backmerge PR already exists"
        fi

    # ----------------- Cleanup -----------------
    - name: Cleanup temporary files
      if: always()
      shell: bash
      run: |
        rm -f /tmp/apps_updated.txt /tmp/app_release_notes.md /tmp/api_response.json
        echo "🧹 Cleaned up temporary files"
