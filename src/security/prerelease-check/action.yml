name: Pre-release Version Check
description: Scans dependency files for unstable version pins. Only stable semver (x.y.z) and Go pseudo-versions (SHA-based) are allowed.

inputs:
  scan-ref:
    description: 'Directory to scan for pre-release versions'
    required: false
    default: '.'
  app-name:
    description: 'Application name for reporting context'
    required: false
    default: ''
  target-branch:
    description: 'PR target branch (e.g. github.base_ref). Selects the annotation level: pre-release pins annotate as error on blocking branches, warning elsewhere. Empty = warning.'
    required: false
    default: ''
  block-branches:
    description: 'Comma-separated branches where pre-release pins are blocking (annotated as error). Must match the downstream gate. Default: release-candidate,main.'
    required: false
    default: 'release-candidate,main'
  allow-file:
    description: 'Path (relative to each scanned base) to a file listing accepted pre-release pins as "module version" lines (# comments allowed). Matching findings are exempted and reported as notices — the same discipline .trivyignore applies to CVEs that cannot be remediated by upgrade (e.g. a direct dependency with no stable upstream release). Auto-discovered at the default path when present; absent file = no exemptions.'
    required: false
    default: '.prerelease-allow'

outputs:
  has-findings:
    description: 'true if pre-release versions were detected'
    value: ${{ steps.scan.outputs.has_findings }}
  findings-count:
    description: 'Number of pre-release version findings'
    value: ${{ steps.scan.outputs.findings_count }}
  artifact-file:
    description: 'Path to the JSON findings file for consumption by pr-security-reporter'
    value: ${{ steps.scan.outputs.artifact_file }}

runs:
  using: composite
  steps:
    - name: Scan for pre-release versions
      id: scan
      shell: bash
      env:
        SCAN_DIR: ${{ inputs.scan-ref }}
        APP_NAME: ${{ inputs.app-name }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
        BLOCK_BRANCHES: ${{ inputs.block-branches }}
        ALLOW_FILE: ${{ inputs.allow-file }}
      run: |
        # Matches x.y.z-<letter...> — any semver with a pre-release suffix starting
        # with a letter (alpha, beta, rc, dev, preview, canary, snapshot, etc.).
        # Excludes Go pseudo-versions (v0.0.0-YYYYMMDDHHMMSS-commitsha) because
        # their suffix starts with digits, not letters. SHA pins are also allowed.
        PRERELEASE_PATTERN='[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z]'

        # Docker-specific pattern: only match known pre-release prefixes to avoid
        # false positives on stable image variants like -slim, -alpine, -bookworm.
        DOCKER_PRERELEASE='[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc|dev|preview|canary|snapshot|nightly)'
        FINDINGS=()

        # Scan the component scan-ref AND the repo root. In Go monorepos a single
        # root go.mod is shared across components; without scanning root we'd miss
        # dependency pins for components whose scan-ref is a subdirectory.
        SEEN_FILES=()
        SCAN_PATHS=("$SCAN_DIR")
        if [ "$SCAN_DIR" != "." ] && [ "$SCAN_DIR" != "./" ]; then
          SCAN_PATHS+=(".")
        fi

        already_seen() {
          local target="$1"
          for s in "${SEEN_FILES[@]}"; do
            [ "$s" = "$target" ] && return 0
          done
          return 1
        }

        for base in "${SCAN_PATHS[@]}"; do
          # ----------------- go.mod -----------------
          if [ -f "$base/go.mod" ]; then
            real=$(realpath "$base/go.mod")
            if ! already_seen "$real"; then
              SEEN_FILES+=("$real")
              while IFS= read -r match; do
                FINDINGS+=("${base}/go.mod|$match")
              done < <(grep -nE "v${PRERELEASE_PATTERN}" "$base/go.mod" || true)
            fi
          fi

          # ----------------- package.json -----------------
          if [ -f "$base/package.json" ]; then
            real=$(realpath "$base/package.json")
            if ! already_seen "$real"; then
              SEEN_FILES+=("$real")
              while IFS= read -r match; do
                FINDINGS+=("${base}/package.json|$match")
              done < <(grep -nE "\"[~^<>=]*${PRERELEASE_PATTERN}" "$base/package.json" || true)
            fi
          fi

          # ----------------- Dockerfile -----------------
          for df in "$base/Dockerfile" "$base/"*.dockerfile "$base/Dockerfile."*; do
            [ -f "$df" ] || continue
            real=$(realpath "$df")
            already_seen "$real" && continue
            SEEN_FILES+=("$real")
            relpath="${df#./}"
            while IFS= read -r match; do
              FINDINGS+=("${relpath}|$match")
            done < <(grep -nE ":${DOCKER_PRERELEASE}" "$df" || true)
          done
        done

        # ----------------- allowlist (accepted pre-release pins) -----------------
        # Exempt pins explicitly accepted in an allow-file: one entry per line,
        # matched on the raw scanned line's first two whitespace tokens (for
        # go.mod: "module version"); '#' comments and blank lines ignored. Same discipline
        # .trivyignore applies to CVEs that cannot be remediated by upgrade — a
        # direct dependency whose upstream ships no stable release (only beta/rc)
        # stays visible in the report as a notice, but does not block promotion.
        # Absent file (the default) = zero exemptions = unchanged behavior.
        ALLOW_ENTRIES=()
        ALLOW_SEEN=()
        if [ -n "$ALLOW_FILE" ]; then
          for base in "${SCAN_PATHS[@]}"; do
            af="$base/$ALLOW_FILE"
            [ -f "$af" ] || continue
            real=$(realpath "$af")
            dup=false
            for s in "${ALLOW_SEEN[@]}"; do
              if [ "$s" = "$real" ]; then dup=true; break; fi
            done
            if [ "$dup" = "true" ]; then continue; fi
            ALLOW_SEEN+=("$real")
            while IFS= read -r line || [ -n "$line" ]; do
              line="${line%%#*}"
              line=$(echo "$line" | xargs)
              if [ -z "$line" ]; then continue; fi
              ALLOW_ENTRIES+=("$(echo "$line" | awk '{print $1, $2}')")
            done < "$af"
          done
        fi

        if [ ${#ALLOW_ENTRIES[@]} -gt 0 ] && [ ${#FINDINGS[@]} -gt 0 ]; then
          KEPT=()
          for f in "${FINDINGS[@]}"; do
            REST="${f#*|}"
            CONTENT="${REST#*:}"
            KEY=$(echo "$CONTENT" | sed 's/^[[:space:]]*//' | awk '{print $1, $2}')
            allowed=false
            for a in "${ALLOW_ENTRIES[@]}"; do
              if [ "$KEY" = "$a" ]; then allowed=true; break; fi
            done
            if [ "$allowed" = "true" ]; then
              echo "::notice::Accepted pre-release pin (allow-file): $KEY"
            else
              KEPT+=("$f")
            fi
          done
          FINDINGS=("${KEPT[@]}")
        fi

        COUNT=${#FINDINGS[@]}
        echo "findings_count=$COUNT" >> "$GITHUB_OUTPUT"

        # Persist findings as JSON so the next step can post a PR comment.
        ARTIFACT_NAME="${APP_NAME:-default}"
        ARTIFACT_FILE="prerelease-findings-${ARTIFACT_NAME}.json"
        echo "artifact_file=$ARTIFACT_FILE" >> "$GITHUB_OUTPUT"

        if [ "$COUNT" -gt 0 ]; then
          echo "has_findings=true" >> "$GITHUB_OUTPUT"

          LABEL=""
          [ -n "$APP_NAME" ] && LABEL=" ($APP_NAME)"

          # Annotation level mirrors the downstream branch-aware gate: error on
          # blocking branches (where the pin hard-fails the job), warning
          # elsewhere (advisory). An empty/unknown target branch is non-blocking.
          IS_BLOCKING=false
          IFS=',' read -ra BLOCK_LIST <<< "$BLOCK_BRANCHES"
          for branch in "${BLOCK_LIST[@]}"; do
            branch=$(echo "$branch" | xargs)
            if [ -n "$TARGET_BRANCH" ] && [ "$TARGET_BRANCH" = "$branch" ]; then
              IS_BLOCKING=true
              break
            fi
          done

          MSG="Found $COUNT unstable version pin(s)${LABEL}. Only stable versions (x.y.z) and SHA-based pins are allowed."
          if [ "$IS_BLOCKING" = "true" ]; then
            echo "::error::$MSG"
          else
            echo "::warning::$MSG"
          fi

          # Build JSON array of findings for the reporter step.
          {
            echo "["
            FIRST=true
            for f in "${FINDINGS[@]}"; do
              FILE="${f%%|*}"
              REST="${f#*|}"
              LINE="${REST%%:*}"
              CONTENT="${REST#*:}"
              CONTENT_TRIMMED=$(echo "$CONTENT" | sed 's/^[[:space:]]*//')
              CONTENT_ESCAPED=$(echo "$CONTENT_TRIMMED" | jq -Rs .)
              if [ "$FIRST" = "true" ]; then
                FIRST=false
              else
                echo ","
              fi
              printf '  {"file":"%s","line":%s,"content":%s}' "$FILE" "$LINE" "$CONTENT_ESCAPED"
            done
            echo ""
            echo "]"
          } > "$ARTIFACT_FILE"

          {
            echo "### :warning: Pre-release Version Pins${LABEL}"
            echo ""
            echo "| File | Line | Content |"
            echo "|------|------|---------|"
            for f in "${FINDINGS[@]}"; do
              FILE="${f%%|*}"
              REST="${f#*|}"
              LINE="${REST%%:*}"
              CONTENT="${REST#*:}"
              CONTENT=$(echo "$CONTENT" | sed 's/^[[:space:]]*//' | sed 's/|/\\|/g')
              echo "| \`${FILE}\` | ${LINE} | \`${CONTENT}\` |"
            done
            echo ""
            echo "> Only stable versions (\`x.y.z\`) and SHA-based pins are allowed. Replace pre-release suffixes (\`-alpha\`, \`-beta\`, \`-rc\`, \`-dev\`, etc.) with stable releases."
          } >> "$GITHUB_STEP_SUMMARY"

          for f in "${FINDINGS[@]}"; do
            FILE="${f%%|*}"
            REST="${f#*|}"
            LINE="${REST%%:*}"
            CONTENT="${REST#*:}"
            echo "::warning file=${FILE},line=${LINE}::Unstable version pin: $(echo "$CONTENT" | sed 's/^[[:space:]]*//')"
          done
        else
          echo "has_findings=false" >> "$GITHUB_OUTPUT"
          echo "[]" > "$ARTIFACT_FILE"
          echo "No pre-release version pins found."
        fi
