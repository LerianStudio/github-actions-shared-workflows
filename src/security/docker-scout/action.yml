name: Docker Scout Analysis
description: Run Docker Scout quickview and CVE analysis on a locally built image.

inputs:
  image:
    description: Image reference to scan (local tag)
    required: true
  dockerhub-user:
    description: DockerHub username for Scout authentication
    required: true
  dockerhub-password:
    description: DockerHub password for Scout authentication
    required: true
  github-token:
    description: GitHub token
    required: false
    default: ${{ github.token }}
  only-severities:
    description: Severities to include (csv)
    required: false
    default: "critical,high,medium,low"
  exit-code:
    description: Fail the step if vulnerabilities are found
    required: false
    default: "false"
  write-comment:
    description: Post results as a PR comment (via Scout)
    required: false
    default: "false"
  sarif-file:
    description: Path to export SARIF file (empty = skip SARIF export)
    required: false
    default: ""
  enable-recommendations:
    description: Run Docker Scout recommendations to surface Dockerfile issues (non-root user, base image gaps, attestation status)
    required: false
    default: "true"
  compare-to-env:
    description: Environment name to compare against (empty = skip compare)
    required: false
    default: ""
  organization:
    description: Docker Hub organization for environments and compare (required when compare-to-env is set)
    required: false
    default: ""

outputs:
  cves:
    description: Markdown CVE details from Scout cves
    value: ${{ steps.cves.outputs.cves }}
  has-vulnerabilities:
    description: "'true' if vulnerabilities were found"
    value: ${{ steps.parse.outputs.has_vulnerabilities }}
  recommendations:
    description: Recommendations output from Scout (Dockerfile issues, missing attestations, non-root user)
    value: ${{ steps.recommendations.outputs.recommendations }}
  compare:
    description: Compare output showing delta between PR image and environment baseline
    value: ${{ steps.compare.outputs.compare }}

runs:
  using: composite
  steps:
    # ----------------- Vulnerability Analysis -----------------
    - name: Docker Scout CVEs
      id: cves
      if: always()
      continue-on-error: true
      uses: docker/scout-action@v1.20.2
      with:
        command: cves
        image: ${{ inputs.image }}
        dockerhub-user: ${{ inputs.dockerhub-user }}
        dockerhub-password: ${{ inputs.dockerhub-password }}
        github-token: ${{ inputs.github-token }}
        organization: ${{ inputs.organization }}
        only-severities: ${{ inputs.only-severities }}
        exit-code: ${{ inputs.exit-code }}
        write-comment: ${{ inputs.write-comment }}

    # ----------------- SARIF Export -----------------
    - name: Docker Scout SARIF Export
      if: always() && inputs.sarif-file != ''
      uses: docker/scout-action@v1.20.2
      with:
        command: cves
        image: ${{ inputs.image }}
        dockerhub-user: ${{ inputs.dockerhub-user }}
        dockerhub-password: ${{ inputs.dockerhub-password }}
        github-token: ${{ inputs.github-token }}
        only-severities: ${{ inputs.only-severities }}
        sarif-file: ${{ inputs.sarif-file }}

    # ----------------- Recommendations -----------------
    - name: Docker Scout Recommendations
      id: recommendations
      if: always() && inputs.enable-recommendations == 'true'
      continue-on-error: true
      uses: docker/scout-action@v1.20.2
      with:
        command: recommendations
        image: ${{ inputs.image }}
        dockerhub-user: ${{ inputs.dockerhub-user }}
        dockerhub-password: ${{ inputs.dockerhub-password }}
        github-token: ${{ inputs.github-token }}
        organization: ${{ inputs.organization }}
        write-comment: false

    # ----------------- Environment Compare -----------------
    - name: Docker Scout Compare
      id: compare
      if: always() && inputs.compare-to-env != '' && inputs.organization != ''
      continue-on-error: true
      uses: docker/scout-action@v1.20.2
      with:
        command: compare
        image: ${{ inputs.image }}
        to-env: ${{ inputs.compare-to-env }}
        organization: ${{ inputs.organization }}
        dockerhub-user: ${{ inputs.dockerhub-user }}
        dockerhub-password: ${{ inputs.dockerhub-password }}
        github-token: ${{ inputs.github-token }}
        only-severities: ${{ inputs.only-severities }}
        ignore-unchanged: true
        write-comment: false

    # ----------------- Result Parsing -----------------
    - name: Parse results
      id: parse
      if: always()
      shell: bash
      run: |
        CVES_OUTPUT='${{ steps.cves.outputs.cves }}'

        HAS_VULNS="false"
        if echo "$CVES_OUTPUT" | grep -qiE '(critical|high|medium|low)\s+[1-9]'; then
          HAS_VULNS="true"
        fi

        echo "has_vulnerabilities=$HAS_VULNS" >> "$GITHUB_OUTPUT"
