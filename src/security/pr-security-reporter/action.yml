name: PR Security Reporter
description: Posts a formatted security scan summary comment on the pull request, updating it on subsequent runs.

inputs:
  github-token:
    description: GitHub token with pull-requests:write and issues:write permissions
    required: true
  app-name:
    description: Application name used to locate scan artifact files and scope the PR comment
    required: true
  enable-docker-scan:
    description: Whether Docker image scan artifacts are present and should be included in the report
    required: false
    default: "true"
  enable-docker-scout:
    description: Whether Docker Scout analysis results are present and should be included in the report
    required: false
    default: "false"
  scout-outputs-dir:
    description: Directory containing Scout output files (quickview.html, cves.html, recommendations.html, compare.html, has-vulnerabilities.txt)
    required: false
    default: ""
  fail-on-policy-failure:
    description: Fail when Docker Scout policies are not fully met
    required: false
    default: "false"

outputs:
  has-findings:
    description: True if any security vulnerabilities were found
    value: ${{ steps.parse-outputs.outputs.has_findings }}
  has-errors:
    description: True if any scan artifacts were missing or could not be parsed
    value: ${{ steps.parse-outputs.outputs.has_errors }}

runs:
  using: composite
  steps:
    - name: Post security report to PR
      id: report
      uses: actions/github-script@v8
      env:
        APP_NAME: ${{ inputs.app-name }}
        ENABLE_DOCKER_SCAN: ${{ inputs.enable-docker-scan }}
        ENABLE_DOCKER_SCOUT: ${{ inputs.enable-docker-scout }}
        SCOUT_OUTPUTS_DIR: ${{ inputs.scout-outputs-dir }}
        FAIL_ON_POLICY: ${{ inputs.fail-on-policy-failure }}
      with:
        github-token: ${{ inputs.github-token }}
        result-encoding: string
        script: |
          const fs = require('fs');

          // ── Configuration ──
          const appName = process.env.APP_NAME;
          const dockerScanEnabled = process.env.ENABLE_DOCKER_SCAN === 'true';
          const dockerScoutEnabled = process.env.ENABLE_DOCKER_SCOUT === 'true';
          const failOnPolicy = process.env.FAIL_ON_POLICY === 'true';

          let body = '';
          let hasFindings = false;
          let hasScanErrors = false;

          // ── Helpers ──
          const SEVERITY_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
          const SEVERITY_ICONS = { CRITICAL: '\u{1F534}', HIGH: '\u{1F7E0}', MEDIUM: '\u{1F7E1}', LOW: '\u{1F535}', UNKNOWN: '\u26AA' };

          const md = (value) =>
            String(value ?? '').replace(/\|/g, '\\|').replace(/\r?\n/g, ' ').replace(/`/g, '\\`');

          const truncate = (str, max) =>
            str.length > max ? str.substring(0, max - 3) + '...' : str;

          const sortBySeverity = (items, key = 'severity', order = SEVERITY_ORDER) =>
            items.sort((a, b) => (order[a[key]] ?? 5) - (order[b[key]] ?? 5));

          const details = (summary, content) =>
            `<details>\n<summary>${summary}</summary>\n\n${content}\n\n</details>\n\n`;

          // ── Trivy: Filesystem Scan ──
          function buildTrivyFsScan() {
            try {
              const file = `trivy-fs-vuln-${appName}.json`;
              if (!fs.existsSync(file)) {
                hasScanErrors = true;
                return `#### Filesystem Scan\n\n\u26A0\uFE0F Scan artifact not found.\n\n`;
              }

              const data = JSON.parse(fs.readFileSync(file, 'utf8'));
              const vulns = [];

              for (const result of (data.Results || [])) {
                for (const v of (result.Vulnerabilities || [])) {
                  vulns.push({
                    library: v.PkgName || 'Unknown',
                    id: v.VulnerabilityID || 'N/A',
                    severity: v.Severity || 'UNKNOWN',
                    installed: v.InstalledVersion || 'N/A',
                    fixed: v.FixedVersion || 'N/A',
                    title: v.Title || v.Description || 'No description',
                  });
                }
                for (const s of (result.Secrets || [])) {
                  vulns.push({
                    library: s.RuleID || 'Secret',
                    id: s.Category || 'SECRET',
                    severity: s.Severity || 'HIGH',
                    installed: '[REDACTED]',
                    fixed: 'Remove/rotate',
                    title: s.Title || 'Secret detected',
                  });
                }
              }

              if (vulns.length === 0) {
                return `#### Filesystem Scan\n\n\u2705 No vulnerabilities or secrets found.\n\n`;
              }

              hasFindings = true;
              sortBySeverity(vulns);

              const MAX = 50;
              let out = `#### Filesystem Scan\n\n`;
              out += `| Severity | Library | Vulnerability | Installed | Fixed | Title |\n`;
              out += `|----------|---------|---------------|-----------|-------|-------|\n`;

              for (const v of vulns.slice(0, MAX)) {
                const icon = SEVERITY_ICONS[v.severity] || '\u26AA';
                out += `| ${icon} ${md(v.severity)} | \`${md(v.library)}\` | ${md(v.id)} | ${md(v.installed)} | ${md(v.fixed)} | ${md(truncate(v.title, 60))} |\n`;
              }

              if (vulns.length > MAX) out += `\n_... and ${vulns.length - MAX} more findings._\n`;
              return out + `\n`;
            } catch (e) {
              hasScanErrors = true;
              return `#### Filesystem Scan\n\n\u26A0\uFE0F Could not parse scan results: ${e.message}\n\n`;
            }
          }

          // ── Trivy: Docker Image Scan ──
          function buildTrivyDockerScan() {
            if (!dockerScanEnabled) return '';

            try {
              const file = `trivy-vulnerability-scan-docker-${appName}.sarif`;
              if (!fs.existsSync(file)) {
                hasScanErrors = true;
                return `#### Docker Image Scan\n\n\u26A0\uFE0F Scan artifact not found.\n\n`;
              }

              const sarif = JSON.parse(fs.readFileSync(file, 'utf8'));
              const vulns = [];
              const severityMap = { error: 'CRITICAL/HIGH', warning: 'MEDIUM' };

              for (const run of (sarif.runs || [])) {
                for (const result of (run.results || [])) {
                  const rule = (run.tool?.driver?.rules || []).find(r => r.id === result.ruleId);
                  vulns.push({
                    id: result.ruleId || 'N/A',
                    severity: severityMap[result.level] || 'LOW',
                    title: rule?.shortDescription?.text || result.message?.text || 'No description',
                  });
                }
              }

              if (vulns.length === 0) {
                return `#### Docker Image Scan\n\n\u2705 No vulnerabilities found.\n\n`;
              }

              hasFindings = true;
              const dockerOrder = { 'CRITICAL/HIGH': 0, CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
              sortBySeverity(vulns, 'severity', dockerOrder);

              const MAX = 20;
              let out = `#### Docker Image Scan\n\n`;
              out += `| Severity | Vulnerability | Title |\n`;
              out += `|----------|---------------|-------|\n`;

              for (const v of vulns.slice(0, MAX)) {
                out += `| ${md(v.severity)} | ${md(v.id)} | ${md(truncate(v.title, 80))} |\n`;
              }

              if (vulns.length > MAX) out += `\n_... and ${vulns.length - MAX} more findings._\n`;
              return out + `\n`;
            } catch (e) {
              hasScanErrors = true;
              return `#### Docker Image Scan\n\n\u26A0\uFE0F Could not parse scan results: ${e.message}\n\n`;
            }
          }

          // ── Docker Scout Analysis ──
          function readScoutFile(name) {
            const dir = process.env.SCOUT_OUTPUTS_DIR || '';
            if (!dir) return '';
            const path = `${dir}/${name}`;
            try { return fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : ''; }
            catch { return ''; }
          }

          function buildScoutSection() {
            if (!dockerScoutEnabled || !dockerScanEnabled) return '';

            const cves = readScoutFile('cves.html');
            const hasVulns = readScoutFile('has-vulnerabilities.txt') === 'true';
            const compare = readScoutFile('compare.html');

            let out = `---\n\n## Docker Scout Analysis\n\n`;

            // Compare with Environment (includes policy evaluation)
            if (compare) {
              // Extract env and PR image tags from compare output
              const tagMatches = compare.match(/`[^`]+:([^`]+)`/g) || [];
              const envTag = tagMatches[0] ? tagMatches[0].replace(/`/g, '').split(':').pop() : 'environment';
              const prTag = 'PR image';

              // Parse policy rows — format: |Policy Name | env_status | PR_status | Change | Standing |
              const policyRows = compare.match(/\|[^|]+\|[^|]*:(?:warning|question|white_check_mark):[^|]*\|[^|]*:(?:warning|question|white_check_mark):[^|]*\|[^\n]*/g) || [];
              let checkCount = 0, issueCount = 0;
              const envPolicyLines = [];
              const prPolicyLines = [];
              for (const row of policyRows) {
                const cols = row.split('|').map(c => c.trim());
                const name = cols[1] || '';
                const envCol = cols[2] || '';
                const prCol = cols[3] || '';
                // Skip policies that can't be evaluated on local builds
                if (prCol.includes(':question:') || /supply chain/i.test(name) || /outdated base/i.test(name) || /unapproved base/i.test(name)) continue;

                const prOk = prCol.includes(':white_check_mark:');
                if (prOk) checkCount++;
                else issueCount++;

                const cleanStatus = (col) => {
                  if (col.includes(':white_check_mark:')) return '\u2705 Passed';
                  const devMatch = col.match(/\d+/);
                  return '\u26A0\uFE0F Failed' + (devMatch ? ` (${devMatch[0]} deviations)` : '');
                };

                prPolicyLines.push(`| ${name} | ${cleanStatus(envCol)} | ${cleanStatus(prCol)} |`);
              }
              const totalPolicies = checkCount + issueCount;
              const hasCompareIssues = issueCount > 0;

              // Policy summary table (always visible)
              if (totalPolicies > 0) {
                const icon = hasCompareIssues ? '\u26A0\uFE0F' : '\u2705';
                out += `#### ${icon} Policies \u2014 ${checkCount}/${totalPolicies} met\n\n`;
                out += `| Policy | \u{1F4E6} \`${envTag}\` | \u{1F6E0}\uFE0F ${prTag} |\n|---|---|---|\n`;
                out += prPolicyLines.join('\n') + '\n\n';
              }

              if (failOnPolicy && hasCompareIssues) {
                hasFindings = true;
                out += `> \u26A0\uFE0F **Docker Scout policies not fully met.**\n\n`;
              }

              // Full compare details (collapsible)
              out += details('Compare with Environment', compare);
            } else {
              out += `\u2139\uFE0F Policy evaluation available after first release build with Scout environment enabled.\n\n`;
            }

            // CVE Details
            if (cves && hasVulns) {
              hasFindings = true;
              out += details('\u{1F6A8} CVE Details \u2014 vulnerabilities found', cves);
              out += `> \u{1F6A8} **Docker Scout detected vulnerabilities. Review CVE Details above.**\n\n`;
            } else if (cves) {
              out += `#### CVE Details\n\n\u2705 No CVEs found \u2014 image is clean.\n\n`;
            } else {
              hasScanErrors = true;
              out += `\u26A0\uFE0F Docker Scout CVE results not available.\n\n`;
            }

            return out;
          }

          // ── Build Report ──
          body += `## \u{1F512} Security Scan Results \u2014 \`${appName}\`\n\n`;
          body += `## Trivy\n\n`;
          body += buildTrivyFsScan();
          body += buildTrivyDockerScan();
          body += buildScoutSection();

          // ── Post Comment ──
          const marker = `<!-- security-scan-${appName} -->`;
          body = marker + '\n' + body;

          try {
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
          } catch (e) {
            core.warning(`Could not post PR security comment: ${e.message}`);
          }

          // ── Outputs (return JSON for next step to parse) ──
          return JSON.stringify({ has_findings: hasFindings, has_errors: hasScanErrors });

    - name: Parse outputs
      id: parse-outputs
      shell: bash
      run: |
        RESULT='${{ steps.report.outputs.result }}'
        HAS_FINDINGS=$(echo "$RESULT" | jq -r '.has_findings // false')
        HAS_ERRORS=$(echo "$RESULT" | jq -r '.has_errors // false')
        echo "has_findings=$HAS_FINDINGS" >> "$GITHUB_OUTPUT"
        echo "has_errors=$HAS_ERRORS" >> "$GITHUB_OUTPUT"
        echo "Parsed outputs: has_findings=$HAS_FINDINGS, has_errors=$HAS_ERRORS"
