name: PR Security Reporter
description: Posts a formatted security scan summary comment on the pull request, updating it on subsequent runs.

inputs:
  github-token:
    description: GitHub token with pull-requests:write and issues:write permissions
    required: true
  app-name:
    description: Application name used to locate scan artifact files and scope the PR comment
    required: true
  enable-docker-scan:
    description: Whether Docker image scan artifacts are present and should be included in the report
    required: false
    default: "true"
  enable-health-score:
    description: Whether Docker Hub Health Score compliance checks should be included in the report
    required: false
    default: "false"
  dockerfile-has-non-root-user:
    description: Whether the Dockerfile sets a non-root USER directive
    required: false
    default: "false"
  fail-on-findings:
    description: 'Fail the step with exit code 1 when security findings are detected (true/false)'
    required: false
    default: "false"

outputs:
  has-findings:
    description: True if any security vulnerabilities were found
    value: ${{ steps.parse-outputs.outputs.has_findings }}
  has-errors:
    description: True if any scan artifacts were missing or could not be parsed
    value: ${{ steps.parse-outputs.outputs.has_errors }}

runs:
  using: composite
  steps:
    - name: Post security report to PR
      id: report
      uses: actions/github-script@v8
      env:
        APP_NAME: ${{ inputs.app-name }}
        ENABLE_DOCKER_SCAN: ${{ inputs.enable-docker-scan }}
        ENABLE_HEALTH_SCORE: ${{ inputs.enable-health-score }}
        DOCKERFILE_HAS_NON_ROOT_USER: ${{ inputs.dockerfile-has-non-root-user }}
      with:
        github-token: ${{ inputs.github-token }}
        result-encoding: string
        script: |
          const fs = require('fs');

          // ── Configuration ──
          const appName = process.env.APP_NAME;
          const dockerScanEnabled = process.env.ENABLE_DOCKER_SCAN === 'true';
          const healthScoreEnabled = process.env.ENABLE_HEALTH_SCORE === 'true';
          const dockerfileHasNonRootUser = process.env.DOCKERFILE_HAS_NON_ROOT_USER === 'true';

          let body = '';
          let hasFindings = false;
          let hasScanErrors = false;

          // ── Helpers ──
          const SEVERITY_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
          const SEVERITY_ICONS = { CRITICAL: '\u{1F534}', HIGH: '\u{1F7E0}', MEDIUM: '\u{1F7E1}', LOW: '\u{1F535}', UNKNOWN: '\u26AA' };

          const md = (value) =>
            String(value ?? '').replace(/\|/g, '\\|').replace(/\r?\n/g, ' ').replace(/`/g, '\\`');

          const truncate = (str, max) =>
            str.length > max ? str.substring(0, max - 3) + '...' : str;

          const sortBySeverity = (items, key = 'severity', order = SEVERITY_ORDER) =>
            items.sort((a, b) => (order[a[key]] ?? 5) - (order[b[key]] ?? 5));

          // ── Trivy: Filesystem Scan ──
          function buildTrivyFsScan() {
            try {
              const file = `trivy-fs-vuln-${appName}.json`;
              if (!fs.existsSync(file)) {
                hasScanErrors = true;
                return `#### Filesystem Scan\n\n\u26A0\uFE0F Scan artifact not found.\n\n`;
              }

              const data = JSON.parse(fs.readFileSync(file, 'utf8'));
              const vulns = [];

              for (const result of (data.Results || [])) {
                for (const v of (result.Vulnerabilities || [])) {
                  vulns.push({
                    library: v.PkgName || 'Unknown',
                    id: v.VulnerabilityID || 'N/A',
                    severity: v.Severity || 'UNKNOWN',
                    installed: v.InstalledVersion || 'N/A',
                    fixed: v.FixedVersion || 'N/A',
                    title: v.Title || v.Description || 'No description',
                  });
                }
                for (const s of (result.Secrets || [])) {
                  vulns.push({
                    library: s.RuleID || 'Secret',
                    id: s.Category || 'SECRET',
                    severity: s.Severity || 'HIGH',
                    installed: '[REDACTED]',
                    fixed: 'Remove/rotate',
                    title: s.Title || 'Secret detected',
                  });
                }
              }

              if (vulns.length === 0) {
                return `#### Filesystem Scan\n\n\u2705 No vulnerabilities or secrets found.\n\n`;
              }

              hasFindings = true;
              sortBySeverity(vulns);

              const MAX = 50;
              let out = `#### Filesystem Scan\n\n`;
              out += `| Severity | Library | Vulnerability | Installed | Fixed | Title |\n`;
              out += `|----------|---------|---------------|-----------|-------|-------|\n`;

              for (const v of vulns.slice(0, MAX)) {
                const icon = SEVERITY_ICONS[v.severity] || '\u26AA';
                out += `| ${icon} ${md(v.severity)} | \`${md(v.library)}\` | ${md(v.id)} | ${md(v.installed)} | ${md(v.fixed)} | ${md(truncate(v.title, 60))} |\n`;
              }

              if (vulns.length > MAX) out += `\n_... and ${vulns.length - MAX} more findings._\n`;
              return out + `\n`;
            } catch (e) {
              hasScanErrors = true;
              return `#### Filesystem Scan\n\n\u26A0\uFE0F Could not parse scan results: ${e.message}\n\n`;
            }
          }

          // ── Trivy: Docker Image Scan ──
          function buildTrivyDockerScan() {
            if (!dockerScanEnabled) return '';

            try {
              const file = `trivy-vulnerability-scan-docker-${appName}.sarif`;
              if (!fs.existsSync(file)) {
                hasScanErrors = true;
                return `#### Docker Image Scan\n\n\u26A0\uFE0F Scan artifact not found.\n\n`;
              }

              const sarif = JSON.parse(fs.readFileSync(file, 'utf8'));
              const vulns = [];
              const severityMap = { error: 'CRITICAL/HIGH', warning: 'MEDIUM' };

              for (const run of (sarif.runs || [])) {
                for (const result of (run.results || [])) {
                  const rule = (run.tool?.driver?.rules || []).find(r => r.id === result.ruleId);
                  vulns.push({
                    id: result.ruleId || 'N/A',
                    severity: severityMap[result.level] || 'LOW',
                    title: rule?.shortDescription?.text || result.message?.text || 'No description',
                  });
                }
              }

              if (vulns.length === 0) {
                return `#### Docker Image Scan\n\n\u2705 No vulnerabilities found.\n\n`;
              }

              hasFindings = true;
              const dockerOrder = { 'CRITICAL/HIGH': 0, CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
              sortBySeverity(vulns, 'severity', dockerOrder);

              const MAX = 20;
              let out = `#### Docker Image Scan\n\n`;
              out += `| Severity | Vulnerability | Title |\n`;
              out += `|----------|---------------|-------|\n`;

              for (const v of vulns.slice(0, MAX)) {
                out += `| ${md(v.severity)} | ${md(v.id)} | ${md(truncate(v.title, 80))} |\n`;
              }

              if (vulns.length > MAX) out += `\n_... and ${vulns.length - MAX} more findings._\n`;
              return out + `\n`;
            } catch (e) {
              hasScanErrors = true;
              return `#### Docker Image Scan\n\n\u26A0\uFE0F Could not parse scan results: ${e.message}\n\n`;
            }
          }

          // ── Docker Hub Health Score Compliance ──
          function buildHealthScoreSection() {
            if (!healthScoreEnabled || !dockerScanEnabled) return '';

            const policies = [];
            let passCount = 0;

            // Policy 1: Default non-root user
            const nonRootPassed = dockerfileHasNonRootUser;
            policies.push({ name: 'Default non-root user', status: nonRootPassed ? '\u2705 Passed' : '\u26A0\uFE0F Failed', passed: nonRootPassed });
            if (nonRootPassed) passCount++;

            // Policy 2: No fixable critical or high vulnerabilities (from Trivy Docker SARIF)
            let fixableCvesPassed = true;
            try {
              const sarifFile = `trivy-vulnerability-scan-docker-${appName}.sarif`;
              if (fs.existsSync(sarifFile)) {
                const sarif = JSON.parse(fs.readFileSync(sarifFile, 'utf8'));
                let critHighCount = 0;
                for (const run of (sarif.runs || [])) {
                  for (const result of (run.results || [])) {
                    if (result.level === 'error') critHighCount++;
                  }
                }
                fixableCvesPassed = critHighCount === 0;
              }
            } catch {}
            policies.push({ name: 'No fixable critical/high CVEs', status: fixableCvesPassed ? '\u2705 Passed' : '\u26A0\uFE0F Failed', passed: fixableCvesPassed });
            if (fixableCvesPassed) passCount++;

            // Policy 3: No high-profile vulnerabilities (cross-reference Trivy CVEs with CISA KEV catalog)
            let kevPassed = true;
            try {
              const kevFile = 'cisa-kev.json';
              const sarifFile = `trivy-vulnerability-scan-docker-${appName}.sarif`;
              if (fs.existsSync(kevFile) && fs.existsSync(sarifFile)) {
                const kev = JSON.parse(fs.readFileSync(kevFile, 'utf8'));
                const kevIds = new Set((kev.vulnerabilities || []).map(v => v.cveID));
                const sarif = JSON.parse(fs.readFileSync(sarifFile, 'utf8'));
                for (const run of (sarif.runs || [])) {
                  for (const result of (run.results || [])) {
                    if (kevIds.has(result.ruleId)) {
                      kevPassed = false;
                      break;
                    }
                  }
                  if (!kevPassed) break;
                }
              }
            } catch {}
            policies.push({ name: 'No high-profile vulnerabilities', status: kevPassed ? '\u2705 Passed' : '\u26A0\uFE0F Failed', passed: kevPassed });
            if (kevPassed) passCount++;

            // Policy 4: No AGPL v3 licenses (from Trivy license scan)
            let licensePassed = true;
            try {
              const licFile = `trivy-license-scan-docker-${appName}.json`;
              if (fs.existsSync(licFile)) {
                const data = JSON.parse(fs.readFileSync(licFile, 'utf8'));
                for (const result of (data.Results || [])) {
                  for (const lic of (result.Licenses || [])) {
                    if (/AGPL-3/i.test(lic.Name) || /AGPL-3/i.test(lic.Category)) {
                      licensePassed = false;
                      break;
                    }
                  }
                  if (!licensePassed) break;
                }
              }
            } catch {}
            policies.push({ name: 'No AGPL v3 licenses', status: licensePassed ? '\u2705 Passed' : '\u26A0\uFE0F Failed', passed: licensePassed });
            if (licensePassed) passCount++;

            const totalPolicies = policies.length;
            const failCount = totalPolicies - passCount;
            const icon = failCount > 0 ? '\u26A0\uFE0F' : '\u2705';

            let out = `---\n\n## Docker Hub Health Score Compliance\n\n`;
            out += `#### ${icon} Policies \u2014 ${passCount}/${totalPolicies} met\n\n`;
            out += `| Policy | Status |\n|--------|--------|\n`;
            for (const p of policies) {
              out += `| ${p.name} | ${p.status} |\n`;
            }
            out += '\n';

            if (failCount > 0) {
              hasFindings = true;
              out += `> \u26A0\uFE0F **Some Docker Hub health score policies are not met. Review the table above.**\n\n`;
            }

            return out;
          }

          // ── Build Report ──
          body += `## \u{1F512} Security Scan Results \u2014 \`${appName}\`\n\n`;
          body += `## Trivy\n\n`;
          body += buildTrivyFsScan();
          body += buildTrivyDockerScan();
          body += buildHealthScoreSection();

          // ── Useful Links ──
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          body += `---\n\n`;
          body += `<sub>\u{1F50D} [View full scan logs](${runUrl})</sub>\n\n`;

          // ── Post Comment ──
          const marker = `<!-- security-scan-${appName} -->`;
          body = marker + '\n' + body;

          try {
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
          } catch (e) {
            core.warning(`Could not post PR security comment: ${e.message}`);
          }

          // ── Outputs (return JSON for next step to parse) ──
          return JSON.stringify({ has_findings: hasFindings, has_errors: hasScanErrors });

    - name: Parse outputs
      id: parse-outputs
      shell: bash
      run: |
        RESULT='${{ steps.report.outputs.result }}'
        HAS_FINDINGS=$(echo "$RESULT" | jq -r '.has_findings // false')
        HAS_ERRORS=$(echo "$RESULT" | jq -r '.has_errors // false')
        echo "has_findings=$HAS_FINDINGS" >> "$GITHUB_OUTPUT"
        echo "has_errors=$HAS_ERRORS" >> "$GITHUB_OUTPUT"
        echo "Parsed outputs: has_findings=$HAS_FINDINGS, has_errors=$HAS_ERRORS"

    # ----------------- Security Gate -----------------
    - name: Gate - Fail on Security Findings
      if: inputs.fail-on-findings == 'true'
      shell: bash
      env:
        HAS_ERRORS: ${{ steps.parse-outputs.outputs.has_errors }}
        HAS_FINDINGS: ${{ steps.parse-outputs.outputs.has_findings }}
      run: |
        if [ "$HAS_ERRORS" = "true" ]; then
          echo "::error::Some scan artifacts were missing or could not be parsed. Failing to prevent bypass."
        fi
        if [ "$HAS_FINDINGS" = "true" ]; then
          echo "::error::Security vulnerabilities found. Check the PR comment for details."
        fi
        if [ "$HAS_ERRORS" = "true" ] || [ "$HAS_FINDINGS" = "true" ]; then
          exit 1
        fi
