name: Pinned Actions Check
description: Ensure all third-party action references use pinned versions (vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-rc.N).

inputs:
  files:
    description: Comma-separated list of workflow/composite files to check (empty = skip)
    required: false
    default: ""
  ignore-patterns:
    description: Pipe-separated org/owner prefixes to ignore (e.g. internal actions pinned to @main)
    required: false
    default: "LerianStudio/"

runs:
  using: composite
  steps:
    - name: Log files
      if: inputs.files != ''
      shell: bash
      env:
        FILES: ${{ inputs.files }}
      run: |
        files=$(printf '%s\n' "$FILES" | tr ',' '\n' | sed '/^$/d')
        count=$(echo "$files" | wc -l | tr -d ' ')
        echo "::group::Files analyzed by pinned-actions check (${count})"
        echo "$files" | sed 's/^/  - /'
        echo "::endgroup::"

    - name: Check for unpinned actions
      if: inputs.files != ''
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        IGNORE_PATTERNS_INPUT: ${{ inputs.ignore-patterns }}
      run: |
        IFS='|' read -ra IGNORE_PATTERNS <<< "$IGNORE_PATTERNS_INPUT"
        violations=0

        for file in $(printf '%s\n' "$FILES" | tr ',' ' '); do
          [ -f "$file" ] || continue
          while IFS= read -r line; do
            line_num=$(echo "$line" | cut -d: -f1)
            content=$(echo "$line" | cut -d: -f2-)

            # Extract the ref (part after the last @)
            ref=$(printf '%s\n' "$content" | sed 's/.*@//' | xargs)

            # Skip if ref matches a valid pinned version: vX.Y.Z, vX.Y.Z-beta.N, vX.Y.Z-rc.N
            if printf '%s\n' "$ref" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+|-rc\.[0-9]+)?$'; then
              continue
            fi

            skip=false
            for pattern in "${IGNORE_PATTERNS[@]}"; do
              if printf '%s\n' "$content" | grep -Fq "$pattern"; then
                skip=true
                break
              fi
            done
            [ "$skip" = true ] && continue

            echo "::error file=${file},line=${line_num}::Unpinned action found: $(echo "$content" | xargs)"
            violations=$((violations + 1))
          done < <(grep -n 'uses:.*@' "$file" 2>/dev/null || true)
        done

        if [ "$violations" -gt 0 ]; then
          echo "::error::Found $violations unpinned action(s). Pin to a specific version tag (vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-rc.N)."
          exit 1
        fi
        echo "All actions are properly pinned."
