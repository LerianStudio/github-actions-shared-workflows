# Labeler configuration for github-actions-shared-workflows
# Used by actions/labeler in the pr-validation workflow
# Docs: https://github.com/actions/labeler

# ── Workflows ──────────────────────────────────────────────────────────────────

workflow:
  - changed-files:
    - any-glob-to-any-file: ".github/workflows/*.yml"

# ── Ecosystems ─────────────────────────────────────────────────────────────────

golang:
  - changed-files:
    - any-glob-to-any-file: ".github/workflows/go-*.yml"

typescript:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/typescript-*.yml"
      - ".github/workflows/frontend-*.yml"

security:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/go-security.yml"
      - ".github/workflows/pr-security-scan.yml"
      - "SECURITY.md"

# ── Change types ───────────────────────────────────────────────────────────────

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - "docs/**"
      - "*.md"
      - ".github/**/*.md"

dependencies:
  - changed-files:
    - any-glob-to-any-file: ".github/dependabot.yml"

github-config:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/labeler.yml"
      - ".github/CODEOWNERS"
      - ".releaserc.yml"
      - ".gitignore"
