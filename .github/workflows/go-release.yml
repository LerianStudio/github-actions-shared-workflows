name: "Go Release"

# Umbrella reusable workflow for Go service repositories.
# On branch pushes it runs semantic-release (gated by a non-doc change detector);
# on tag pushes it builds and pushes the container image and then updates the
# GitOps repository. A caller only needs to reference this single workflow.

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      dry_run:
        description: 'Reserved. Downstream release/build/gitops workflows do not yet expose a dry-run mode.'
        required: false
        type: boolean
        default: false

      # ----------------- Change gate -----------------
      ignore_globs:
        description: 'Space-separated glob patterns treated as docs/meta; when only these change on a branch push, the release is skipped.'
        type: string
        default: '*.md docs/* .github/* LICENSE* .gitignore'

      # ----------------- Release (release.yml) -----------------
      semantic_version:
        description: 'Semantic release version to use'
        type: string
        default: '23.0.8'
      enable_changelog:
        description: 'Generate CHANGELOG.md files via GPT after a successful release'
        type: boolean
        default: false
      enable_major_tag:
        description: 'Force-update the floating major version tag (e.g. v1) after a successful release'
        type: boolean
        default: false
      stable_releases_only:
        description: 'Only generate changelogs for stable releases (skip beta/rc/alpha tags)'
        type: boolean
        default: true

      # ----------------- Build (build.yml) -----------------
      enable_dockerhub:
        description: 'Enable pushing to DockerHub'
        type: boolean
        default: true
      enable_ghcr:
        description: 'Enable pushing to GitHub Container Registry'
        type: boolean
        default: true
      enable_gitops_artifacts:
        description: 'Enable GitOps artifacts upload for the downstream gitops-update job'
        type: boolean
        default: false
      app_name:
        description: 'Override app/image name (single-app mode). Defaults to repository name.'
        type: string
        default: ''
      docker_build_args:
        description: 'Newline-separated Docker build arguments (e.g., "APP_NAME=spi"). Use BuildKit secrets for sensitive values.'
        type: string
        default: ''
      enable_cosign_sign:
        description: 'Sign container images with cosign keyless (OIDC) signing after push'
        type: boolean
        default: true
      app_name_prefix:
        description: 'Prefix for app names in monorepo (e.g., "midaz" -> "midaz-agent")'
        type: string
        default: ''
      app_name_overrides:
        description: 'Explicit app name mappings in "path:name" format. Overrides default extraction for matched paths.'
        type: string
        default: ''
      dockerhub_org:
        description: 'DockerHub organization name'
        type: string
        default: 'lerianstudio'
      path_level:
        description: 'Directory depth level to extract app name (e.g., 2 -> "apps/agent")'
        type: string
        default: '2'
      build_context_from_working_dir:
        description: 'Use the component working_dir as Docker build context instead of the repo root.'
        type: boolean
        default: false
      enable_helm_dispatch:
        description: 'Dispatch to the Helm repository for chart updates after build'
        type: boolean
        default: false
      helm_chart:
        description: 'Helm chart name to update (required when enable_helm_dispatch is true)'
        type: string
        default: ''
      helm_detect_env_changes:
        description: 'Detect new environment variables for Helm during dispatch'
        type: boolean
        default: true
      helm_values_key_mappings:
        description: 'JSON mapping of component names to values.yaml keys (e.g., {"my-app": "api"})'
        type: string
        default: ''
      extra_builds:
        description: 'JSON array of additional build groups, each forwarded to build.yml with its own config (filter_paths, path_level, app_name_overrides, build_context_from_working_dir, helm_*). Runs alongside the primary build on tag push; all groups feed the single gitops-update. Empty = one build only (default).'
        type: string
        default: ''

      # ----------------- GitOps Update (gitops-update.yml) -----------------
      enable_gitops_update:
        description: 'Run the gitops-update job on tag push'
        type: boolean
        default: true
      gitops_repository:
        description: 'GitOps repository to update (org/repo format)'
        type: string
        default: 'LerianStudio/midaz-firmino-gitops'
      gitops_artifact_pattern:
        description: 'Pattern to download GitOps artifacts (defaults to "gitops-tags-<repo-name>*")'
        type: string
        default: ''
      gitops_yaml_key_mappings:
        description: 'JSON object mapping artifact names to YAML keys (e.g., {"app.tag": ".api.image.tag"})'
        type: string
        default: ''
      gitops_runner_type:
        description: 'Runner for the gitops-update (deploy) job. Deploy needs cluster access, so this defaults to firmino-lxc-runners rather than the build runner.'
        type: string
        default: 'firmino-lxc-runners'
      enable_argocd_sync:
        description: 'Trigger ArgoCD sync after updating the GitOps repository'
        type: boolean
        default: true
      commit_message_prefix:
        description: 'Prefix for the GitOps commit message (defaults to repository name when empty)'
        type: string
        default: ''
      deploy_in_firmino:
        description: 'Force-off override for Firmino. Set to false to suppress deployment even if the manifest includes this app on Firmino.'
        type: boolean
        default: true
      deploy_in_clotilde:
        description: 'Force-off override for Clotilde. Set to false to suppress deployment even if the manifest includes this app on Clotilde.'
        type: boolean
        default: true
      use_dynamic_mapping:
        description: 'Use dynamic artifact-to-YAML key mapping in gitops-update'
        type: boolean
        default: false
      configmap_updates:
        description: 'JSON object mapping artifact names to configmap keys (helmfile layout only)'
        type: string
        default: ''
      enable_docker_login:
        description: 'Log in to DockerHub in the gitops-update job (for private image digest reads)'
        type: boolean
        default: false

      # ----------------- Shared -----------------
      shared_paths:
        description: 'Newline-separated path patterns that trigger a release/build for all components.'
        type: string
        default: ''
      filter_paths:
        description: 'Newline-separated list of path prefixes to filter. Empty = single-app repo.'
        type: string
        default: ''
    secrets:
      MANAGE_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      HELM_REPO_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  # ----------------- Change Detection (release gate, branch push only) -----------------
  changes:
    name: Detect non-doc changes
    if: github.ref_type == 'branch'
    runs-on: ${{ inputs.runner_type }}
    permissions:
      contents: read
    outputs:
      code: ${{ steps.gate.outputs.code }}
    steps:
      - name: Non-doc change gate
        id: gate
        uses: LerianStudio/github-actions-shared-workflows/src/config/non-doc-changes@v1
        with:
          github-token: ${{ github.token }}
          ignore-globs: ${{ inputs.ignore_globs }}

  # ----------------- Release (branch push) -----------------
  release:
    needs: changes
    if: github.ref_type == 'branch' && needs.changes.outputs.code == 'true'
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
      packages: read
    uses: ./.github/workflows/release.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      semantic_version: ${{ inputs.semantic_version }}
      enable_changelog: ${{ inputs.enable_changelog }}
      enable_major_tag: ${{ inputs.enable_major_tag }}
      stable_releases_only: ${{ inputs.stable_releases_only }}
      shared_paths: ${{ inputs.shared_paths }}
      filter_paths: ${{ inputs.filter_paths }}
    secrets: inherit

  # ----------------- Build (tag push) -----------------
  build:
    if: github.ref_type == 'tag'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      enable_dockerhub: ${{ inputs.enable_dockerhub }}
      enable_ghcr: ${{ inputs.enable_ghcr }}
      enable_gitops_artifacts: ${{ inputs.enable_gitops_artifacts }}
      app_name: ${{ inputs.app_name }}
      app_name_prefix: ${{ inputs.app_name_prefix }}
      app_name_overrides: ${{ inputs.app_name_overrides }}
      dockerhub_org: ${{ inputs.dockerhub_org }}
      path_level: ${{ inputs.path_level }}
      build_context_from_working_dir: ${{ inputs.build_context_from_working_dir }}
      docker_build_args: ${{ inputs.docker_build_args }}
      enable_cosign_sign: ${{ inputs.enable_cosign_sign }}
      enable_helm_dispatch: ${{ inputs.enable_helm_dispatch }}
      helm_chart: ${{ inputs.helm_chart }}
      helm_detect_env_changes: ${{ inputs.helm_detect_env_changes }}
      helm_values_key_mappings: ${{ inputs.helm_values_key_mappings }}
      shared_paths: ${{ inputs.shared_paths }}
      filter_paths: ${{ inputs.filter_paths }}
    secrets: inherit

  # ----------------- Extra Builds (tag push, opt-in) -----------------
  extra_build:
    if: github.ref_type == 'tag' && inputs.extra_builds != ''
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(inputs.extra_builds) }}
    uses: ./.github/workflows/build.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      enable_dockerhub: ${{ inputs.enable_dockerhub }}
      enable_ghcr: ${{ inputs.enable_ghcr }}
      dockerhub_org: ${{ inputs.dockerhub_org }}
      enable_cosign_sign: ${{ inputs.enable_cosign_sign }}
      enable_gitops_artifacts: ${{ matrix.group.enable_gitops_artifacts || true }}
      filter_paths: ${{ matrix.group.filter_paths }}
      shared_paths: ${{ matrix.group.shared_paths || inputs.shared_paths }}
      path_level: ${{ matrix.group.path_level || inputs.path_level }}
      app_name: ${{ matrix.group.app_name }}
      app_name_prefix: ${{ matrix.group.app_name_prefix }}
      app_name_overrides: ${{ matrix.group.app_name_overrides }}
      build_context_from_working_dir: ${{ matrix.group.build_context_from_working_dir || false }}
      docker_build_args: ${{ matrix.group.docker_build_args }}
      enable_helm_dispatch: ${{ matrix.group.enable_helm_dispatch || false }}
      helm_chart: ${{ matrix.group.helm_chart }}
      helm_detect_env_changes: ${{ matrix.group.helm_detect_env_changes || true }}
      helm_values_key_mappings: ${{ matrix.group.helm_values_key_mappings }}
    secrets: inherit

  # ----------------- GitOps Update (tag push) -----------------
  update_gitops:
    needs: [build, extra_build]
    if: >-
      github.ref_type == 'tag' && inputs.enable_gitops_update && !cancelled() &&
      needs.build.result != 'failure' && needs.extra_build.result != 'failure' &&
      ((needs.build.result == 'success' && needs.build.outputs.has_builds == 'true') ||
       needs.extra_build.result == 'success')
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: write
    uses: ./.github/workflows/gitops-update.yml
    with:
      runner_type: ${{ inputs.gitops_runner_type }}
      gitops_repository: ${{ inputs.gitops_repository }}
      artifact_pattern: ${{ inputs.gitops_artifact_pattern }}
      yaml_key_mappings: ${{ inputs.gitops_yaml_key_mappings }}
      enable_argocd_sync: ${{ inputs.enable_argocd_sync }}
      commit_message_prefix: ${{ inputs.commit_message_prefix }}
      deploy_in_firmino: ${{ inputs.deploy_in_firmino }}
      deploy_in_clotilde: ${{ inputs.deploy_in_clotilde }}
      use_dynamic_mapping: ${{ inputs.use_dynamic_mapping }}
      configmap_updates: ${{ inputs.configmap_updates }}
      enable_docker_login: ${{ inputs.enable_docker_login }}
    secrets: inherit
