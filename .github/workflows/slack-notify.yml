name: "Slack Notification"

# Reusable workflow for sending Slack notifications
# Designed to be called from other workflows as a final notification step
#
# Features:
# - Rich formatting with repo, workflow, failed jobs, and author
# - Gracefully skips if SLACK_WEBHOOK_URL secret is not available
# - Notifies on both success and failure

on:
  workflow_call:
    inputs:
      status:
        description: 'Workflow status (success, failure, cancelled)'
        type: string
        required: true
      workflow_name:
        description: 'Name of the calling workflow'
        type: string
        required: true
      failed_jobs:
        description: 'Comma-separated list of failed job names (for failure notifications)'
        type: string
        required: false
        default: ''
      custom_message:
        description: 'Optional custom message to include'
        type: string
        required: false
        default: ''
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL for notifications'
        required: false

jobs:
  notify:
    name: Send Notification
    runs-on: ${{ inputs.runner_type }}
    steps:
      - name: Check if Slack webhook is configured
        id: check_webhook
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "âš ď¸Ź SLACK_WEBHOOK_URL not configured - skipping notification"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "âś… Slack webhook configured"
          fi

      - name: Determine notification settings
        if: steps.check_webhook.outputs.skip != 'true'
        id: settings
        env:
          INPUT_STATUS: ${{ inputs.status }}
        run: |
          case "$INPUT_STATUS" in
            success)
              COLOR="good"
              EMOJI="âś…"
              STATUS_TEXT="succeeded"
              ;;
            failure)
              COLOR="danger"
              EMOJI="âťŚ"
              STATUS_TEXT="failed"
              ;;
            cancelled)
              COLOR="#808080"
              EMOJI="âšŞ"
              STATUS_TEXT="was cancelled"
              ;;
            *)
              COLOR="warning"
              EMOJI="âš ď¸Ź"
              STATUS_TEXT="completed with status: $INPUT_STATUS"
              ;;
          esac

          {
            echo "color=$COLOR"
            echo "emoji=$EMOJI"
            echo "status_text=$STATUS_TEXT"
          } >> "$GITHUB_OUTPUT"

      - name: Build notification message
        if: steps.check_webhook.outputs.skip != 'true'
        id: message
        env:
          INPUT_WORKFLOW_NAME: ${{ inputs.workflow_name }}
          INPUT_STATUS: ${{ inputs.status }}
          INPUT_FAILED_JOBS: ${{ inputs.failed_jobs }}
          INPUT_CUSTOM_MESSAGE: ${{ inputs.custom_message }}
          STATUS_TEXT: ${{ steps.settings.outputs.status_text }}
          EMOJI: ${{ steps.settings.outputs.emoji }}
          GH_REPO: ${{ github.repository }}
          GH_ACTOR: ${{ github.actor }}
          GH_SERVER: ${{ github.server_url }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          REPO_NAME="${GH_REPO##*/}"
          SHORT_SHA="${GH_SHA:0:7}"
          RUN_URL="${GH_SERVER}/${GH_REPO}/actions/runs/${GH_RUN_ID}"

          # Handle different event types for ref info
          if [ "$GH_EVENT_NAME" = "pull_request" ]; then
            BRANCH="$GH_HEAD_REF"
          else
            BRANCH="$GH_REF_NAME"
          fi

          # Build message
          MESSAGE="$EMOJI *$INPUT_WORKFLOW_NAME* $STATUS_TEXT in *$REPO_NAME*"

          # Add failed jobs info if failure
          if [ "$INPUT_STATUS" = "failure" ] && [ -n "$INPUT_FAILED_JOBS" ]; then
            MESSAGE="$MESSAGE\nđź’Ą *Failed jobs:* $INPUT_FAILED_JOBS"
          fi

          MESSAGE="$MESSAGE\nđź‘¤ *Author:* $GH_ACTOR"
          MESSAGE="$MESSAGE\nđź“Ś *Branch:* \`$BRANCH\` | *Commit:* \`$SHORT_SHA\`"

          if [ -n "$INPUT_CUSTOM_MESSAGE" ]; then
            MESSAGE="$MESSAGE\n\n$INPUT_CUSTOM_MESSAGE"
          fi

          MESSAGE="$MESSAGE\n\n<$RUN_URL|đź”— View Workflow Run>"

          {
            echo "message<<EOF"
            echo -e "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        if: steps.check_webhook.outputs.skip != 'true'
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ steps.settings.outputs.color }}
          SLACK_TITLE: ${{ github.repository }}
          SLACK_MESSAGE: ${{ steps.message.outputs.message }}
          SLACK_FOOTER: "Workflow: ${{ inputs.workflow_name }}"
          MSG_MINIMAL: true

      - name: Log notification skipped
        if: steps.check_webhook.outputs.skip == 'true'
        run: echo "đź“­ Notification skipped - SLACK_WEBHOOK_URL not configured"
