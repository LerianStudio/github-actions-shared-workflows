name: "Build and Push Docker Images"

# This reusable workflow handles Docker image builds and pushes to registries
# Supports both DockerHub and GHCR (GitHub Container Registry)
#
# Features:
# - Monorepo support with optional change detection via internal changed-paths composite
# - Multi-registry support (DockerHub and/or GHCR)
# - Platform strategy: beta/rc builds amd64 only, release builds amd64+arm64
# - Semantic versioning tags
# - GitOps artifacts upload for downstream gitops-update workflow
# - Helm chart dispatch for automatic version updates in Helm repositories

on:
  workflow_call:
    outputs:
      has_builds:
        description: 'Whether any components were detected for building (true/false). Use this to skip downstream jobs when no paths changed.'
        value: ${{ jobs.prepare.outputs.has_builds }}
      matrix:
        description: 'JSON array of the app matrix that was actually built this run (each entry {"name": ..., "working_dir": ...}). Empty array ("[]") when has_builds is false. Lets downstream jobs (e.g. per-component e2e) scope themselves to only what changed.'
        value: ${{ jobs.prepare.outputs.matrix }}
    inputs:
      runner_type:
        description: 'Runner to use for the workflow'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'Newline-separated list of path prefixes to filter. If not provided, builds from root.'
        type: string
        required: false
        default: ''
      shared_paths:
        description: 'Newline-separated path patterns (e.g., "go.mod\ngo.sum") that trigger a build for ALL components when matched by any changed file.'
        type: string
        required: false
        default: ''
      path_level:
        description: 'Limits the path to the first N segments (e.g., 2 -> "apps/agent")'
        type: string
        default: '2'
      enable_dockerhub:
        description: 'Enable pushing to DockerHub'
        type: boolean
        default: true
      enable_ghcr:
        description: 'Enable pushing to GitHub Container Registry'
        type: boolean
        default: true
      dockerhub_org:
        description: 'DockerHub organization name'
        type: string
        default: 'lerianstudio'
      ghcr_org:
        description: 'GHCR organization name (defaults to repository owner)'
        type: string
        default: ''
      on_existing_tag:
        description: 'Behaviour when the target image tag already exists in an enabled registry (checked before build): "fail" (abort early, default), "skip" (skip build/push, still emit GitOps artifacts for an idempotent re-run), or "warn" (warn and build anyway).'
        type: string
        default: 'fail'
      dockerfile_name:
        description: 'Name of the Dockerfile'
        type: string
        default: 'Dockerfile'
      app_name:
        description: 'Override app/image name (single-app mode only, i.e. when filter_paths is empty). Defaults to repository name.'
        type: string
        required: false
        default: ''
      tag_prefix:
        description: 'Skip this build entirely (has_builds=false) when triggered by a tag that does not start with this prefix. Used by callers with multiple independently-tagged components sharing one workflow_call chain. Empty = build on every tag, as before.'
        type: string
        default: ''
      app_name_prefix:
        description: 'Prefix for app names in monorepo (e.g., "midaz" results in "midaz-agent")'
        type: string
        default: ''
      app_name_overrides:
        description: 'Explicit app name mappings in "path:name" format. Use "path:" for prefix-only. Overrides default extraction for matched paths.'
        type: string
        default: ''
      build_context:
        description: 'Docker build context (defaults to repository root for monorepo)'
        type: string
        default: '.'
      enable_gitops_artifacts:
        description: 'Enable GitOps artifacts upload for downstream gitops-update workflow'
        type: boolean
        default: false
      # Helm dispatch configuration
      enable_helm_dispatch:
        description: 'Enable dispatching to Helm repository for chart updates'
        type: boolean
        default: false
      helm_repository:
        description: 'Helm repository to dispatch to (org/repo format, e.g., LerianStudio/helm)'
        type: string
        default: 'LerianStudio/helm'
      helm_chart:
        description: 'Helm chart name to update'
        type: string
        default: ''
      helm_target_ref:
        description: 'Target branch in Helm repository (e.g., develop, main)'
        type: string
        default: 'main'
      helm_components_base_path:
        description: 'Base path for components in source repo (default: components)'
        type: string
        default: 'components'
      helm_env_file:
        description: 'Env example file name relative to component path (default: .env.example)'
        type: string
        default: '.env.example'
      helm_detect_env_changes:
        description: 'Whether to detect new environment variables for Helm'
        type: boolean
        default: true
      helm_dispatch_on_rc:
        description: 'Enable Helm dispatch for release-candidate (rc) tags'
        type: boolean
        default: false
      helm_dispatch_on_beta:
        description: 'Enable Helm dispatch for beta tags'
        type: boolean
        default: false
      helm_values_key_mappings:
        description: 'JSON mapping of component names to values.yaml keys. If not mapped, uses component name as fallback. Example: {"my-app": "api", "my-app-worker": "worker"}'
        type: string
        default: ''
      # Path normalization
      normalize_to_filter:
        description: 'Normalize changed paths to their filter path (e.g., components/app/cmd -> components/app). Recommended for monorepos to avoid duplicate builds.'
        type: boolean
        default: true
      force_full_matrix:
        description: 'When true, build all filter_paths components on every run regardless of what changed. Use for repos where components must always share the same image tag (e.g., auth + identity always released together).'
        type: boolean
        default: false
      force_multiplatform:
        description: 'Force multi-platform build (amd64+arm64) even for beta/rc tags'
        type: boolean
        default: false
      docker_build_args:
        description: 'Newline-separated Docker build arguments (e.g., "APP_NAME=spi\nCOMPONENT_NAME=api"). For sensitive values (tokens, keys, passwords), use BuildKit secrets instead — build arguments are visible in image history.'
        type: string
        required: false
        default: ''
      build_context_from_working_dir:
        description: 'Use the component working_dir as Docker build context instead of build_context. Useful for independent modules (e.g., tools with their own go.mod).'
        type: boolean
        default: false
      enable_cosign_sign:
        description: 'Sign container images with cosign keyless (OIDC) signing after push. Requires id-token: write permission in the caller.'
        type: boolean
        default: true
      cosign_max_attempts:
        description: 'Maximum cosign signing attempts per image reference. Increase to absorb transient OIDC/Fulcio/Rekor rate limits.'
        type: string
        default: '5'
      cosign_initial_delay:
        description: 'Initial delay (seconds) between cosign retries. Grows exponentially (×3) after each failed attempt, capped at cosign_max_delay, then randomized (equal jitter).'
        type: string
        default: '5'
      cosign_max_delay:
        description: 'Maximum delay (seconds) between cosign retries. Caps the exponential backoff before jitter is applied.'
        type: string
        default: '60'
      continue_gitops_on_signing_failure:
        description: 'When true, continue to GitOps artifact upload even if cosign signing fails after all retries. Image stays in registry unsigned and a warning is emitted; manual signing is required afterwards.'
        type: boolean
        default: false
      release_version:
        description: 'Explicit image version (semver, leading v optional). When set (e.g. same-run build after semantic-release on a branch push), used as the image tag instead of parsing the git tag from GITHUB_REF.'
        type: string
        default: ''
      checkout_ref:
        description: 'Git ref to build (e.g. the freshly-created release tag). Empty = the workflow run ref.'
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ${{ vars.GENERAL_RUNNERS || inputs.runner_type }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_builds: ${{ steps.set-matrix.outputs.has_builds }}
      platforms: ${{ steps.set-platforms.outputs.platforms }}
      is_release: ${{ steps.set-platforms.outputs.is_release }}
    steps:
      - name: Get changed paths (monorepo)
        if: inputs.filter_paths != ''
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@v1
        with:
          filter-paths: ${{ inputs.filter_paths }}
          shared-paths: ${{ inputs.shared_paths }}
          path-level: ${{ inputs.path_level }}
          get-app-name: 'true'
          app-name-prefix: ${{ inputs.app_name_prefix }}
          app-name-overrides: ${{ inputs.app_name_overrides }}
          normalize-to-filter: ${{ inputs.normalize_to_filter }}
          force-full-matrix: ${{ inputs.force_full_matrix }}

      - name: Set matrix
        id: set-matrix
        env:
          APP_NAME_INPUT: ${{ inputs.app_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          FILTER_PATHS: ${{ inputs.filter_paths }}
          CHANGED_MATRIX: ${{ steps.changed-paths.outputs.matrix }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$TAG_PREFIX" ]; then
            if [ "$REF_TYPE" != "tag" ]; then
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "has_builds=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: tag_prefix '$TAG_PREFIX' is set, but this run is not a tag push (ref_type=$REF_TYPE) — a tag_prefix-scoped build only runs on its own matching tag, never on a branch-push rescue (build_on_release)."
              exit 0
            fi
            if [[ "$REF_NAME" != "$TAG_PREFIX"* ]]; then
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "has_builds=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: ref '$REF_NAME' does not match tag_prefix '$TAG_PREFIX'"
              exit 0
            fi
          fi

          if [ -z "$FILTER_PATHS" ]; then
            # Single app mode - build from root
            APP_NAME="${APP_NAME_INPUT:-$REPO_NAME}"
            if [[ ! "$APP_NAME" =~ ^[a-z0-9]([a-z0-9._-]*[a-z0-9])?$ ]]; then
              echo "::error::Invalid app_name '${APP_NAME}'. Must match Docker image name rules: ^[a-z0-9]([a-z0-9._-]*[a-z0-9])?$"
              exit 1
            fi
            echo "matrix=[{\"name\": \"${APP_NAME}\", \"working_dir\": \".\"}]" >> "$GITHUB_OUTPUT"
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
          else
            MATRIX="$CHANGED_MATRIX"
            if [ "$MATRIX" == "[]" ] || [ -z "$MATRIX" ]; then
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "has_builds=false" >> "$GITHUB_OUTPUT"
            else
              echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
              echo "has_builds=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set platforms based on tag type
        id: set-platforms
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            if [ "${{ inputs.force_multiplatform }}" == "true" ]; then
              echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
              echo "is_release=false" >> "$GITHUB_OUTPUT"
              echo "Building for amd64 and arm64 (beta/rc tag with force_multiplatform)"
            else
              echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
              echo "is_release=false" >> "$GITHUB_OUTPUT"
              echo "Building for amd64 only (beta/rc tag)"
            fi
          else
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Building for amd64 and arm64 (release tag)"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has_builds == 'true'
    runs-on: ${{ vars.GENERAL_RUNNERS || inputs.runner_type }}
    name: Build ${{ matrix.app.name }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      # Trust model: this is a `workflow_call` reusable workflow, not triggered
      # by untrusted PRs. checkout_ref defaults to '' (the workflow run ref) for
      # every caller; the only caller that sets it (go-release.yml's
      # build_on_release feature) sources it from needs.release.outputs.new_release_git_tag
      # — a tag semantic-release just created earlier in the SAME run, never
      # from pull_request/fork-controlled data (CodeQL: actions/untrusted-checkout).
      # codeql[actions/untrusted-checkout] -- see trust-model comment above.
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.checkout_ref }}   # empty string = default run ref
          persist-credentials: false

      - name: Set up QEMU
        if: contains(needs.prepare.outputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to DockerHub
        if: inputs.enable_dockerhub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_IMAGE_PUSH_TOKEN }}

      - name: Log in to GHCR
        if: inputs.enable_ghcr
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MANAGE_TOKEN }}

      - name: Normalize repository owner to lowercase
        id: normalize
        run: |
          echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image names
        id: image-names
        env:
          GHCR_ORG_INPUT: ${{ inputs.ghcr_org }}
          OWNER_LOWER: ${{ steps.normalize.outputs.owner_lower }}
          ENABLE_DOCKERHUB: ${{ inputs.enable_dockerhub }}
          ENABLE_GHCR: ${{ inputs.enable_ghcr }}
          DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
          APP_NAME: ${{ matrix.app.name }}
        run: |
          IMAGES=""
          GHCR_ORG="$GHCR_ORG_INPUT"
          if [ -z "$GHCR_ORG" ]; then
            GHCR_ORG="$OWNER_LOWER"
          else
            GHCR_ORG=$(echo "$GHCR_ORG" | tr '[:upper:]' '[:lower:]')
          fi

          if [ "$ENABLE_DOCKERHUB" == "true" ]; then
            IMAGES="${DOCKERHUB_ORG}/${APP_NAME}"
          fi

          if [ "$ENABLE_GHCR" == "true" ]; then
            if [ -n "$IMAGES" ]; then
              IMAGES="${IMAGES},ghcr.io/${GHCR_ORG}/${APP_NAME}"
            else
              IMAGES="ghcr.io/${GHCR_ORG}/${APP_NAME}"
            fi
          fi

          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
          echo "ghcr_org=$GHCR_ORG" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [ -n "$RELEASE_VERSION" ]; then
            # Branch-push build (same run as semantic-release): no tag in GITHUB_REF.
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using explicit release version: $RELEASE_VERSION"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            # Strip app prefix by finding -v and extracting from there
            # e.g., agent-v1.0.0-beta.1 -> v1.0.0-beta.1
            # e.g., control-plane-v1.0.0-beta.1 -> v1.0.0-beta.1
            # shellcheck disable=SC2001
            VERSION=$(echo "$TAG" | sed 's/.*-\(v[0-9]\)/\1/')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Extracted version: $VERSION from tag: $TAG"
          fi

      - name: Pre-flight tag existence check
        id: preflight
        env:
          ON_EXISTING_TAG: ${{ inputs.on_existing_tag }}
          ENABLE_DOCKERHUB: ${{ inputs.enable_dockerhub }}
          ENABLE_GHCR: ${{ inputs.enable_ghcr }}
          DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
          GHCR_ORG: ${{ steps.image-names.outputs.ghcr_org }}
          APP_NAME: ${{ matrix.app.name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -uo pipefail

          MODE="${ON_EXISTING_TAG:-fail}"
          case "$MODE" in
            fail|skip|warn) ;;
            *) echo "::error::Invalid on_existing_tag '$MODE' (must be: fail, skip, warn)"; exit 1 ;;
          esac

          # Image tag matches what docker/metadata-action publishes (semver without leading 'v').
          TAG="${VERSION#v}"
          EXISTING=""

          # `docker manifest inspect` reuses the registry logins from earlier steps and
          # returns non-zero when the tag is absent. A non-existence/error result is
          # treated as "not present" so a flaky check never blocks a legitimate build.
          if [ "$ENABLE_DOCKERHUB" = "true" ]; then
            REF="${DOCKERHUB_ORG}/${APP_NAME}:${TAG}"
            if docker manifest inspect "$REF" >/dev/null 2>&1; then
              EXISTING="${EXISTING}${EXISTING:+, }docker.io/${REF}"
            fi
          fi
          if [ "$ENABLE_GHCR" = "true" ]; then
            REF="ghcr.io/${GHCR_ORG}/${APP_NAME}:${TAG}"
            if docker manifest inspect "$REF" >/dev/null 2>&1; then
              EXISTING="${EXISTING}${EXISTING:+, }${REF}"
            fi
          fi

          SHOULD_BUILD=true
          if [ -n "$EXISTING" ]; then
            case "$MODE" in
              fail)
                echo "::error::Tag ${TAG} already exists (${EXISTING}). Registry tags are immutable; aborting before rebuild. Use on_existing_tag: skip for idempotent re-runs."
                exit 1
                ;;
              skip)
                echo "::warning::Tag ${TAG} already exists (${EXISTING}) — skipping build/push (idempotent re-run)."
                SHOULD_BUILD=false
                ;;
              warn)
                echo "::warning::Tag ${TAG} already exists (${EXISTING}) — building anyway (push may fail on immutable registries)."
                ;;
            esac
          else
            echo "Tag ${TAG} not present in enabled registries — proceeding with build."
          fi
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        if: steps.preflight.outputs.should_build != 'false'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image-names.outputs.images }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        if: steps.preflight.outputs.should_build != 'false'
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.build_context_from_working_dir == true && matrix.app.working_dir || inputs.build_context }}
          file: ${{ matrix.app.working_dir }}/${{ inputs.dockerfile_name }}
          platforms: ${{ needs.prepare.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.docker_build_args }}
          sbom: generator=docker/scout-sbom-indexer:latest
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.MANAGE_TOKEN }}

      # ----------------- Cosign Image Signing -----------------
      # Lets `on_existing_tag: skip` retry just the signing step for an already-pushed
      # tag (e.g. after a transient cosign/Rekor failure) without a full rebuild.
      - name: Resolve digest for existing tag
        if: inputs.enable_cosign_sign && steps.preflight.outputs.should_build == 'false'
        id: existing-digest
        env:
          APP_NAME: ${{ matrix.app.name }}
          VERSION: ${{ steps.version.outputs.version }}
          ENABLE_DOCKERHUB: ${{ inputs.enable_dockerhub }}
          ENABLE_GHCR: ${{ inputs.enable_ghcr }}
          DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
          GHCR_ORG: ${{ steps.image-names.outputs.ghcr_org }}
        run: |
          set -uo pipefail
          TAG="${VERSION#v}"

          # Each registry is inspected independently: a tag can be immutable-blocked
          # in one registry but absent from another (e.g. a prior partial push), so
          # reusing one registry's digest for the other's ref would sign a
          # nonexistent (or wrong) reference.
          if [ "$ENABLE_DOCKERHUB" == "true" ]; then
            REF="${DOCKERHUB_ORG}/${APP_NAME}:${TAG}"
            DIGEST=""
            if OUTPUT=$(docker buildx imagetools inspect "$REF" --format '{{json .Manifest}}' 2>&1); then
              DIGEST=$(echo "$OUTPUT" | jq -r '.digest // empty')
              [ -z "$DIGEST" ] && echo "::warning::docker buildx imagetools inspect for ${REF} returned no digest — cosign will skip this registry."
            else
              echo "::warning::Failed to inspect ${REF} (registry lookup error, possibly transient) — cosign will skip signing for this registry: ${OUTPUT}"
            fi
            echo "dockerhub_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          fi

          if [ "$ENABLE_GHCR" == "true" ]; then
            REF="ghcr.io/${GHCR_ORG}/${APP_NAME}:${TAG}"
            DIGEST=""
            if OUTPUT=$(docker buildx imagetools inspect "$REF" --format '{{json .Manifest}}' 2>&1); then
              DIGEST=$(echo "$OUTPUT" | jq -r '.digest // empty')
              [ -z "$DIGEST" ] && echo "::warning::docker buildx imagetools inspect for ${REF} returned no digest — cosign will skip this registry."
            else
              echo "::warning::Failed to inspect ${REF} (registry lookup error, possibly transient) — cosign will skip signing for this registry: ${OUTPUT}"
            fi
            echo "ghcr_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Build cosign image references
        if: inputs.enable_cosign_sign
        id: cosign-refs
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          DOCKERHUB_DIGEST: ${{ steps.existing-digest.outputs.dockerhub_digest }}
          GHCR_DIGEST: ${{ steps.existing-digest.outputs.ghcr_digest }}
          ENABLE_DOCKERHUB: ${{ inputs.enable_dockerhub }}
          ENABLE_GHCR: ${{ inputs.enable_ghcr }}
          DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
          APP_NAME: ${{ matrix.app.name }}
          GHCR_ORG: ${{ steps.image-names.outputs.ghcr_org }}
        run: |
          REFS=""

          # A single build-push pushes the identical content to every enabled
          # registry, so DIGEST (from build-push) applies to both. When the build
          # was skipped (existing tag), fall back to each registry's own resolved
          # digest instead, and only emit a ref when that registry's digest was
          # actually found.
          DOCKERHUB_FINAL="${DIGEST:-$DOCKERHUB_DIGEST}"
          GHCR_FINAL="${DIGEST:-$GHCR_DIGEST}"

          if [ "$ENABLE_DOCKERHUB" == "true" ] && [ -n "$DOCKERHUB_FINAL" ]; then
            REFS="docker.io/${DOCKERHUB_ORG}/${APP_NAME}@${DOCKERHUB_FINAL}"
          fi

          if [ "$ENABLE_GHCR" == "true" ] && [ -n "$GHCR_FINAL" ]; then
            [ -n "$REFS" ] && REFS="${REFS}"$'\n'
            REFS="${REFS}ghcr.io/${GHCR_ORG}/${APP_NAME}@${GHCR_FINAL}"
          fi

          {
            echo "refs<<EOF"
            echo "$REFS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Sign container images with cosign
        if: inputs.enable_cosign_sign
        id: cosign-sign
        continue-on-error: ${{ inputs.continue_gitops_on_signing_failure || false }}
        uses: LerianStudio/github-actions-shared-workflows/src/security/cosign-sign@v1
        with:
          image-refs: ${{ steps.cosign-refs.outputs.refs }}
          max-attempts: ${{ inputs.cosign_max_attempts }}
          initial-delay: ${{ inputs.cosign_initial_delay }}
          max-delay: ${{ inputs.cosign_max_delay }}

      - name: Report cosign signing status
        if: inputs.enable_cosign_sign && steps.cosign-sign.outcome == 'failure'
        env:
          REFS: ${{ steps.cosign-refs.outputs.refs }}
          APP_NAME: ${{ matrix.app.name }}
        run: |
          echo "::warning::Cosign signing FAILED for ${APP_NAME} after all retries — image is unsigned in the registry."
          {
            echo "### ⚠️ Unsigned image — manual action required"
            echo ""
            echo "- **App:** \`${APP_NAME}\`"
            echo "- **Refs (each already includes its own digest):**"
            echo '```'
            echo "${REFS}"
            echo '```'
            echo ""
            echo "GitOps artifact upload was allowed to continue (\`continue_gitops_on_signing_failure: true\`)."
            echo "The image(s) above are immutable and present in the registry but **not signed**. Run \`cosign sign\` manually against each ref above before promoting to production."
          } >> "$GITHUB_STEP_SUMMARY"

      # ----------------- GitOps Artifacts -----------------
      - name: Create GitOps tag artifact
        if: inputs.enable_gitops_artifacts
        env:
          RAW_VERSION: ${{ steps.version.outputs.version }}
          APP_NAME: ${{ matrix.app.name }}
        run: |
          set -euo pipefail
          mkdir -p gitops-tags
          # Extract version without leading 'v'
          VERSION="${RAW_VERSION#v}"
          printf "%s" "$VERSION" > "gitops-tags/${APP_NAME}.tag"
          echo "Created artifact: gitops-tags/${APP_NAME}.tag with version: $VERSION"

      - name: Upload GitOps tag artifact
        if: inputs.enable_gitops_artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gitops-tags-${{ matrix.app.name }}
          path: gitops-tags/

  # Slack notification
  notify:
    name: Notify
    needs: [prepare, build]
    if: always() && needs.prepare.outputs.has_builds == 'true'
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: ${{ needs.build.result }}
      workflow_name: "Build & Push Docker Images"
      failed_jobs: ${{ needs.build.result == 'failure' && 'Build' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Dispatch to Helm repository for chart updates
  # By default only runs on production releases (non-beta, non-rc tags)
  # Can be enabled for rc/beta via helm_dispatch_on_rc and helm_dispatch_on_beta inputs
  dispatch-helm:
    name: Dispatch Helm Update
    needs: [prepare, build]
    if: |
      inputs.enable_helm_dispatch &&
      needs.prepare.outputs.has_builds == 'true' &&
      needs.build.result == 'success' &&
      inputs.helm_chart != '' &&
      (
        needs.prepare.outputs.is_release == 'true' ||
        (contains(github.ref, '-rc') && inputs.helm_dispatch_on_rc) ||
        (contains(github.ref, '-beta') && inputs.helm_dispatch_on_beta)
      )
    uses: ./.github/workflows/dispatch-helm.yml
    with:
      helm_repository: ${{ inputs.helm_repository }}
      chart: ${{ inputs.helm_chart }}
      target_ref: ${{ inputs.helm_target_ref }}
      version: ${{ github.ref_name }}
      components_json: ${{ needs.prepare.outputs.matrix }}
      components_base_path: ${{ inputs.helm_components_base_path }}
      env_file: ${{ inputs.helm_env_file }}
      detect_env_changes: ${{ inputs.helm_detect_env_changes }}
      values_key_mappings: ${{ inputs.helm_values_key_mappings }}
      runner_type: ${{ inputs.runner_type }}
    secrets:
      helm_repo_token: ${{ secrets.HELM_REPO_TOKEN }}
