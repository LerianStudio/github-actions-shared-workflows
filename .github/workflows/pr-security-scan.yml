name: "PR Security Scan"

# This reusable workflow handles security scanning for pull requests
# - If filter_paths is provided: treats as monorepo and scans changed components
# - If filter_paths is empty/not provided: treats as single app and scans entire repo
# - Supports two monorepo types:
#   * Type 1 (default): Components in separate folders with individual Dockerfiles
#   * Type 2: Backend in root with ./Dockerfile, frontend in folder with folder/Dockerfile

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'Paths to monitor for changes (newline separated). If not provided, treats as single app repo'
        type: string
        required: false
      path_level:
        description: 'Directory depth level to extract app name (only used for monorepo)'
        type: string
        default: '2'
      app_name_prefix:
        description: 'Prefix for app names in monorepo (e.g., "midaz" results in "midaz-agent"). Must match build workflow config for Scout compare to work.'
        type: string
        default: ''
      app_name_overrides:
        description: 'Explicit app name mappings in "path:name" format. Must match build workflow config for Scout compare to work.'
        type: string
        default: ''
      normalize_to_filter:
        description: 'Normalize changed paths to their filter path. Recommended for monorepos to match build workflow behavior.'
        type: boolean
        default: true
      monorepo_type:
        description: 'Type of monorepo: "type1" (components in folders) or "type2" (backend in root, frontend in folder)'
        type: string
        default: 'type1'
      frontend_folder:
        description: 'Name of the frontend folder for type2 monorepos'
        type: string
        default: 'frontend'
      dockerhub_org:
        description: 'DockerHub organization name'
        type: string
        default: 'lerianstudio'
      docker_registry:
        description: 'Docker registry URL'
        type: string
        default: 'docker.io'
      dockerfile_name:
        description: 'Name of the Dockerfile'
        type: string
        default: 'Dockerfile'
      enable_docker_scan:
        description: 'Enable Docker image build and vulnerability scanning. Set to false for projects without Dockerfile (e.g., CLI tools)'
        type: boolean
        default: true
      enable_docker_scout:
        description: 'Enable Docker Scout image analysis for vulnerability scoring (requires Docker Hub with Scout access)'
        type: boolean
        default: false
      enable_docker_scout_recommendations:
        description: 'Enable Docker Scout recommendations to surface Dockerfile issues (non-root user, missing attestations, base image gaps)'
        type: boolean
        default: true
      docker_scout_fail_on_policy:
        description: 'Fail the security gate when Docker Scout policies are not fully met (e.g., non-root user, missing attestations)'
        type: boolean
        default: false
      docker_scout_compare_env:
        description: 'Docker Scout environment to compare against (e.g., develop, release-candidate, main). Empty = fallback to github.base_ref on PR events.'
        type: string
        default: ''
      docker_scout_organization:
        description: 'Docker Hub organization for Scout environments (required when docker_scout_compare_env is set)'
        type: string
        default: 'lerianstudio'

permissions:
  id-token: write       # Required for OIDC authentication
  contents: read        # Required to checkout the repository
  pull-requests: write  # Allows commenting on PRs
  security-events: write # Required for security scanning

jobs:
  prepare_matrix:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      # ----------------- Setup -----------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------- Detect Changes -----------------
      - name: Get changed paths (monorepo)
        if: inputs.filter_paths != ''
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@fix/scout-html-output
        with:
          filter_paths: ${{ inputs.filter_paths }}
          get_app_name: true
          path_level: ${{ inputs.path_level }}
          app_name_prefix: ${{ inputs.app_name_prefix }}
          app_name_overrides: ${{ inputs.app_name_overrides }}
          normalize_to_filter: ${{ inputs.normalize_to_filter }}

      # ----------------- Build Matrix -----------------
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.filter_paths }}" = "" ]; then
            # Single app mode
            echo 'matrix=[{"name": "${{ github.event.repository.name }}", "working_dir": "."}]' >> $GITHUB_OUTPUT
          elif [ "${{ inputs.monorepo_type }}" = "type2" ]; then
            # Type 2 monorepo: backend in root, frontend in folder
            CHANGED_MATRIX='${{ steps.changed-paths.outputs.matrix }}'

            # Process the matrix to handle Type 2 logic
            PROCESSED_MATRIX=$(echo "$CHANGED_MATRIX" | jq -c '
              map(
                if .working_dir == "${{ inputs.frontend_folder }}" then
                  # Frontend changes - keep as is
                  .
                elif (.working_dir == ".github" or .working_dir == ".githooks") then
                  # Ignore .github and .githooks folders
                  empty
                else
                  # Backend changes - consolidate to root
                  {"name": "${{ github.event.repository.name }}", "working_dir": "."}
                end
              ) | unique_by(.working_dir)
            ')

            echo "matrix=$PROCESSED_MATRIX" >> $GITHUB_OUTPUT
          else
            # Type 1 monorepo mode (default)
            echo 'matrix=${{ steps.changed-paths.outputs.matrix }}' >> $GITHUB_OUTPUT
          fi

  security_scan:
    needs: prepare_matrix
    if: needs.prepare_matrix.outputs.matrix != '[]'
    runs-on: ${{ inputs.runner_type }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    env:
      DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
      APP_NAME: ${{ matrix.name }}
      DOCKERFILE_PATH: ${{ matrix.working_dir == '.' && format('./{0}', inputs.dockerfile_name) || format('{0}/{1}', matrix.working_dir, inputs.dockerfile_name) }}

    steps:
      # ----------------- Setup -----------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: inputs.enable_docker_scan
        uses: docker/setup-buildx-action@v4

      # ----------------- Secret Scanning -----------------
      - name: Trivy Secret Scan - Component (Table Output)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          scan-type: fs
          scan-ref: ${{ matrix.working_dir }}
          format: table
          exit-code: '1'
          hide-progress: true
          skip-dirs: '.git,node_modules,dist,build,.next,coverage,vendor'
          version: 'v0.69.2'

      - name: Trivy Secret Scan - Component (SARIF Output)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          scan-type: fs
          scan-ref: ${{ matrix.working_dir }}
          format: sarif
          output: 'trivy-secret-scan-${{ env.APP_NAME }}.sarif'
          exit-code: '0'
          hide-progress: true
          skip-dirs: '.git,node_modules,dist,build,.next,coverage,vendor'
          version: 'v0.69.2'

      # ----------------- Docker Build -----------------
      - name: Build Docker Image for Scanning
        if: always() && inputs.enable_docker_scan
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.monorepo_type == 'type2' && matrix.working_dir == inputs.frontend_folder && inputs.frontend_folder || '.' }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}
          secrets: |
            ${{ secrets.MANAGE_TOKEN && format('github_token={0}', secrets.MANAGE_TOKEN) || '' }}
            ${{ secrets.NPMRC_TOKEN && format('npmrc=//npm.pkg.github.com/:_authToken={0}', secrets.NPMRC_TOKEN) || '' }}

      # ----------------- Vulnerability Scanning -----------------
      - name: Trivy Vulnerability Scan - Docker Image (Table Output)
        if: always() && inputs.enable_docker_scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}'
          format: 'table'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          version: 'v0.69.2'

      - name: Trivy Vulnerability Scan - Docker Image (SARIF Output)
        if: always() && inputs.enable_docker_scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}'
          format: sarif
          output: 'trivy-vulnerability-scan-docker-${{ env.APP_NAME }}.sarif'
          ignore-unfixed: true
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'  # Do not fail; gate failures in the table step
          version: 'v0.69.2'

      # ----------------- Docker Scout Analysis -----------------
      - name: Docker Scout Analysis
        id: docker-scout
        if: always() && inputs.enable_docker_scout && inputs.enable_docker_scan
        uses: LerianStudio/github-actions-shared-workflows/src/security/docker-scout@fix/scout-html-output
        with:
          image: ${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}
          dockerhub-user: ${{ secrets.DOCKER_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKER_PASSWORD }}
          only-severities: critical,high,medium,low
          enable-recommendations: ${{ inputs.enable_docker_scout_recommendations }}
          compare-to-env: ${{ inputs.docker_scout_compare_env || github.base_ref }}
          organization: ${{ inputs.docker_scout_organization }}

      # ----------------- Filesystem Vulnerability Scan -----------------
      - name: Trivy Vulnerability Scan - Filesystem (JSON Output)
        id: fs-vuln-scan
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          scan-type: fs
          scan-ref: ${{ matrix.working_dir }}
          format: json
          output: 'trivy-fs-vuln-${{ env.APP_NAME }}.json'
          exit-code: '0'
          hide-progress: true
          skip-dirs: '.git,node_modules,dist,build,.next,coverage,vendor'
          version: 'v0.69.2'

      # ----------------- Save Scout outputs to files (env vars truncate HTML) -----------------
      - name: Save Scout outputs to files
        if: always() && inputs.enable_docker_scout && inputs.enable_docker_scan
        shell: bash
        run: |
          mkdir -p .scout-outputs
          cat <<'QUICKVIEW_EOF' > .scout-outputs/quickview.html
          ${{ steps.docker-scout.outputs.quickview }}
          QUICKVIEW_EOF
          cat <<'CVES_EOF' > .scout-outputs/cves.html
          ${{ steps.docker-scout.outputs.cves }}
          CVES_EOF
          cat <<'RECS_EOF' > .scout-outputs/recommendations.html
          ${{ steps.docker-scout.outputs.recommendations }}
          RECS_EOF
          cat <<'COMPARE_EOF' > .scout-outputs/compare.html
          ${{ steps.docker-scout.outputs.compare }}
          COMPARE_EOF
          echo "${{ steps.docker-scout.outputs.has-vulnerabilities }}" > .scout-outputs/has-vulnerabilities.txt

      # ----------------- Results & Security Gate -----------------
      - name: Post Security Scan Results to PR
        id: post-results
        if: always() && github.event_name == 'pull_request'
        uses: LerianStudio/github-actions-shared-workflows/src/security/pr-security-reporter@fix/scout-html-output
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-name: ${{ env.APP_NAME }}
          enable-docker-scan: ${{ inputs.enable_docker_scan }}
          enable-docker-scout: ${{ inputs.enable_docker_scout }}
          scout-outputs-dir: .scout-outputs
          fail-on-policy-failure: ${{ inputs.docker_scout_fail_on_policy }}

      - name: Gate - Fail on Security Findings
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ "${{ steps.post-results.outputs.has-errors }}" = "true" ]; then
            echo "::warning::Some scan artifacts were missing or could not be parsed."
          fi
          if [ "${{ steps.post-results.outputs.has-findings }}" = "true" ]; then
            echo "::error::Security vulnerabilities found. Check the PR comment for details."
            exit 1
          fi

      ## To be fixed
      # - name: Upload Secret Scan Results - Repository (SARIF) to GitHub Security Tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   continue-on-error: true
      #   with:
      #     sarif_file: 'trivy-secret-scan-repo-${{ env.APP_NAME }}.sarif'

      # - name: Upload Vulnerability Scan Results - Docker Image (SARIF) to GitHub Security Tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   continue-on-error: true
      #   with:
      #     sarif_file: 'trivy-vulnerability-scan-docker-${{ env.APP_NAME }}.sarif'

  # ----------------- Slack Notification -----------------
  notify:
    name: Notify
    needs: [prepare_matrix, security_scan]
    if: always() && needs.prepare_matrix.outputs.matrix != '[]'
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: ${{ needs.security_scan.result }}
      workflow_name: "PR Security Scan"
      failed_jobs: ${{ needs.security_scan.result == 'failure' && 'Security Scan' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
