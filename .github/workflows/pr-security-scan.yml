name: "PR Security Scan"

# This reusable workflow handles security scanning for pull requests
# - If filter_paths is provided: treats as monorepo and scans changed components
# - If filter_paths is empty/not provided: treats as single app and scans entire repo
# - Supports two monorepo types:
#   * Type 1 (default): Components in separate folders with individual Dockerfiles
#   * Type 2: Backend in root with ./Dockerfile, frontend in folder with folder/Dockerfile

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'Paths to monitor for changes (newline separated). If not provided, treats as single app repo'
        type: string
        required: false
      shared_paths:
        description: 'Newline-separated path patterns (e.g., "go.mod\ngo.sum") that trigger a build for ALL components when matched by any changed file.'
        type: string
        required: false
        default: ''
      path_level:
        description: 'Directory depth level to extract app name (only used for monorepo)'
        type: string
        default: '2'
      app_name_prefix:
        description: 'Prefix for app names in monorepo (e.g., "midaz" results in "midaz-agent"). Must match build workflow config.'
        type: string
        default: ''
      app_name_overrides:
        description: 'Explicit app name mappings in "path:name" format. Must match build workflow config.'
        type: string
        default: ''
      normalize_to_filter:
        description: 'Normalize changed paths to their filter path. Recommended for monorepos to match build workflow behavior.'
        type: boolean
        default: true
      monorepo_type:
        description: 'Type of monorepo: "type1" (components in folders) or "type2" (backend in root, frontend in folder)'
        type: string
        default: 'type1'
      frontend_folder:
        description: 'Name of the frontend folder for type2 monorepos'
        type: string
        default: 'frontend'
      dockerhub_org:
        description: 'DockerHub organization name'
        type: string
        default: 'lerianstudio'
      docker_registry:
        description: 'Docker registry URL'
        type: string
        default: 'docker.io'
      dockerfile_name:
        description: 'Name of the Dockerfile'
        type: string
        default: 'Dockerfile'
      enable_docker_scan:
        description: 'Enable Docker image build and vulnerability scanning. Set to false for projects without Dockerfile (e.g., CLI tools)'
        type: boolean
        default: true
      enable_health_score:
        description: 'Enable Docker Hub Health Score compliance checks (non-root user, CVEs, licenses)'
        type: boolean
        default: true
      enable_codeql:
        description: 'Enable CodeQL static analysis. Runs as a separate job in parallel with other security scans'
        type: boolean
        default: false
      codeql_languages:
        description: 'Comma-separated CodeQL languages to analyze (e.g., go, javascript-typescript, actions). Required when enable_codeql is true'
        type: string
        default: ''
      codeql_queries:
        description: 'CodeQL query suite to use (security-standard, security-extended, security-and-quality)'
        type: string
        default: 'security-extended'

permissions:
  id-token: write       # Required for OIDC authentication
  contents: read        # Required to checkout the repository
  pull-requests: write  # Allows commenting on PRs
  security-events: write # Required for security scanning
  actions: read          # Required for CodeQL on private repositories

jobs:
  prepare_matrix:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.changed-paths.outputs.matrix }}
    steps:
      # ----------------- Setup -----------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------- Detect Changes & Build Matrix -----------------
      - name: Get changed paths
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@v1.18.0
        with:
          filter-paths: ${{ inputs.filter_paths }}
          shared-paths: ${{ inputs.shared_paths }}
          get-app-name: true
          path-level: ${{ inputs.path_level }}
          app-name-prefix: ${{ inputs.app_name_prefix }}
          app-name-overrides: ${{ inputs.app_name_overrides }}
          normalize-to-filter: ${{ inputs.normalize_to_filter }}
          ignore-dirs: |
            .github
            .githooks
          fallback-app-name: ${{ github.event.repository.name }}
          consolidate-to-root: ${{ inputs.monorepo_type == 'type2' }}
          consolidate-keep-dirs: ${{ inputs.frontend_folder }}

  security_scan:
    needs: prepare_matrix
    if: needs.prepare_matrix.outputs.matrix != '[]'
    runs-on: ${{ inputs.runner_type }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    env:
      DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
      APP_NAME: ${{ matrix.name }}
      DOCKERFILE_PATH: ${{ matrix.working_dir == '.' && format('./{0}', inputs.dockerfile_name) || format('{0}/{1}', matrix.working_dir, inputs.dockerfile_name) }}

    steps:
      # ----------------- Setup -----------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: inputs.enable_docker_scan
        uses: docker/setup-buildx-action@v4

      # ----------------- Filesystem Scanning (Secrets + Vulnerabilities) -----------------
      - name: Trivy Filesystem Scan
        id: fs-scan
        if: always()
        uses: LerianStudio/github-actions-shared-workflows/src/security/trivy-fs-scan@v1.18.0
        with:
          scan-ref: ${{ matrix.working_dir }}
          app-name: ${{ env.APP_NAME }}

      # ----------------- Docker Build -----------------
      - name: Build Docker Image for Scanning
        if: always() && inputs.enable_docker_scan
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.monorepo_type == 'type2' && matrix.working_dir == inputs.frontend_folder && inputs.frontend_folder || '.' }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}
          secrets: |
            ${{ secrets.MANAGE_TOKEN && format('github_token={0}', secrets.MANAGE_TOKEN) || '' }}
            ${{ secrets.NPMRC_TOKEN && format('npmrc=//npm.pkg.github.com/:_authToken={0}', secrets.NPMRC_TOKEN) || '' }}

      # ----------------- Image Scanning (Vulnerabilities + Licenses) -----------------
      - name: Trivy Image Scan
        id: image-scan
        if: always() && inputs.enable_docker_scan
        uses: LerianStudio/github-actions-shared-workflows/src/security/trivy-image-scan@v1.18.0
        with:
          image-ref: '${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}'
          app-name: ${{ env.APP_NAME }}
          enable-license-scan: ${{ inputs.enable_health_score }}

      # ----------------- Dockerfile Compliance Checks -----------------
      - name: Dockerfile Compliance Checks
        id: dockerfile-checks
        if: always() && inputs.enable_docker_scan && inputs.enable_health_score
        uses: LerianStudio/github-actions-shared-workflows/src/security/dockerfile-checks@v1.18.0
        with:
          dockerfile-path: ${{ env.DOCKERFILE_PATH }}

      # ----------------- Results & Security Gate -----------------
      - name: Post Security Scan Results to PR
        id: post-results
        if: always() && github.event_name == 'pull_request'
        uses: LerianStudio/github-actions-shared-workflows/src/security/pr-security-reporter@v1.18.0
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || secrets.GITHUB_TOKEN }}
          app-name: ${{ env.APP_NAME }}
          enable-docker-scan: ${{ inputs.enable_docker_scan }}
          enable-health-score: ${{ inputs.enable_health_score && inputs.enable_docker_scan }}
          dockerfile-has-non-root-user: ${{ steps.dockerfile-checks.outputs.has-non-root-user || 'false' }}
          fail-on-findings: 'true'

      ## To be fixed
      # - name: Upload Secret Scan Results - Repository (SARIF) to GitHub Security Tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   continue-on-error: true
      #   with:
      #     sarif_file: 'trivy-secret-scan-repo-${{ env.APP_NAME }}.sarif'

      # - name: Upload Vulnerability Scan Results - Docker Image (SARIF) to GitHub Security Tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   continue-on-error: true
      #   with:
      #     sarif_file: 'trivy-vulnerability-scan-docker-${{ env.APP_NAME }}.sarif'

  # ----------------- CodeQL Analysis -----------------
  codeql_analysis:
    name: CodeQL Analysis
    if: inputs.enable_codeql && inputs.codeql_languages != ''
    runs-on: ${{ inputs.runner_type }}
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: LerianStudio/github-actions-shared-workflows/src/security/codeql-init@v1.18.0
        with:
          languages: ${{ inputs.codeql_languages }}
          queries: ${{ inputs.codeql_queries }}

      - name: Perform CodeQL Analysis
        uses: LerianStudio/github-actions-shared-workflows/src/security/codeql-analyze@v1.18.0
        with:
          category: '/language:${{ inputs.codeql_languages }}'

      - name: Post CodeQL Results to PR
        if: always() && github.event_name == 'pull_request'
        uses: LerianStudio/github-actions-shared-workflows/src/security/codeql-reporter@v1.18.0
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || secrets.GITHUB_TOKEN }}
          languages: ${{ inputs.codeql_languages }}
          fail-on-findings: 'false'

  # ----------------- Slack Notification -----------------
  notify:
    name: Notify
    needs: [prepare_matrix, security_scan, codeql_analysis]
    if: always() && (needs.prepare_matrix.outputs.matrix != '[]' || needs.codeql_analysis.result != 'skipped')
    runs-on: ${{ inputs.runner_type }}
    steps:
      - name: Slack Notification
        uses: LerianStudio/github-actions-shared-workflows/src/notify/slack-notify@v1.18.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ (needs.security_scan.result == 'failure' || needs.codeql_analysis.result == 'failure') && 'failure' || 'success' }}
          workflow-name: "PR Security Scan"
          failed-jobs: ${{ needs.security_scan.result == 'failure' && 'Security Scan' || '' }}${{ needs.codeql_analysis.result == 'failure' && ', CodeQL Analysis' || '' }}
