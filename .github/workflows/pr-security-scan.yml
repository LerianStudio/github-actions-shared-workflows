name: "PR Security Scan"

# This reusable workflow handles security scanning for pull requests
# - If filter_paths is provided: treats as monorepo and scans changed components
# - If filter_paths is empty/not provided: treats as single app and scans entire repo
# - Supports two monorepo types:
#   * Type 1 (default): Components in separate folders with individual Dockerfiles
#   * Type 2: Backend in root with ./Dockerfile, frontend in folder with folder/Dockerfile

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'Paths to monitor for changes (newline separated). If not provided, treats as single app repo'
        type: string
        required: false
      path_level:
        description: 'Directory depth level to extract app name (only used for monorepo)'
        type: string
        default: '2'
      monorepo_type:
        description: 'Type of monorepo: "type1" (components in folders) or "type2" (backend in root, frontend in folder)'
        type: string
        default: 'type1'
      frontend_folder:
        description: 'Name of the frontend folder for type2 monorepos'
        type: string
        default: 'frontend'
      dockerhub_org:
        description: 'DockerHub organization name'
        type: string
        default: 'lerianstudio'
      docker_registry:
        description: 'Docker registry URL'
        type: string
        default: 'docker.io'
      dockerfile_name:
        description: 'Name of the Dockerfile'
        type: string
        default: 'Dockerfile'
      enable_docker_scan:
        description: 'Enable Docker image build and vulnerability scanning. Set to false for projects without Dockerfile (e.g., CLI tools)'
        type: boolean
        default: true

permissions:
  id-token: write       # Required for OIDC authentication
  contents: read        # Required to checkout the repository
  pull-requests: write  # Allows commenting on PRs
  security-events: write # Required for security scanning

jobs:
  prepare_matrix:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get changed paths (monorepo)
        if: inputs.filter_paths != ''
        id: changed-paths
        uses: LerianStudio/github-actions-changed-paths@main
        with:
          filter_paths: ${{ inputs.filter_paths }}
          get_app_name: true
          path_level: ${{ inputs.path_level }}

      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.filter_paths }}" = "" ]; then
            # Single app mode
            echo 'matrix=[{"name": "${{ github.event.repository.name }}", "working_dir": "."}]' >> $GITHUB_OUTPUT
          elif [ "${{ inputs.monorepo_type }}" = "type2" ]; then
            # Type 2 monorepo: backend in root, frontend in folder
            CHANGED_MATRIX='${{ steps.changed-paths.outputs.matrix }}'

            # Process the matrix to handle Type 2 logic
            PROCESSED_MATRIX=$(echo "$CHANGED_MATRIX" | jq -c '
              map(
                if .working_dir == "${{ inputs.frontend_folder }}" then
                  # Frontend changes - keep as is
                  .
                elif (.working_dir == ".github" or .working_dir == ".githooks") then
                  # Ignore .github and .githooks folders
                  empty
                else
                  # Backend changes - consolidate to root
                  {"name": "${{ github.event.repository.name }}", "working_dir": "."}
                end
              ) | unique_by(.working_dir)
            ')

            echo "matrix=$PROCESSED_MATRIX" >> $GITHUB_OUTPUT
          else
            # Type 1 monorepo mode (default)
            echo 'matrix=${{ steps.changed-paths.outputs.matrix }}' >> $GITHUB_OUTPUT
          fi

  security_scan:
    needs: prepare_matrix
    if: needs.prepare_matrix.outputs.matrix != '[]'
    runs-on: ${{ inputs.runner_type }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    env:
      DOCKERHUB_ORG: ${{ inputs.dockerhub_org }}
      APP_NAME: ${{ matrix.name }}
      DOCKERFILE_PATH: ${{ matrix.working_dir == '.' && format('./{0}', inputs.dockerfile_name) || format('{0}/{1}', matrix.working_dir, inputs.dockerfile_name) }}

    steps:
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: inputs.enable_docker_scan
        uses: docker/setup-buildx-action@v4

      # ----------------- Security Scans -----------------
      - name: Trivy Secret Scan - Component (Table Output)
        uses: aquasecurity/trivy-action@0.34.1
        if: always()
        with:
          scan-type: fs
          scan-ref: ${{ matrix.working_dir }}
          format: table
          exit-code: '1'
          hide-progress: true
          skip-dirs: '.git,node_modules,dist,build,.next,coverage,vendor'
          version: 'v0.69.2'

      - name: Trivy Secret Scan - Component (SARIF Output)
        uses: aquasecurity/trivy-action@0.34.1
        if: always()
        with:
          scan-type: fs
          scan-ref: ${{ matrix.working_dir }}
          format: sarif
          output: 'trivy-secret-scan-${{ env.APP_NAME }}.sarif'
          exit-code: '0'
          hide-progress: true
          skip-dirs: '.git,node_modules,dist,build,.next,coverage,vendor'
          version: 'v0.69.2'

      - name: Build Docker Image for Scanning
        if: always() && inputs.enable_docker_scan
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.monorepo_type == 'type2' && matrix.working_dir == inputs.frontend_folder && inputs.frontend_folder || '.' }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}
          secrets: |
            ${{ secrets.MANAGE_TOKEN && format('github_token={0}', secrets.MANAGE_TOKEN) || '' }}
            ${{ secrets.NPMRC_TOKEN && format('npmrc=//npm.pkg.github.com/:_authToken={0}', secrets.NPMRC_TOKEN) || '' }}

      - name: Trivy Vulnerability Scan - Docker Image (Table Output)
        if: always() && inputs.enable_docker_scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: '${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}'
          format: 'table'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          version: 'v0.69.2'

      - name: Trivy Vulnerability Scan - Docker Image (SARIF Output)
        if: always() && inputs.enable_docker_scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: '${{ env.DOCKERHUB_ORG }}/${{ env.APP_NAME }}:pr-scan-${{ github.sha }}'
          format: sarif
          output: 'trivy-vulnerability-scan-docker-${{ env.APP_NAME }}.sarif'
          ignore-unfixed: true
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'  # Do not fail; gate failures in the table step
          version: 'v0.69.2'

      # ----------------- Filesystem Vulnerability Scan -----------------
      - name: Trivy Vulnerability Scan - Filesystem (JSON Output)
        id: fs-vuln-scan
        uses: aquasecurity/trivy-action@0.34.1
        if: always()
        with:
          scan-type: fs
          scan-ref: ${{ matrix.working_dir }}
          format: json
          output: 'trivy-fs-vuln-${{ env.APP_NAME }}.json'
          exit-code: '0'
          hide-progress: true
          skip-dirs: '.git,node_modules,dist,build,.next,coverage,vendor'
          version: 'v0.69.2'

      # ----------------- PR Comment with Security Findings -----------------
      - name: Post Security Scan Results to PR
        id: post-results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const appName = process.env.APP_NAME;
            const dockerScanEnabled = ${{ inputs.enable_docker_scan }};

            let body = `## 🔒 Security Scan Results — \`${appName}\`\n\n`;
            let hasFindings = false;
            let hasScanErrors = false;

            // Helper to escape markdown table cell content
            const md = (value) =>
              String(value ?? '')
                .replace(/\|/g, '\\|')
                .replace(/\r?\n/g, ' ')
                .replace(/`/g, '\\`');

            // Parse filesystem vulnerability scan
            try {
              const fsVulnFile = `trivy-fs-vuln-${appName}.json`;
              if (fs.existsSync(fsVulnFile)) {
                const data = JSON.parse(fs.readFileSync(fsVulnFile, 'utf8'));
                const results = data.Results || [];
                const vulns = [];

                for (const result of results) {
                  for (const v of (result.Vulnerabilities || [])) {
                    vulns.push({
                      library: v.PkgName || 'Unknown',
                      id: v.VulnerabilityID || 'N/A',
                      severity: v.Severity || 'UNKNOWN',
                      installed: v.InstalledVersion || 'N/A',
                      fixed: v.FixedVersion || 'N/A',
                      title: v.Title || v.Description || 'No description'
                    });
                  }
                  for (const s of (result.Secrets || [])) {
                    vulns.push({
                      library: s.RuleID || 'Secret',
                      id: s.Category || 'SECRET',
                      severity: s.Severity || 'HIGH',
                      installed: '[REDACTED]',
                      fixed: 'Remove/rotate',
                      title: s.Title || 'Secret detected'
                    });
                  }
                }

                if (vulns.length > 0) {
                  hasFindings = true;
                  body += `### Filesystem Scan\n\n`;
                  body += `| Severity | Library | Vulnerability | Installed | Fixed | Title |\n`;
                  body += `|----------|---------|---------------|-----------|-------|-------|\n`;

                  const severityOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
                  vulns.sort((a, b) => (severityOrder[a.severity] ?? 5) - (severityOrder[b.severity] ?? 5));

                  const maxFsFindings = 50;
                  for (const v of vulns.slice(0, maxFsFindings)) {
                    const icon = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🔵', UNKNOWN: '⚪' }[v.severity] || '⚪';
                    const title = v.title.length > 60 ? v.title.substring(0, 57) + '...' : v.title;
                    body += `| ${icon} ${md(v.severity)} | \`${md(v.library)}\` | ${md(v.id)} | ${md(v.installed)} | ${md(v.fixed)} | ${md(title)} |\n`;
                  }
                  if (vulns.length > maxFsFindings) {
                    body += `\n_... and ${vulns.length - maxFsFindings} more findings._\n`;
                  }
                  body += `\n`;
                } else {
                  body += `### Filesystem Scan\n\n✅ No vulnerabilities or secrets found.\n\n`;
                }
              } else {
                hasScanErrors = true;
                body += `### Filesystem Scan\n\n⚠️ Scan artifact not found.\n\n`;
              }
            } catch (e) {
              hasScanErrors = true;
              body += `### Filesystem Scan\n\n⚠️ Could not parse scan results: ${e.message}\n\n`;
            }

            // Parse Docker image vulnerability scan
            if (dockerScanEnabled) {
              try {
                const dockerSarifFile = `trivy-vulnerability-scan-docker-${appName}.sarif`;
                if (fs.existsSync(dockerSarifFile)) {
                  const sarif = JSON.parse(fs.readFileSync(dockerSarifFile, 'utf8'));
                  const runs = sarif.runs || [];
                  const dockerVulns = [];

                  for (const run of runs) {
                    for (const result of (run.results || [])) {
                      const rule = (run.tool?.driver?.rules || []).find(r => r.id === result.ruleId);
                      dockerVulns.push({
                        id: result.ruleId || 'N/A',
                        severity: result.level === 'error' ? 'CRITICAL/HIGH' : result.level === 'warning' ? 'MEDIUM' : 'LOW',
                        title: rule?.shortDescription?.text || result.message?.text || 'No description'
                      });
                    }
                  }

                  if (dockerVulns.length > 0) {
                    hasFindings = true;
                    const dockerSeverityOrder = { 'CRITICAL/HIGH': 0, CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
                    dockerVulns.sort((a, b) => (dockerSeverityOrder[a.severity] ?? 5) - (dockerSeverityOrder[b.severity] ?? 5));
                    body += `### Docker Image Scan\n\n`;
                    body += `| Severity | Vulnerability | Title |\n`;
                    body += `|----------|---------------|-------|\n`;
                    for (const v of dockerVulns.slice(0, 20)) {
                      const title = v.title.length > 80 ? v.title.substring(0, 77) + '...' : v.title;
                      body += `| ${md(v.severity)} | ${md(v.id)} | ${md(title)} |\n`;
                    }
                    if (dockerVulns.length > 20) {
                      body += `\n_... and ${dockerVulns.length - 20} more findings._\n`;
                    }
                    body += `\n`;
                  } else {
                    body += `### Docker Image Scan\n\n✅ No vulnerabilities found.\n\n`;
                  }
                } else {
                  hasScanErrors = true;
                  body += `### Docker Image Scan\n\n⚠️ Scan artifact not found.\n\n`;
                }
              } catch (e) {
                hasScanErrors = true;
                body += `### Docker Image Scan\n\n⚠️ Could not parse scan results: ${e.message}\n\n`;
              }
            }

            if (!hasFindings && !hasScanErrors) {
              body += `\n✅ **All security checks passed.**\n`;
            }

            // Export findings flag for the gate step (before API calls to ensure they're always set)
            core.setOutput('has_findings', hasFindings);
            core.setOutput('has_errors', hasScanErrors);

            // Find and update existing comment or create new one
            const marker = `<!-- security-scan-${appName} -->`;
            body = marker + '\n' + body;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              });

              const existing = comments.find(c => c.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body
                });
              }
            } catch (e) {
              core.warning(`Could not post PR security comment: ${e.message}`);
            }

      - name: Gate - Fail on Security Findings
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ "${{ steps.post-results.outputs.has_errors }}" = "true" ]; then
            echo "::warning::Some scan artifacts were missing or could not be parsed."
          fi
          if [ "${{ steps.post-results.outputs.has_findings }}" = "true" ]; then
            echo "::error::Security vulnerabilities found. Check the PR comment for details."
            exit 1
          fi

      ## To be fixed
      # - name: Upload Secret Scan Results - Repository (SARIF) to GitHub Security Tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   continue-on-error: true
      #   with:
      #     sarif_file: 'trivy-secret-scan-repo-${{ env.APP_NAME }}.sarif'

      # - name: Upload Vulnerability Scan Results - Docker Image (SARIF) to GitHub Security Tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   continue-on-error: true
      #   with:
      #     sarif_file: 'trivy-vulnerability-scan-docker-${{ env.APP_NAME }}.sarif'

  # Slack notification
  notify:
    name: Notify
    needs: [prepare_matrix, security_scan]
    if: always() && needs.prepare_matrix.outputs.matrix != '[]'
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: ${{ needs.security_scan.result }}
      workflow_name: "PR Security Scan"
      failed_jobs: ${{ needs.security_scan.result == 'failure' && 'Security Scan' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
