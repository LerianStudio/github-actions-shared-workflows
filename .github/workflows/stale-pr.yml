name: Stale PRs

on:
  workflow_call:
    inputs:
      days_before_stale:
        description: Days of PR inactivity before the stale label is applied
        required: false
        type: number
        default: 30
      days_before_close:
        description: Days after a PR is marked stale before it is closed
        required: false
        type: number
        default: 14
      exempt_labels:
        description: Comma-separated labels exempting a PR from the stale scan
        required: false
        type: string
        default: "no-stale,security,work-in-progress,pinned"
      operations_per_run:
        description: Maximum API operations per run
        required: false
        type: number
        default: 60
      dry_run:
        description: Preview changes without applying them
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write

jobs:
  stale-pr:
    name: Flag and close stale PRs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Run stale PR scan
        uses: LerianStudio/github-actions-shared-workflows/src/config/stale@v1
        with:
          # Prefer MANAGE_TOKEN so stale labels and comments are attributed to
          # the Lerian bot identity; fall back to the job's GITHUB_TOKEN when
          # the secret is not available (e.g. external consumers without it).
          github-token: ${{ secrets.MANAGE_TOKEN || secrets.GITHUB_TOKEN }}
          days-before-pr-stale: ${{ inputs.days_before_stale }}
          days-before-pr-close: ${{ inputs.days_before_close }}
          days-before-issue-stale: "-1"
          days-before-issue-close: "-1"
          exempt-pr-labels: ${{ inputs.exempt_labels }}
          operations-per-run: ${{ inputs.operations_per_run }}
          dry-run: ${{ inputs.dry_run }}
