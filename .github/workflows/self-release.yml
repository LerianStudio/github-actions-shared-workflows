name: release

on:
  push:
    branches:
      - develop
      - release-candidate
      - main
    paths-ignore:
      - '.gitignore'
      - '**/*.env'
      - '*.env'
      - '**/*.md'
      - '*.md'
      - '**/*.txt'
      - '*.txt'
      # The deployment matrix is resolved from main at runtime by callers, so
      # matrix-only changes propagate without a new release tag.
      - 'config/deployment-matrix.yml'
    tags-ignore:
      - '**'

permissions:
  id-token: write
  contents: write
  pull-requests: write
  packages: read

jobs:
  publish-release:
    uses: ./.github/workflows/release.yml
    with:
      runner_type: ubuntu-latest
    secrets: inherit

  # Only run after a stable release on main; develop/release-candidate produce
  # beta/rc tags that the reusable skips anyway via stable_releases_only.
  generate-changelog:
    needs: publish-release
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/gptchangelog.yml
    with:
      runner_type: ubuntu-latest
      stable_releases_only: true
    secrets: inherit

  # Force-update the floating major version tag (e.g. v1) to point at the
  # latest stable release. Enables downstream composites to pin to @v1 and
  # always resolve to the latest stable v1.x.x release. Stable-only: gated to
  # main so beta/rc releases from develop/release-candidate don't move v1.
  update-major-tag:
    needs: publish-release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private-key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY }}
          passphrase: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY_PASSWORD }}
          git_committer_name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git_committer_email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          git_config_global: true
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Move major version tag to latest stable release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git fetch --tags --force --prune

          LATEST=$(git tag --list \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1 || true)

          if [ -z "$LATEST" ]; then
            echo "::notice::No stable release tag found — skipping major tag update."
            exit 0
          fi

          VERSION="${LATEST#v}"
          MAJOR="v${VERSION%%.*}"
          SHA=$(git rev-list -n1 "$LATEST")

          CURRENT_SHA=""
          if git rev-parse --verify --quiet "refs/tags/$MAJOR" >/dev/null; then
            CURRENT_SHA=$(git rev-list -n1 "$MAJOR")
          fi

          if [ "$CURRENT_SHA" = "$SHA" ]; then
            echo "::notice::$MAJOR already points at $LATEST ($SHA) — nothing to do."
            exit 0
          fi

          echo "Moving $MAJOR → $LATEST ($SHA)"
          git tag -f -a "$MAJOR" "$SHA" -m "Release $MAJOR ($LATEST)"
          git push origin "$MAJOR" --force
