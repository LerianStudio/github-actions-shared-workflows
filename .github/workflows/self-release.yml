name: release

on:
  push:
    branches:
      - develop
      - release-candidate
      - main
    paths-ignore:
      - '.gitignore'
      - '**/*.env'
      - '*.env'
      - '**/*.md'
      - '*.md'
      - '**/*.txt'
      - '*.txt'
      # The deployment matrix is resolved from main at runtime by callers, so
      # matrix-only changes propagate without a new release tag.
      - 'config/deployment-matrix.yml'
    tags-ignore:
      - '**'

permissions:
  id-token: write
  contents: write
  pull-requests: write
  packages: read

jobs:
  publish-release:
    uses: ./.github/workflows/release.yml
    with:
      runner_type: ubuntu-latest
    secrets: inherit

  # Only run after a stable release on main; develop/release-candidate produce
  # beta/rc tags that the reusable skips anyway via stable_releases_only.
  generate-changelog:
    needs: publish-release
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/gptchangelog.yml
    with:
      runner_type: ubuntu-latest
      stable_releases_only: true
    secrets: inherit
