name: "JS Release"

# Umbrella reusable workflow for JavaScript/TypeScript service repositories.
# On branch pushes it runs semantic-release (gated by a non-doc change detector);
# on tag pushes it builds and pushes the container image and then updates the
# GitOps repository. A caller only needs to reference this single workflow.

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'ubuntu-latest'
      dry_run:
        description: 'Run semantic-release in dry-run mode (no tags/releases created) and preview the backmerge instead of applying it'
        required: false
        type: boolean
        default: false

      # ----------------- Change gate -----------------
      ignore_globs:
        description: 'Space-separated glob patterns treated as docs/meta; when only these change on a branch push, the release is skipped.'
        type: string
        default: '*.md docs/* .github/* LICENSE* .gitignore'

      # ----------------- Release (release.yml) -----------------
      semantic_version:
        description: 'Semantic release version to use'
        type: string
        default: '23.0.8'
      enable_changelog:
        description: 'Generate CHANGELOG.md files via GPT after a successful release'
        type: boolean
        default: false
      enable_major_tag:
        description: 'Force-update the floating major version tag (e.g. v1) after a successful release'
        type: boolean
        default: false
      stable_releases_only:
        description: 'Only generate changelogs for stable releases (skip beta/rc/alpha tags)'
        type: boolean
        default: true
      release_single_app:
        description: 'Force single-app mode for the release job even when filter_paths is set. Use for repos with one version tag but multiple Docker images.'
        type: boolean
        default: false
      backmerge_enabled:
        description: 'Backmerge the release branch into the target branch after a successful release'
        type: boolean
        default: true
      backmerge_source:
        description: 'Release branch eligible for backmerge'
        type: string
        default: 'main'
      backmerge_target:
        description: 'Branch that receives the backmerge'
        type: string
        default: 'develop'
      backmerge_mode:
        description: 'Backmerge strategy: direct | pr | direct-with-pr-fallback'
        type: string
        default: 'direct-with-pr-fallback'
      filter_paths:
        description: 'Newline-separated list of path prefixes to filter. Empty = single-app repo.'
        type: string
        default: ''
      shared_paths:
        description: 'Newline-separated path patterns that trigger a release/build for all components.'
        type: string
        default: ''
      path_level:
        description: 'Directory depth level to extract app name (e.g., 2 -> "apps/agent")'
        type: string
        default: '2'

      # ----------------- Build (typescript-build.yml) -----------------
      enable_dockerhub:
        description: 'Enable pushing to DockerHub'
        type: boolean
        default: false
      enable_ghcr:
        description: 'Enable pushing to GitHub Container Registry'
        type: boolean
        default: true
      enable_gitops_artifacts:
        description: 'Enable GitOps artifacts upload for the downstream gitops-update job'
        type: boolean
        default: false
      app_name_prefix:
        description: 'Prefix for app names in monorepo (e.g., "midaz" -> "midaz-agent")'
        type: string
        default: ''
      app_name_overrides:
        description: 'Explicit app name mappings in "path:name" format. Overrides default extraction for matched paths.'
        type: string
        default: ''
      dockerfile_name:
        description: 'Name of the Dockerfile'
        type: string
        default: 'Dockerfile'
      build_context:
        description: 'Docker build context (defaults to repository root)'
        type: string
        default: '.'
      build_secrets:
        description: 'Additional secrets for docker build (one per line). npmrc is always included automatically.'
        type: string
        default: ''
      enable_cosign_sign:
        description: 'Sign container images with cosign keyless (OIDC) signing after push'
        type: boolean
        default: true
      dockerhub_org:
        description: 'DockerHub organization name'
        type: string
        default: 'lerianstudio'
      force_full_matrix:
        description: 'When true, build all filter_paths components on every run regardless of what changed. Use for repos where components must always share the same image tag (e.g., auth + identity always released together).'
        type: boolean
        default: false

      # ----------------- GitOps Update (gitops-update.yml) -----------------
      enable_gitops_update:
        description: 'Run the gitops-update job on tag push'
        type: boolean
        default: true
      gitops_repository:
        description: 'GitOps repository to update (org/repo format). Defaults to the GITOPS_REPOSITORY org-level variable when empty.'
        type: string
        default: ''
      update_sandbox:
        description: 'Include sandbox environment on production tags. Set to false to skip sandbox even on a production release.'
        type: boolean
        default: false
      beta_environments:
        description: 'Space-separated environments updated by a beta release (develop branch). Default "dev".'
        type: string
        default: 'dev'
      rc_environments:
        description: 'Space-separated environments updated by an rc release (release-candidate branch). Default "stg".'
        type: string
        default: 'stg'
      stable_environments:
        description: 'Space-separated environments updated by a stable release (main branch). Default "prd" so a hotfix does not overwrite features still in dev/stg. Set to "dev stg prd" to refresh lower environments too. Sandbox is controlled separately by update_sandbox.'
        type: string
        default: 'prd'
      gitops_artifact_pattern:
        description: 'Pattern to download GitOps artifacts (defaults to "gitops-tags-<repo-name>*")'
        type: string
        default: ''
      gitops_yaml_key_mappings:
        description: 'JSON object mapping artifact names to YAML keys (e.g., {"app.tag": ".api.image.tag"})'
        type: string
        default: ''
      deployment_matrix_ref:
        description: 'Git ref of LerianStudio/github-actions-shared-workflows to read the deployment matrix from. Defaults to main. Override only when testing a branch.'
        type: string
        default: 'main'
      enable_argocd_sync:
        description: 'Trigger ArgoCD sync after updating the GitOps repository'
        type: boolean
        default: true
      commit_message_prefix:
        description: 'Prefix for the GitOps commit message. When empty, falls back to app_name_prefix, then the repository name.'
        type: string
        default: ''
      use_dynamic_mapping:
        description: 'Use dynamic artifact-to-YAML key mapping in gitops-update'
        type: boolean
        default: false
      configmap_updates:
        description: 'JSON object mapping artifact names to configmap keys (helmfile layout only)'
        type: string
        default: ''
      enable_docker_login:
        description: 'Log in to DockerHub in the gitops-update job (for private image digest reads)'
        type: boolean
        default: false

      # ----------------- E2E Tests -----------------
      enable_e2e:
        description: 'Enable the E2E test job after the build (runs only on tag push)'
        type: boolean
        default: false
      e2e_script:
        description: 'npm script to run for E2E tests (e.g. test:e2e, test:e2e:mock)'
        type: string
        default: 'test:e2e'
      e2e_base_url:
        description: 'Base URL injected as BASE_URL env var for real-environment E2E mode. Empty = localhost fallback.'
        type: string
        default: ''
      node_version:
        description: 'Node.js version for the E2E test runner'
        type: string
        default: '22'
      e2e_s3_artifact_path:
        description: 'Subpath under s3://lerian-e2e-artifacts/<repo>/<channel>/<tag>/ where the Playwright report is uploaded. Channel (main/beta/rc) is derived from the tag''s prerelease identifier.'
        type: string
        default: 'playwright-report'

      # ----------------- Ungoliant Release Diff (ungoliant-release-diff composite) -----------------
      enable_ungoliant_release_diff:
        description: 'Fire the Ungoliant release-diff webhook on tag push after a successful gitops-update to trigger chaos/fuzz analysis for the release.'
        type: boolean
        default: false
      ungoliant_app:
        description: 'App slug sent to the Ungoliant controller. When empty, falls back to app_name_prefix, then the repository name.'
        type: string
        default: ''
      ungoliant_env_type:
        description: 'Ungoliant environment/testing type — chaos | fuzzing.'
        type: string
        default: 'chaos'
      ungoliant_tenancy:
        description: 'Ungoliant tenancy — st (single-tenant) | mt (multi-tenant).'
        type: string
        default: 'st'
      ungoliant_controller_url:
        description: 'Ungoliant controller base URL (reachable over Tailscale).'
        type: string
        default: 'https://ungoliant-controller.anacleto.lerian.net'
      ungoliant_runner_type:
        description: 'Runner for the Ungoliant release-diff job. Needs Tailscale reach to the controller, so it defaults to eveo-anacleto-lxc-runners rather than the build runner.'
        type: string
        default: 'eveo-anacleto-lxc-runners'
      ungoliant_skip_globs:
        description: 'Space-separated glob patterns. When every changed file matches one, Ungoliant is never contacted. Default skips CI/workflow-only releases.'
        type: string
        default: '.releaserc.yml .github/*'

    secrets:
      MANAGE_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      NPM_TOKEN:
        description: 'npm registry auth token, forwarded to the release job. Only used when the caller''s own .releaserc includes @semantic-release/npm (a package with independent semver that publishes to an npm registry). Optional — omit for repos that do not publish to npm.'
        required: false
      AWS_E2E_ARTIFACTS_ROLE_ARN:
        description: 'IAM role ARN assumed via OIDC to upload the E2E (Playwright) report to the lerian-e2e-artifacts S3 bucket. Optional — when unset, the S3 upload step is skipped and only the GitHub Actions artifact is produced.'
        required: false
      UNGOLIANT_WEBHOOK_TOKEN:
        required: false

    outputs:
      has_e2e_s3_upload:
        description: 'Whether the E2E Playwright report was uploaded to the lerian-e2e-artifacts S3 bucket (true/false). Always false when AWS_E2E_ARTIFACTS_ROLE_ARN is unset or enable_e2e is false.'
        value: ${{ jobs.e2e_tests.outputs.has_e2e_s3_upload || 'false' }}

permissions:
  contents: read

jobs:
  # ----------------- Change Detection (release gate, branch push only) -----------------
  changes:
    name: Detect non-doc changes
    if: github.ref_type == 'branch'
    runs-on: ${{ inputs.runner_type }}
    permissions:
      contents: read
    outputs:
      code: ${{ steps.gate.outputs.code }}
    steps:
      - name: Non-doc change gate
        id: gate
        uses: LerianStudio/github-actions-shared-workflows/src/config/non-doc-changes@v1
        with:
          github-token: ${{ github.token }}
          ignore-globs: ${{ inputs.ignore_globs }}

  # ----------------- Release (branch push) -----------------
  release:
    needs: changes
    if: github.ref_type == 'branch' && needs.changes.outputs.code == 'true'
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
      packages: read
    uses: ./.github/workflows/release.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      dry_run: ${{ inputs.dry_run }}
      semantic_version: ${{ inputs.semantic_version }}
      enable_changelog: ${{ inputs.enable_changelog }}
      enable_major_tag: ${{ inputs.enable_major_tag }}
      stable_releases_only: ${{ inputs.stable_releases_only }}
      backmerge_enabled: ${{ inputs.backmerge_enabled }}
      backmerge_source: ${{ inputs.backmerge_source }}
      backmerge_target: ${{ inputs.backmerge_target }}
      backmerge_mode: ${{ inputs.backmerge_mode }}
      shared_paths: ${{ inputs.shared_paths }}
      path_level: ${{ inputs.path_level }}
      filter_paths: ${{ !inputs.release_single_app && inputs.filter_paths || '' }}
    secrets: inherit

  # ----------------- Build (tag push) -----------------
  build:
    if: github.ref_type == 'tag'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: write
    uses: ./.github/workflows/typescript-build.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      dry_run: ${{ inputs.dry_run }}
      enable_dockerhub: ${{ inputs.enable_dockerhub }}
      enable_ghcr: ${{ inputs.enable_ghcr }}
      enable_gitops_artifacts: ${{ inputs.enable_gitops_artifacts }}
      app_name_prefix: ${{ inputs.app_name_prefix }}
      app_name_overrides: ${{ inputs.app_name_overrides }}
      dockerfile_name: ${{ inputs.dockerfile_name }}
      build_context: ${{ inputs.build_context }}
      build_secrets: ${{ inputs.build_secrets }}
      enable_cosign_sign: ${{ inputs.enable_cosign_sign }}
      dockerhub_org: ${{ inputs.dockerhub_org }}
      shared_paths: ${{ inputs.shared_paths }}
      filter_paths: ${{ inputs.filter_paths }}
      path_level: ${{ inputs.path_level }}
      force_full_matrix: ${{ inputs.force_full_matrix }}
    secrets: inherit

  # ----------------- E2E Tests (tag push) -----------------
  e2e_tests:
    name: E2E Tests
    needs: [build]
    if: >-
      github.ref_type == 'tag' && inputs.enable_e2e &&
      !cancelled() && needs.build.result == 'success' && !inputs.dry_run
    runs-on: ${{ inputs.runner_type }}
    permissions:
      id-token: write
      contents: read
    outputs:
      has_e2e_s3_upload: ${{ steps.s3_upload.outputs.uploaded == 'true' && 'true' || 'false' }}
    env:
      AWS_E2E_ARTIFACTS_ROLE_ARN: ${{ secrets.AWS_E2E_ARTIFACTS_ROLE_ARN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run "$E2E_SCRIPT"
        env:
          E2E_SCRIPT: ${{ inputs.e2e_script }}
          BASE_URL: ${{ inputs.e2e_base_url }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ----------------- E2E Report S3 Upload (optional) -----------------
      # lerian-e2e-artifacts lives in the devops AWS account. Skipped when the
      # AWS_E2E_ARTIFACTS_ROLE_ARN secret is not configured by the caller.
      - name: Configure AWS credentials for E2E artifacts upload
        if: always() && env.AWS_E2E_ARTIFACTS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_E2E_ARTIFACTS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Upload Playwright report to S3
        id: s3_upload
        if: always() && env.AWS_E2E_ARTIFACTS_ROLE_ARN != ''
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TAG_NAME: ${{ github.ref_name }}
          ARTIFACT_PATH: ${{ inputs.e2e_s3_artifact_path }}
        run: |
          set -euo pipefail
          if [[ -d playwright-report ]]; then
            # Channel is derived from the tag's prerelease identifier, which
            # matches the branch that cut the release (see .releaserc.yml
            # `branches` / prerelease config): develop -> vX.Y.Z-beta.N,
            # release-candidate -> vX.Y.Z-rc.N, main -> plain vX.Y.Z.
            CHANNEL="main"
            if [[ "$TAG_NAME" == *-beta.* ]]; then
              CHANNEL="beta"
            elif [[ "$TAG_NAME" == *-rc.* ]]; then
              CHANNEL="rc"
            fi
            S3_PATH="s3://lerian-e2e-artifacts/${REPO_NAME}/${CHANNEL}/${TAG_NAME}/${ARTIFACT_PATH}/"
            aws s3 cp playwright-report/ "$S3_PATH" --recursive
            echo "::notice::Uploaded Playwright report to ${S3_PATH}"
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::playwright-report/ not found — skipping S3 upload"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
          fi

  # ----------------- GitOps Update (tag push) -----------------
  update_gitops:
    needs: [build]
    if: >-
      github.ref_type == 'tag' && inputs.enable_gitops_update &&
      inputs.enable_gitops_artifacts && !cancelled() &&
      needs.build.result == 'success' && needs.build.outputs.has_builds == 'true'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: write
    uses: ./.github/workflows/gitops-update.yml
    with:
      gitops_repository: ${{ inputs.gitops_repository }}
      update_sandbox: ${{ inputs.update_sandbox }}
      beta_environments: ${{ inputs.beta_environments }}
      rc_environments: ${{ inputs.rc_environments }}
      stable_environments: ${{ inputs.stable_environments }}
      app_name: ${{ inputs.app_name_prefix }}
      artifact_pattern: ${{ inputs.gitops_artifact_pattern || format('gitops-tags-{0}*', github.event.repository.name) }}
      yaml_key_mappings: ${{ inputs.gitops_yaml_key_mappings }}
      deployment_matrix_ref: ${{ inputs.deployment_matrix_ref }}
      enable_argocd_sync: ${{ inputs.enable_argocd_sync }}
      commit_message_prefix: ${{ inputs.commit_message_prefix || inputs.app_name_prefix }}
      use_dynamic_mapping: ${{ inputs.use_dynamic_mapping }}
      configmap_updates: ${{ inputs.configmap_updates }}
      enable_docker_login: ${{ inputs.enable_docker_login }}
    secrets: inherit

  # ----------------- Ungoliant Release Diff (tag push, post-gitops, opt-in) -----------------
  # Runs only after a successful gitops-update (i.e. the release was deployed).
  # The controller is reachable only over Tailscale, so the job runs on the
  # eveo-anacleto-lxc-runners self-hosted runner. base-env/env are derived from
  # the tag, which maps 1:1 to the source branch (beta<-develop, rc<-release-
  # candidate, stable<-main) per .releaserc conventions.
  ungoliant_release_diff:
    name: Ungoliant Release Diff
    needs: [build, update_gitops]
    # Gate on build's has_builds output (which propagates reliably and proves a
    # real deploy happened) rather than needs.update_gitops.result == 'success':
    # update_gitops wraps a reusable workflow with a dynamic matrix, and its
    # caller result does not reliably surface as 'success' to dependents.
    if: >-
      !cancelled()
      && github.ref_type == 'tag'
      && inputs.enable_ungoliant_release_diff
      && inputs.enable_gitops_update
      && inputs.enable_gitops_artifacts
      && needs.build.outputs.has_builds == 'true'
      && needs.update_gitops.result != 'failure'
      && needs.update_gitops.result != 'cancelled'
    runs-on: ${{ vars.UNGOLIANT_RUNNERS || inputs.ungoliant_runner_type }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Resolve release channel and base env
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$REF_NAME" == *-beta.* ]]; then
            RELEASE_ENV="beta"; BASE_ENV="dev"
          elif [[ "$REF_NAME" == *-rc.* ]]; then
            RELEASE_ENV="rc"; BASE_ENV="stg"
          else
            RELEASE_ENV="stable"; BASE_ENV="prd"
          fi
          {
            echo "release_env=$RELEASE_ENV"
            echo "base_env=$BASE_ENV"
          } >> "$GITHUB_OUTPUT"

      - name: Send release-diff webhook
        uses: LerianStudio/github-actions-shared-workflows/src/validate/ungoliant-release-diff@v1
        with:
          app: ${{ inputs.ungoliant_app || inputs.app_name_prefix || github.event.repository.name }}
          version: ${{ github.ref_name }}
          env: ${{ steps.target.outputs.release_env }}
          env-type: ${{ inputs.ungoliant_env_type }}
          tenancy: ${{ inputs.ungoliant_tenancy }}
          base-env: ${{ steps.target.outputs.base_env }}
          controller-url: ${{ vars.UNGOLIANT_CONTROLLER_URL || inputs.ungoliant_controller_url }}
          skip-globs: ${{ inputs.ungoliant_skip_globs }}
          github-token: ${{ github.token }}
          webhook-token: ${{ secrets.UNGOLIANT_WEBHOOK_TOKEN }}
          dry-run: ${{ inputs.dry_run }}
