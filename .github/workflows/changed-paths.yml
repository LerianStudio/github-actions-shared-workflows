name: Changed Paths

on:
  workflow_call:
    inputs:
      filter_paths:
        description: 'JSON array of path prefixes to filter results (e.g., ["components/mdz", "components/transaction"])'
        required: false
        type: string
        default: ''
      path_level:
        description: 'Limits the path to the first N segments (e.g., 2 -> "components/transactions")'
        required: false
        type: number
        default: 0
      get_app_name:
        description: 'If true, outputs a matrix of objects with app name and working directory'
        required: false
        type: boolean
        default: false
      app_name_prefix:
        description: 'Prefix to add to each app name when get_app_name is true'
        required: false
        type: string
        default: ''
      app_name_overrides:
        description: 'Newline-separated list of explicit app name mappings in "path:name" format. Use "path:" for prefix-only. Overrides default segment extraction'
        required: false
        type: string
        default: ''
      normalize_to_filter:
        description: 'If true, uses the filter path as working_dir instead of the actual trimmed directory path'
        required: false
        type: boolean
        default: false
      runner_type:
        description: 'GitHub runner type'
        required: false
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      dry_run:
        description: 'Preview changes without applying them'
        required: false
        type: boolean
        default: false

    outputs:
      matrix:
        description: 'JSON array of changed directories'
        value: ${{ jobs.get-changed-paths.outputs.matrix }}
      has_changes:
        description: 'Boolean indicating if there are any changes'
        value: ${{ jobs.get-changed-paths.outputs.has_changes }}

  workflow_dispatch:
    inputs:
      filter_paths:
        description: 'JSON array of path prefixes to filter results (e.g., ["components/mdz", "components/transaction"])'
        required: false
        type: string
        default: ''
      path_level:
        description: 'Limits the path to the first N segments (e.g., 2 -> "components/transactions")'
        required: false
        type: number
        default: 0
      get_app_name:
        description: 'If true, outputs a matrix of objects with app name and working directory'
        required: false
        type: boolean
        default: false
      app_name_prefix:
        description: 'Prefix to add to each app name when get_app_name is true'
        required: false
        type: string
        default: ''
      app_name_overrides:
        description: 'Newline-separated list of explicit app name mappings in "path:name" format. Use "path:" for prefix-only. Overrides default segment extraction'
        required: false
        type: string
        default: ''
      normalize_to_filter:
        description: 'If true, uses the filter path as working_dir instead of the actual trimmed directory path'
        required: false
        type: boolean
        default: false
      runner_type:
        description: 'GitHub runner type'
        required: false
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      dry_run:
        description: 'Preview changes without applying them'
        type: boolean
        default: false

jobs:
  get-changed-paths:
    name: Get Changed Paths
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.changed-paths.outputs.matrix }}
      has_changes: ${{ steps.changed-paths.outputs.has_changes }}

    steps:
      - name: Dry run notice
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          echo "::notice::DRY RUN — changed-paths detection"
          echo "  filter_paths        : ${{ inputs.filter_paths }}"
          echo "  path_level          : ${{ inputs.path_level }}"
          echo "  get_app_name        : ${{ inputs.get_app_name }}"
          echo "  app_name_prefix     : ${{ inputs.app_name_prefix }}"
          echo "  app_name_overrides  : ${{ inputs.app_name_overrides }}"
          echo "  normalize_to_filter : ${{ inputs.normalize_to_filter }}"

      - name: Get changed paths
        id: changed-paths
        uses: ./src/config/changed-paths
        with:
          filter_paths: ${{ inputs.filter_paths }}
          path_level: ${{ inputs.path_level }}
          get_app_name: ${{ inputs.get_app_name }}
          app_name_prefix: ${{ inputs.app_name_prefix }}
          app_name_overrides: ${{ inputs.app_name_overrides }}
          normalize_to_filter: ${{ inputs.normalize_to_filter }}

      - name: Dry run result
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          echo "::notice::DRY RUN — matrix result: ${{ steps.changed-paths.outputs.matrix }}"
          echo "::notice::DRY RUN — has_changes: ${{ steps.changed-paths.outputs.has_changes }}"
