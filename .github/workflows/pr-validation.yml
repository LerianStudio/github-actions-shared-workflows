name: "PR Validation"

# Reusable workflow for comprehensive pull request validation
# Uses a 2-tier fail-fast model:
#   Tier 1 (blocking-checks): lightweight validations that block merge — title, source branch, description
#   Tier 2 (advisory-checks): informational checks — size, labels, metadata, changelog (only runs if Tier 1 passes)
# Followed by a summary job and optional Slack notification

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      dry_run:
        description: Preview validations without posting comments or labels
        required: false
        type: boolean
        default: false
      pr_title_types:
        description: 'Allowed commit types (pipe-separated)'
        type: string
        default: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          chore
          ci
          build
          revert
      pr_title_scopes:
        description: 'Allowed scopes (pipe-separated, empty = any scope allowed)'
        type: string
        default: ''
      require_scope:
        description: 'Require scope in PR title'
        type: boolean
        default: false
      min_description_length:
        description: 'Minimum PR description length'
        type: number
        default: 50
      check_changelog:
        description: 'Check if CHANGELOG.md is updated'
        type: boolean
        default: true
      enable_auto_labeler:
        description: 'Enable automatic labeling based on changed files'
        type: boolean
        default: true
      labeler_config_path:
        description: 'Path to labeler configuration file'
        type: string
        default: '.github/labeler.yml'
      enforce_source_branches:
        description: 'Enforce that PRs to protected branches come from specific source branches'
        type: boolean
        default: false
      allowed_source_branches:
        description: 'Allowed source branches for PRs to protected branches (pipe-separated, supports prefix matching with *)'
        type: string
        default: 'develop|release-candidate|hotfix/*'
      target_branches_for_source_check:
        description: 'Target branches that require source branch validation (pipe-separated)'
        type: string
        default: 'main'
    secrets:
      MANAGE_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ----------------- Tier 1: Blocking Checks (no checkout, fail-fast) -----------------
  blocking-checks:
    name: Blocking Checks
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true
    outputs:
      source-branch-result: ${{ steps.collect.outputs.source_branch }}
      title-result: ${{ steps.collect.outputs.title }}
      description-result: ${{ steps.collect.outputs.description }}

    steps:
      - name: Validate source branch
        id: source-branch
        if: inputs.enforce_source_branches
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-source-branch@refactor/modularize-pr-validation
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          allowed-branches: ${{ inputs.allowed_source_branches }}
          target-branches: ${{ inputs.target_branches_for_source_check }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}

      - name: Validate PR title
        id: title
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-title@refactor/modularize-pr-validation
        with:
          github-token: ${{ github.token }}
          types: ${{ inputs.pr_title_types }}
          scopes: ${{ inputs.pr_title_scopes }}
          require-scope: ${{ inputs.require_scope && 'true' || 'false' }}

      - name: Validate PR description
        id: description
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-description@refactor/modularize-pr-validation
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          min-length: ${{ inputs.min_description_length }}

      - name: Collect results and enforce blocking
        id: collect
        run: |
          SOURCE_BRANCH="${{ steps.source-branch.outcome || 'skipped' }}"
          TITLE="${{ steps.title.outcome }}"
          DESCRIPTION="${{ steps.description.outcome }}"

          {
            echo "source_branch=${SOURCE_BRANCH}"
            echo "title=${TITLE}"
            echo "description=${DESCRIPTION}"
          } >> "$GITHUB_OUTPUT"

          # Fail the job if any blocking check failed
          FAILED=""
          if [ "${SOURCE_BRANCH}" = "failure" ]; then FAILED="${FAILED} source-branch"; fi
          if [ "${TITLE}" = "failure" ]; then FAILED="${FAILED} title"; fi
          if [ "${DESCRIPTION}" = "failure" ]; then FAILED="${FAILED} description"; fi

          if [ -n "${FAILED}" ]; then
            echo "::error::Blocking checks failed:${FAILED}"
            exit 1
          fi

  # ----------------- Tier 2: Advisory Checks (shared checkout, depends on Tier 1) -----------------
  advisory-checks:
    name: Advisory Checks
    runs-on: ${{ inputs.runner_type }}
    needs: [blocking-checks]
    if: always() && needs.blocking-checks.result == 'success' && github.event.pull_request.draft != true
    outputs:
      metadata-result: ${{ steps.collect.outputs.metadata }}
      size-result: ${{ steps.collect.outputs.size }}
      label-result: ${{ steps.collect.outputs.label }}
      changelog-result: ${{ steps.collect.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR metadata
        id: metadata
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-metadata@refactor/modularize-pr-validation
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}

      - name: Check PR size
        id: size
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-size@refactor/modularize-pr-validation
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          base-ref: ${{ github.base_ref }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}

      - name: Auto-label PR
        id: labels
        if: inputs.enable_auto_labeler && !inputs.dry_run
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-labels@refactor/modularize-pr-validation
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          config-path: ${{ inputs.labeler_config_path }}

      - name: Check changelog
        id: changelog
        if: inputs.check_changelog
        continue-on-error: true
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-changelog@refactor/modularize-pr-validation
        with:
          base-ref: ${{ github.base_ref }}

      - name: Collect results
        id: collect
        run: |
          {
            echo "metadata=${{ steps.metadata.outcome }}"
            echo "size=${{ steps.size.outcome }}"
            echo "label=${{ steps.labels.outcome || 'skipped' }}"
            echo "changelog=${{ steps.changelog.outcome || 'skipped' }}"
          } >> "$GITHUB_OUTPUT"

  # ----------------- PR Checks Summary -----------------
  pr-checks-summary:
    name: PR Checks Summary
    runs-on: ${{ inputs.runner_type }}
    needs: [blocking-checks, advisory-checks]
    if: always()

    steps:
      - name: PR Checks Summary
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-checks-summary@refactor/modularize-pr-validation
        with:
          source-branch-result: ${{ needs.blocking-checks.outputs.source-branch-result || 'skipped' }}
          title-result: ${{ needs.blocking-checks.outputs.title-result || 'skipped' }}
          description-result: ${{ needs.blocking-checks.outputs.description-result || 'skipped' }}
          size-result: ${{ needs.advisory-checks.outputs.size-result || 'skipped' }}
          label-result: ${{ needs.advisory-checks.outputs.label-result || 'skipped' }}
          metadata-result: ${{ needs.advisory-checks.outputs.metadata-result || 'skipped' }}
          changelog-result: ${{ needs.advisory-checks.outputs.changelog-result || 'skipped' }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}

  # ----------------- Slack Notification -----------------
  notify:
    name: Notify
    needs: [blocking-checks, advisory-checks, pr-checks-summary]
    if: always() && github.event.pull_request.draft != true && !inputs.dry_run
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/slack-notify.yml@refactor/modularize-pr-validation
    with:
      status: ${{ (needs.blocking-checks.outputs.source-branch-result == 'failure' || needs.blocking-checks.outputs.title-result == 'failure' || needs.blocking-checks.outputs.description-result == 'failure') && 'failure' || 'success' }}
      workflow_name: "PR Validation"
      failed_jobs: ${{ needs.blocking-checks.outputs.source-branch-result == 'failure' && 'Source Branch, ' || '' }}${{ needs.blocking-checks.outputs.title-result == 'failure' && 'PR Title, ' || '' }}${{ needs.blocking-checks.outputs.description-result == 'failure' && 'PR Description' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
