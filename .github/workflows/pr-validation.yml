name: "PR Validation"

# Reusable workflow for comprehensive pull request validation
# Checks PR title, size, description, labels, and best practices

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      dry_run:
        description: Preview validations without posting comments or labels
        required: false
        type: boolean
        default: false
      pr_title_types:
        description: 'Allowed commit types (pipe-separated)'
        type: string
        default: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          chore
          ci
          build
          revert
      pr_title_scopes:
        description: 'Allowed scopes (pipe-separated, empty = any scope allowed)'
        type: string
        default: ''
      require_scope:
        description: 'Require scope in PR title'
        type: boolean
        default: false
      min_description_length:
        description: 'Minimum PR description length'
        type: number
        default: 50
      check_changelog:
        description: 'Check if CHANGELOG.md is updated'
        type: boolean
        default: true
      enable_auto_labeler:
        description: 'Enable automatic labeling based on changed files'
        type: boolean
        default: true
      labeler_config_path:
        description: 'Path to labeler configuration file'
        type: string
        default: '.github/labeler.yml'
      enforce_source_branches:
        description: 'Enforce that PRs to protected branches come from specific source branches'
        type: boolean
        default: false
      allowed_source_branches:
        description: 'Allowed source branches for PRs to protected branches (pipe-separated, supports prefix matching with *)'
        type: string
        default: 'develop|release-candidate|hotfix/*'
      target_branches_for_source_check:
        description: 'Target branches that require source branch validation (pipe-separated)'
        type: string
        default: 'main'
    secrets:
      MANAGE_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ----------------- Source Branch Validation -----------------
  pr-source-branch:
    name: Validate Source Branch
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true && inputs.enforce_source_branches

    steps:
      - name: Validate source branch
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-source-branch@develop
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          allowed-branches: ${{ inputs.allowed_source_branches }}
          target-branches: ${{ inputs.target_branches_for_source_check }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}

  # ----------------- PR Title Validation -----------------
  pr-title:
    name: Validate PR Title
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true

    steps:
      - name: Validate PR title format
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-title@develop
        with:
          github-token: ${{ github.token }}
          types: ${{ inputs.pr_title_types }}
          scopes: ${{ inputs.pr_title_scopes }}
          require-scope: ${{ inputs.require_scope && 'true' || 'false' }}

  # ----------------- PR Size Check -----------------
  pr-size:
    name: Check PR Size
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-size@develop
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          base-ref: ${{ github.base_ref }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}

  # ----------------- PR Description Check -----------------
  pr-description:
    name: Check PR Description
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true

    steps:
      - name: Validate PR description
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-description@develop
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          min-length: ${{ inputs.min_description_length }}

  # ----------------- Auto-label PR -----------------
  pr-labels:
    name: Auto-label PR
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true && inputs.enable_auto_labeler && !inputs.dry_run

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Auto-label based on files
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-labels@develop
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          config-path: ${{ inputs.labeler_config_path }}

  # ----------------- PR Metadata Check -----------------
  pr-metadata:
    name: Check PR Metadata
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true

    steps:
      - name: Check assignee and linked issues
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-metadata@develop
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}

  # ----------------- Changelog Check -----------------
  pr-changelog:
    name: Check Changelog Update
    runs-on: ${{ inputs.runner_type }}
    if: github.event.pull_request.draft != true && inputs.check_changelog

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changelog
        uses: LerianStudio/github-actions-shared-workflows/src/validate/pr-changelog@develop
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          base-ref: ${{ github.base_ref }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}

  # ----------------- PR Checks Summary -----------------
  pr-checks-summary:
    name: PR Checks Summary
    runs-on: ${{ inputs.runner_type }}
    needs: [pr-source-branch, pr-title, pr-size, pr-description, pr-labels, pr-metadata, pr-changelog]
    if: always()

    steps:
      - name: Summary
        uses: actions/github-script@v8
        env:
          SOURCE_BRANCH_RESULT: ${{ needs.pr-source-branch.result }}
          TITLE_RESULT: ${{ needs.pr-title.result }}
          SIZE_RESULT: ${{ needs.pr-size.result }}
          DESCRIPTION_RESULT: ${{ needs.pr-description.result }}
          LABEL_RESULT: ${{ needs.pr-labels.result }}
          METADATA_RESULT: ${{ needs.pr-metadata.result }}
          CHANGELOG_RESULT: ${{ needs.pr-changelog.result }}
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          script: |
            const checks = {
              'Source Branch': process.env.SOURCE_BRANCH_RESULT,
              'PR Title': process.env.TITLE_RESULT,
              'PR Size': process.env.SIZE_RESULT,
              'PR Description': process.env.DESCRIPTION_RESULT,
              'Auto-label': process.env.LABEL_RESULT,
              'Metadata': process.env.METADATA_RESULT,
              'Changelog': process.env.CHANGELOG_RESULT
            };

            let summary = '## PR Checks Summary\n\n';
            if (process.env.DRY_RUN === 'true') {
              summary += '> **DRY RUN** — no comments, labels, or reviews were posted\n\n';
            }
            for (const [check, result] of Object.entries(checks)) {
              const icon = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
              summary += `${icon} ${check}: ${result}\n`;
            }

            core.summary.addRaw(summary);
            await core.summary.write();

  # ----------------- Slack Notification -----------------
  notify:
    name: Notify
    needs: [pr-source-branch, pr-title, pr-size, pr-description, pr-labels, pr-metadata, pr-changelog, pr-checks-summary]
    if: always() && github.event.pull_request.draft != true && !inputs.dry_run
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/slack-notify.yml@develop
    with:
      status: ${{ (needs.pr-source-branch.result == 'failure' || needs.pr-title.result == 'failure' || needs.pr-description.result == 'failure' || needs.pr-changelog.result == 'failure') && 'failure' || 'success' }}
      workflow_name: "PR Validation"
      failed_jobs: ${{ needs.pr-source-branch.result == 'failure' && 'Source Branch, ' || '' }}${{ needs.pr-title.result == 'failure' && 'PR Title, ' || '' }}${{ needs.pr-description.result == 'failure' && 'PR Description, ' || '' }}${{ needs.pr-changelog.result == 'failure' && 'Changelog' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
