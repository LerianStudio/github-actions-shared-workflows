name: "Ungoliant Release Diff"

# Reusable workflow that fires the release-diff webhook at the Ungoliant
# controller to trigger chaos/fuzz analysis for a release tag.
#
# CI equivalent of ungoliant-controller/docs/testing/cluster/test-release.sh.
# The controller is reachable only over Tailscale, so the job runs on a
# Tailscale-connected self-hosted runner (default: eveo-anacleto-lxc-runners).

on:
  workflow_call:
    inputs:
      app:
        description: 'App slug (midaz, reporter, plugin-fees, …)'
        type: string
        required: true
      version:
        description: 'Tag to test (e.g. v1.3.4-beta.1)'
        type: string
        required: true
      previous:
        description: 'Previous tag for the diff. Auto-resolved when empty.'
        type: string
        required: false
        default: ''
      env:
        description: 'Release channel — beta | rc | stable'
        type: string
        required: false
        default: 'beta'
      testing_type:
        description: 'Testing type — chaos | fuzzing'
        type: string
        required: false
        default: 'chaos'
      tenancy:
        description: 'Tenancy — st (single-tenant) | mt (multi-tenant)'
        type: string
        required: false
        default: 'st'
      base_env:
        description: 'Base environment — dev | stg | prd'
        type: string
        required: false
        default: 'dev'
      controller_url:
        description: 'Ungoliant controller base URL (reachable over Tailscale)'
        type: string
        required: false
        default: 'https://ungoliant-controller.anacleto.lerian.net'
      repo_owner:
        description: 'GitHub owner/org that hosts the app repository'
        type: string
        required: false
        default: 'LerianStudio'
      max_diff_bytes:
        description: 'Maximum diff size forwarded to the controller (bytes)'
        type: string
        required: false
        default: '262144'
      curl_timeout:
        description: 'Timeout for the webhook POST in seconds'
        type: string
        required: false
        default: '300'
      runner_type:
        description: 'Runner for the job. Needs Tailscale reach to the controller, so it defaults to eveo-anacleto-lxc-runners rather than the build runner.'
        type: string
        required: false
        default: 'eveo-anacleto-lxc-runners'
      dry_run:
        description: 'Resolve and preview the payload without firing the webhook'
        type: boolean
        required: false
        default: false
    secrets:
      UNGOLIANT_WEBHOOK_TOKEN:
        description: 'Ungoliant webhook token sent as the X-Ungoliant-Token header'
        required: false
    outputs:
      status:
        description: 'Controller response status (e.g. analysis_completed)'
        value: ${{ jobs.release-diff.outputs.status }}
      run_id:
        description: 'Controller run_id for the analysis'
        value: ${{ jobs.release-diff.outputs.run_id }}
      schema:
        description: 'Response schema (release-plan | release-summary)'
        value: ${{ jobs.release-diff.outputs.schema }}
      risk_level:
        description: 'Risk level reported by the controller'
        value: ${{ jobs.release-diff.outputs.risk_level }}

permissions:
  contents: read

jobs:
  release-diff:
    name: Release Diff
    runs-on: ${{ inputs.runner_type }}
    outputs:
      status: ${{ steps.release_diff.outputs.status }}
      run_id: ${{ steps.release_diff.outputs.run-id }}
      schema: ${{ steps.release_diff.outputs.schema }}
      risk_level: ${{ steps.release_diff.outputs.risk-level }}
    steps:
      - name: Send release-diff webhook
        id: release_diff
        uses: LerianStudio/github-actions-shared-workflows/src/validate/ungoliant-release-diff@develop
        with:
          app: ${{ inputs.app }}
          version: ${{ inputs.version }}
          previous: ${{ inputs.previous }}
          env: ${{ inputs.env }}
          testing-type: ${{ inputs.testing_type }}
          tenancy: ${{ inputs.tenancy }}
          base-env: ${{ inputs.base_env }}
          controller-url: ${{ inputs.controller_url }}
          repo-owner: ${{ inputs.repo_owner }}
          max-diff-bytes: ${{ inputs.max_diff_bytes }}
          curl-timeout: ${{ inputs.curl_timeout }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          webhook-token: ${{ secrets.UNGOLIANT_WEBHOOK_TOKEN }}
          dry-run: ${{ inputs.dry_run }}
