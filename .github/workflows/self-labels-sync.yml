name: Self — Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview changes without applying them
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  sync:
    name: Sync labels
    uses: ./.github/workflows/labels-sync.yml
    with:
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
