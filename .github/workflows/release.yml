name: "Release Workflow"

# This reusable workflow handles semantic versioning, release management, and
# optional changelog generation.
#
# Monorepo Support:
# - If filter_paths is provided: detects changes and runs release for each changed app
# - If filter_paths is empty: runs release for the entire repository (single app mode)

on:
  workflow_call:
    outputs:
      new_release_published:
        description: 'true when at least one matrix leg published a release.'
        value: ${{ jobs.publish_release_status.outputs.release_published }}
      new_release_version:
        description: 'Published version (single-app mode; last matrix leg that actually published wins in monorepo).'
        value: ${{ jobs.publish_release_status.outputs.release_version }}
      new_release_git_tag:
        description: 'Git tag semantic-release created (single-app mode; last leg that actually published wins in monorepo).'
        value: ${{ jobs.publish_release_status.outputs.release_git_tag }}
    inputs:
      semantic_version:
        description: 'Semantic release version to use'
        type: string
        default: '23.0.8'
      runner_type:
        description: 'Runner to use for the workflow'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'Newline-separated list of path prefixes to filter. If not provided, treats as single app repo.'
        type: string
        required: false
        default: ''
      shared_paths:
        description: 'Newline-separated path patterns (e.g., "go.mod\ngo.sum") that trigger a build for ALL components when matched by any changed file.'
        type: string
        required: false
        default: ''
      path_level:
        description: 'Limits the path to the first N segments (e.g., 2 -> "apps/agent")'
        type: string
        default: '2'
      enable_changelog:
        description: 'Generate CHANGELOG.md files via GPT after a successful release'
        required: false
        type: boolean
        default: false
      enable_major_tag:
        description: 'Force-update the floating major version tag (e.g. v1) after a successful release'
        required: false
        type: boolean
        default: false
      stable_releases_only:
        description: 'Only generate changelogs for stable releases (skip beta/rc/alpha tags)'
        required: false
        type: boolean
        default: true
      openai_model:
        description: 'Model to use for changelog generation (OpenRouter format)'
        required: false
        type: string
        default: 'openai/gpt-4o'
      changelog_bot_ignore_list:
        description: 'Space-separated list of GitHub login substrings to exclude from the changelog (bot authors). Logins ending in [bot] are always excluded. Extends the default list built into the gptchangelog composite action.'
        required: false
        type: string
        default: ''

      # ----------------- Backmerge -----------------
      backmerge_enabled:
        description: 'Backmerge the release branch into the target branch after a successful release'
        required: false
        type: boolean
        default: true
      backmerge_source:
        description: 'Release branch eligible for backmerge; backmerge runs only when the release ref matches this'
        required: false
        type: string
        default: 'main'
      backmerge_target:
        description: 'Branch that receives the backmerge'
        required: false
        type: string
        default: 'develop'
      backmerge_mode:
        description: 'Backmerge strategy: direct | pr | direct-with-pr-fallback'
        required: false
        type: string
        default: 'direct-with-pr-fallback'
      dry_run:
        description: 'Run semantic-release in dry-run mode (no tags/releases created) and preview the backmerge instead of applying it'
        required: false
        type: boolean
        default: false
      prerelease_branches:
        description: 'Comma-separated list of branches treated as prerelease lines (beta/rc). Before calculating a version on these branches, backmerge_source is merged in first; if that merge cannot complete directly, the release is skipped for this run. A defensive check then fails the run if the calculated version would still land on an X.Y.Z that already has a stable release.'
        required: false
        type: string
        default: 'develop,release-candidate'
      prerelease_backmerge_sync_enabled:
        description: 'Merge backmerge_source into a prerelease branch (see prerelease_branches) before calculating its next version. Independent of backmerge_enabled, which also gates the separate post-release backmerge on backmerge_source itself. Defaults to false (opt-in) — set to true to enable this pre-version-calculation sync, which can skip/block a release on prerelease branches when the merge cannot complete directly. The post-release backmerge on backmerge_source is unaffected by this input either way.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      should_skip: ${{ steps.check-skip.outputs.should_skip }}
    steps:
      - name: Check if should skip (changelog commits)
        id: check-skip
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "📌 Checking commit message for skip patterns"

          # Skip if commit message contains [skip ci] or is a changelog update
          if echo "$COMMIT_MSG" | grep -qiE '\[skip ci\]|chore\(release\): Update CHANGELOGs'; then
            echo "🛑 Skipping release - changelog/skip-ci commit detected"
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Proceeding with release"
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get changed paths (monorepo)
        if: inputs.filter_paths != ''
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@v1
        with:
          filter-paths: ${{ inputs.filter_paths }}
          shared-paths: ${{ inputs.shared_paths }}
          path-level: ${{ inputs.path_level }}
          get-app-name: 'true'

      - name: Set matrix
        id: set-matrix
        env:
          FILTER_PATHS: ${{ inputs.filter_paths }}
          REPO_NAME: ${{ github.event.repository.name }}
          CHANGED_MATRIX: ${{ steps.changed-paths.outputs.matrix }}
        run: |
          if [ -z "$FILTER_PATHS" ]; then
            # Single app mode - release from root
            APP_NAME="$REPO_NAME"
            echo "matrix=[{\"name\": \"${APP_NAME}\", \"working_dir\": \".\"}]" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            MATRIX="$CHANGED_MATRIX"
            if [ "$MATRIX" == "[]" ] || [ -z "$MATRIX" ]; then
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            else
              echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  publish_release:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true' && needs.prepare.outputs.should_skip != 'true'
    runs-on: ${{ inputs.runner_type }}
    environment:
      name: create_release
    name: Release ${{ matrix.app.name }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.matrix) }}

    outputs:
      gpg_fingerprint: ${{ steps.import_gpg.outputs.fingerprint }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private-key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync with remote branch
        run: |
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

      - name: Fetch semantic-release git notes
        run: git fetch origin "+refs/notes/*:refs/notes/*"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY }}
          passphrase: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY_PASSWORD }}
          git_committer_name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git_committer_email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      # ----------------- Backmerge config preflight -----------------
      - name: Validate backmerge inputs
        if: inputs.backmerge_enabled
        env:
          BACKMERGE_MODE: ${{ inputs.backmerge_mode }}
          BACKMERGE_SOURCE: ${{ inputs.backmerge_source }}
          BACKMERGE_TARGET: ${{ inputs.backmerge_target }}
        run: |
          case "$BACKMERGE_MODE" in
            direct|pr|direct-with-pr-fallback) ;;
            *)
              echo "::error::Invalid backmerge_mode '$BACKMERGE_MODE' (must be: direct, pr, direct-with-pr-fallback)"
              exit 1
              ;;
          esac
          if [ "$BACKMERGE_SOURCE" = "$BACKMERGE_TARGET" ]; then
            echo "::error::backmerge_source and backmerge_target must differ (got '$BACKMERGE_SOURCE')"
            exit 1
          fi
          if ! git check-ref-format --branch "$BACKMERGE_SOURCE" >/dev/null 2>&1; then
            echo "::error::Invalid backmerge_source ref: '$BACKMERGE_SOURCE'"
            exit 1
          fi
          if ! git check-ref-format --branch "$BACKMERGE_TARGET" >/dev/null 2>&1; then
            echo "::error::Invalid backmerge_target ref: '$BACKMERGE_TARGET'"
            exit 1
          fi

      # ----------------- Prerelease staleness guard -----------------
      - name: Classify branch
        id: classify
        env:
          REF_NAME: ${{ github.ref_name }}
          PRERELEASE_BRANCHES: ${{ inputs.prerelease_branches }}
        run: |
          is_prerelease=false
          IFS=',' read -ra BR <<< "$PRERELEASE_BRANCHES"
          for b in "${BR[@]}"; do
            b_trimmed="$(echo "$b" | xargs)"
            if [ "$b_trimmed" = "$REF_NAME" ]; then
              is_prerelease=true
              break
            fi
          done
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Sync ${{ inputs.backmerge_source }} → ${{ github.ref_name }} before calculating version
        id: pre_sync
        if: inputs.backmerge_enabled && inputs.prerelease_backmerge_sync_enabled && steps.classify.outputs.is_prerelease == 'true'
        uses: LerianStudio/github-actions-shared-workflows/src/config/backmerge-sync@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          source-branch: ${{ inputs.backmerge_source }}
          target-branch: ${{ github.ref_name }}
          mode: direct-with-pr-fallback
          dry-run: ${{ inputs.dry_run }}
          commit-message: "chore(release): sync ${source} into ${target} before release [skip ci]"
          pr-title: "chore(release): sync ${source} → ${target}"
          git-user-name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git-user-email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}

      - name: Warn about pending backmerge sync
        if: steps.pre_sync.outputs.action == 'pr-opened' || steps.pre_sync.outputs.action == 'pr-existing'
        env:
          APP_NAME: ${{ matrix.app.name }}
          BACKMERGE_SOURCE: ${{ inputs.backmerge_source }}
          REF_NAME: ${{ github.ref_name }}
          PR_URL: ${{ steps.pre_sync.outputs.pr-url }}
        run: |
          printf '::warning::Release skipped for %s — %s could not be auto-merged into %s (PR: %s). Merge it and push again to release.\n' "$APP_NAME" "$BACKMERGE_SOURCE" "$REF_NAME" "$PR_URL"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Init package.json
        working-directory: ${{ matrix.app.working_dir }}
        run: npm init -y

      - name: Install semantic-release plugins
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          npm install --save-dev \
            @semantic-release/exec

      - name: Determine next version (dry-run)
        id: semantic_dry
        if: |
          steps.classify.outputs.is_prerelease == 'true' &&
          steps.pre_sync.outputs.action != 'pr-opened' &&
          steps.pre_sync.outputs.action != 'pr-existing'
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6
        with:
          ci: false
          dry_run: true
          semantic_version: ${{ inputs.semantic_version }}
          working_directory: ${{ matrix.app.working_dir }}
          extra_plugins: |
            conventional-changelog-conventionalcommits@v7.0.2
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Guard against stale prerelease
        id: guard
        if: steps.semantic_dry.outputs.new_release_published == 'true'
        uses: LerianStudio/github-actions-shared-workflows/src/config/prerelease-guard@v1
        with:
          calculated-version: ${{ steps.semantic_dry.outputs.new_release_version }}
          source-branch: ${{ inputs.backmerge_source }}
          target-branch: ${{ github.ref_name }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6
        id: semantic
        if: |
          steps.classify.outputs.is_prerelease != 'true' ||
          (steps.pre_sync.outputs.action != 'pr-opened' && steps.pre_sync.outputs.action != 'pr-existing')
        with:
          ci: false
          dry_run: ${{ inputs.dry_run }}
          semantic_version: ${{ inputs.semantic_version }}
          working_directory: ${{ matrix.app.working_dir }}
          extra_plugins: |
            conventional-changelog-conventionalcommits@v7.0.2
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}

      # ----------------- Backmerge -----------------
      - name: Backmerge ${{ inputs.backmerge_source }} → ${{ inputs.backmerge_target }}
        if: |
          inputs.backmerge_enabled &&
          steps.semantic.outputs.new_release_published == 'true' &&
          github.ref_name == inputs.backmerge_source
        uses: LerianStudio/github-actions-shared-workflows/src/config/backmerge-sync@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          source-branch: ${{ inputs.backmerge_source }}
          target-branch: ${{ inputs.backmerge_target }}
          mode: ${{ inputs.backmerge_mode }}
          dry-run: ${{ inputs.dry_run }}
          commit-message: "chore(release): backmerge ${source} into ${target} [skip ci]"
          pr-title: "chore(release): backmerge ${source} → ${target} (v${{ steps.semantic.outputs.new_release_version }})"
          git-user-name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git-user-email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}

      # ----------------- Per-leg release publish marker -----------------
      # Matrix job outputs are last-writer-wins, so we persist each leg's
      # publish signal (plus version/tag) as an artifact and aggregate
      # downstream — this keeps new_release_version/new_release_git_tag
      # consistent with release_published instead of picking them from
      # whichever leg's job output happens to write last, published or not.
      - name: Mark publish status
        if: always()
        env:
          SEMANTIC_PUBLISHED: ${{ steps.semantic.outputs.new_release_published }}
          SEMANTIC_VERSION: ${{ steps.semantic.outputs.new_release_version }}
          SEMANTIC_TAG: ${{ steps.semantic.outputs.new_release_git_tag }}
          APP_NAME: ${{ matrix.app.name }}
          STATUS_DIR: ${{ runner.temp }}/publish-status
        run: |
          mkdir -p "$STATUS_DIR"
          if [[ "$SEMANTIC_PUBLISHED" == "true" ]]; then
            {
              echo "true"
              echo "$SEMANTIC_VERSION"
              echo "$SEMANTIC_TAG"
              date +%s%N
            } > "$STATUS_DIR/${APP_NAME}.txt"
            echo "✅ ${APP_NAME}: release published"
          else
            echo "false" > "$STATUS_DIR/${APP_NAME}.txt"
            echo "ℹ️ ${APP_NAME}: no release published"
          fi

      - name: Upload publish status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: publish-status-${{ matrix.app.name }}
          path: ${{ runner.temp }}/publish-status/
          retention-days: 1

  # ----------------- Aggregate publish status across matrix legs -----------------
  publish_release_status:
    name: Aggregate Publish Status
    needs: publish_release
    if: always() && needs.publish_release.result != 'cancelled'
    runs-on: ${{ inputs.runner_type }}
    outputs:
      release_published: ${{ steps.aggregate.outputs.published }}
      release_version: ${{ steps.aggregate.outputs.version }}
      release_git_tag: ${{ steps.aggregate.outputs.git_tag }}
    steps:
      - name: Download all publish status artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: publish-status-*
          path: /tmp/publish-status
          merge-multiple: true

      - name: Aggregate published signal
        id: aggregate
        run: |
          shopt -s nullglob
          published=false
          version=""
          git_tag=""
          best_ts=-1
          # Glob order is alphabetical by app name, not matrix execution order,
          # so pick the leg with the latest recorded timestamp (not the
          # alphabetically-last filename) to genuinely reflect "last leg that
          # published wins" when multiple legs publish in the same run.
          for f in /tmp/publish-status/*.txt; do
            leg_published="$(sed -n '1p' "$f")"
            if [[ "$leg_published" == "true" ]]; then
              published=true
              leg_ts="$(sed -n '4p' "$f")"
              leg_ts="${leg_ts:-0}"
              leg_version="$(sed -n '2p' "$f")"
              leg_tag="$(sed -n '3p' "$f")"
              if [[ "$leg_ts" -gt "$best_ts" ]]; then
                best_ts="$leg_ts"
                version="$leg_version"
                git_tag="$leg_tag"
              fi
              echo "✅ $(basename "$f" .txt) reported a release (${leg_version})"
            fi
          done
          {
            echo "published=$published"
            echo "version=$version"
            echo "git_tag=$git_tag"
          } >> "$GITHUB_OUTPUT"
          if [[ "$published" == "true" ]]; then
            echo "✅ At least one matrix leg published a release (latest: ${version})"
          else
            echo "ℹ️ No release published across matrix legs"
          fi

  # ----------------- Changelog Generation -----------------
  generate_changelog:
    name: Generate Changelog
    needs: [publish_release, publish_release_status, update_major_tag]
    if: >-
      always() &&
      inputs.enable_changelog &&
      needs.publish_release_status.outputs.release_published == 'true' &&
      (needs.update_major_tag.result == 'success' || needs.update_major_tag.result == 'skipped')
    runs-on: ${{ inputs.runner_type }}
    environment:
      name: create_release
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private-key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - name: Generate Changelog
        uses: LerianStudio/github-actions-shared-workflows/src/changelog/gptchangelog@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          gpg-private-key: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY }}
          gpg-passphrase: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY_PASSWORD }}
          git-committer-name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git-committer-email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          filter-paths: ${{ inputs.filter_paths }}
          stable-releases-only: ${{ inputs.stable_releases_only }}
          openai-model: ${{ inputs.openai_model }}
          bot-ignore-list: ${{ inputs.changelog_bot_ignore_list }}

  # ----------------- Major Tag Update -----------------
  update_major_tag:
    name: Update Major Tag
    needs: [publish_release, publish_release_status]
    if: inputs.enable_major_tag && needs.publish_release_status.outputs.release_published == 'true'
    runs-on: ${{ inputs.runner_type }}
    environment:
      name: create_release
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private-key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY }}
          passphrase: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY_PASSWORD }}
          git_committer_name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git_committer_email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          git_config_global: true
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Update floating major version tag
        uses: LerianStudio/github-actions-shared-workflows/src/config/update-major-tag@v1

  # ----------------- Enforce GitHub Latest -----------------
  enforce_latest:
    name: Enforce Latest Release
    needs: [publish_release, publish_release_status]
    if: always() && needs.publish_release_status.outputs.release_published == 'true'
    runs-on: ${{ inputs.runner_type }}
    permissions:
      contents: write
    steps:
      - name: Re-assert highest stable semver as Latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          highest=$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-pre-releases --exclude-drafts \
            --json tagName --jq '.[].tagName' | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          if [ -n "$highest" ]; then
            echo "::notice::Re-asserting GitHub Latest to highest stable semver: $highest"
            gh release edit "$highest" --repo "$GITHUB_REPOSITORY" --latest
          else
            echo "ℹ️ No stable vX.Y.Z release found — leaving Latest untouched"
          fi

  # Slack notification
  notify:
    name: Notify
    needs: [prepare, publish_release, publish_release_status, generate_changelog, update_major_tag, enforce_latest]
    if: always() && needs.prepare.outputs.has_changes == 'true'
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: >-
        ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
            && 'failure' || 'success' }}
      workflow_name: "Release"
      failed_jobs: >-
        ${{ format('{0}{1}{2}{3}',
          (needs.publish_release.result == 'failure' && 'Publish Release' || ''),
          (needs.generate_changelog.result == 'failure' && ' / Generate Changelog' || ''),
          (needs.update_major_tag.result == 'failure' && ' / Update Major Tag' || ''),
          (needs.enforce_latest.result == 'failure' && ' / Enforce Latest' || '')
        ) }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
