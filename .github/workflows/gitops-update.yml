name: "GitOps Update"

# Reusable workflow for updating GitOps repository with new image tags
# Supports multiple servers (Firmino, Clotilde) and environments: dev (beta), stg (rc), prd (production), sandbox
# Handles single or multiple components with flexible YAML key mapping

on:
  workflow_call:
    inputs:
      gitops_repository:
        description: 'GitOps repository to update (org/repo format)'
        type: string
        default: 'LerianStudio/midaz-firmino-gitops'
      app_name:
        description: 'Application name (defaults to repository name if not provided)'
        type: string
        required: false
      deploy_in_firmino:
        description: 'Force-off override for Firmino. Set to false to suppress deployment even if the manifest includes this app on Firmino.'
        type: boolean
        default: true
      deploy_in_clotilde:
        description: 'Force-off override for Clotilde. Set to false to suppress deployment even if the manifest includes this app on Clotilde.'
        type: boolean
        default: true
      deploy_in_anacleto:
        description: 'Force-off override for Anacleto. Set to false to suppress deployment even if the manifest includes this app on Anacleto.'
        type: boolean
        default: true
      deployment_matrix_file:
        description: 'Path (within the shared-workflows checkout) to the deployment matrix manifest. Override only if you maintain a fork/alternative manifest.'
        type: string
        default: 'config/deployment-matrix.yml'
      deployment_matrix_ref:
        description: 'Git ref of LerianStudio/github-actions-shared-workflows to read the deployment matrix from. Defaults to main (always latest). Override only when testing a branch.'
        type: string
        default: 'main'
      artifact_pattern:
        description: 'Pattern to download artifacts (defaults to "gitops-tags-<repo-name>*" if not provided, matching both single-app and monorepo artifact names)'
        type: string
        required: false
      yaml_key_mappings:
        description: 'JSON object mapping artifact names to YAML keys (e.g., {"backend.tag": ".auth.image.tag", "frontend.tag": ".frontend.image.tag"}). Required for gitops_layout=helmfile, ignored for gitops_layout=kustomize.'
        type: string
        required: false
        default: ''
      commit_message_prefix:
        description: 'Prefix for commit message (defaults to repository name if not provided)'
        type: string
        required: false
      runner_type:
        description: 'GitHub runner type to use'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      enable_argocd_sync:
        description: 'Enable ArgoCD sync after GitOps update'
        type: boolean
        default: true
      argocd_prune:
        description: 'Pass --prune to argocd app sync so orphaned resources are cleaned up automatically. Opt-in; safer left disabled in production.'
        type: boolean
        default: false
      use_dynamic_mapping:
        description: 'Use dynamic mapping for multiple components (like midaz)'
        type: boolean
        default: false
      yq_version:
        description: 'Version of yq to install'
        type: string
        default: 'v4.44.3'
      enable_docker_login:
        description: 'Enable Docker Hub login to avoid rate limits. Disabled by default since GitOps updates do not require Docker registry access.'
        type: boolean
        default: false
      configmap_updates:
        description: 'JSON object mapping artifact names to configmap keys (e.g., {"pix.tag": ".pix.configmap.VERSION"}). Helmfile layout only; ignored when gitops_layout=kustomize.'
        type: string
        required: false
      gitops_layout:
        description: 'GitOps layout strategy: "helmfile" (default, current behavior) or "kustomize".'
        type: string
        default: 'helmfile'
      kustomize_base_path:
        description: 'Required when gitops_layout=kustomize. Path within the gitops repo to the kustomization folder (e.g. environments/anacleto/kustomize/ungoliant-controller). Supports ${SERVER} and ${ENV} placeholders.'
        type: string
        default: ''
      kustomize_image_name:
        description: 'Required when gitops_layout=kustomize. Image reference matched by `kustomize edit set image` (e.g. ghcr.io/lerianstudio/ungoliant-controller).'
        type: string
        default: ''
      kustomize_environments:
        description: 'Optional space-separated env list overriding the default tag-based env loop when gitops_layout=kustomize. Leave empty for layouts without env split.'
        type: string
        default: ''
      kustomize_version:
        description: 'Version of kustomize CLI to install (used only when gitops_layout=kustomize).'
        type: string
        default: 'v5.4.3'
      argocd_app_name_template:
        description: 'Template for the ArgoCD application name. Supports placeholders {server}, {app}, {env}. Default {server}-{app}-{env} preserves current behavior. For kustomize layouts without env split, use e.g. {server}-{app}.'
        type: string
        default: '{server}-{app}-{env}'

jobs:
  update_gitops:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      app_name: ${{ steps.setup.outputs.app_name }}
      sync_matrix: ${{ steps.apply_tags.outputs.sync_matrix }}
      has_sync_targets: ${{ steps.apply_tags.outputs.has_sync_targets }}
    env:
      IS_RC: ${{ contains(github.ref, '-rc.') }}
      IS_BETA: ${{ contains(github.ref, '-beta.') }}
      IS_SANDBOX: ${{ contains(github.ref, '-sandbox.') }}
      IS_PRODUCTION: ${{ !contains(github.ref, '-rc.') && !contains(github.ref, '-beta.') && !contains(github.ref, '-sandbox.') && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Log in to Docker Hub
        if: ${{ inputs.enable_docker_login }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_IMAGE_PULL_TOKEN }}

      # Trust model: this is a `workflow_call` reusable workflow, NOT triggered by
      # untrusted PRs. `inputs.gitops_repository` is supplied by trusted caller
      # workflows (default: LerianStudio/midaz-firmino-gitops) and the MANAGE_TOKEN
      # is required for the subsequent commit/push step. The allowlist step below
      # enforces that the repository is a LerianStudio-owned `*-gitops` repo so a
      # compromised caller cannot redirect the privileged checkout to an arbitrary
      # target (CodeQL: `actions/untrusted-checkout`).
      - name: Validate gitops_repository against allowlist
        shell: bash
        env:
          GITOPS_REPOSITORY: ${{ inputs.gitops_repository }}
        run: |
          set -euo pipefail
          if [[ ! "$GITOPS_REPOSITORY" =~ ^LerianStudio/[A-Za-z0-9._-]+-gitops$ ]]; then
            echo "::error::gitops_repository '$GITOPS_REPOSITORY' is not allowed. Must match ^LerianStudio/<name>-gitops$ (e.g. LerianStudio/midaz-firmino-gitops)."
            exit 1
          fi
          echo "gitops_repository validated: $GITOPS_REPOSITORY"

      - name: Checkout GitOps Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ inputs.gitops_repository }}
          token: ${{ secrets.MANAGE_TOKEN }}
          path: gitops
          fetch-depth: 0

      - name: Checkout deployment matrix manifest
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: LerianStudio/github-actions-shared-workflows
          ref: ${{ inputs.deployment_matrix_ref }}
          path: shared-workflows
          sparse-checkout: |
            ${{ inputs.deployment_matrix_file }}
          sparse-checkout-cone-mode: false
          # Read-only sparse checkout of a single manifest file — no credentials
          # needed, and we never execute code from this checkout.
          persist-credentials: false

      - name: Setup application name and paths
        id: setup
        shell: bash
        run: |
          # Extract app name from repository if not provided
          if [[ -z "${{ inputs.app_name }}" ]]; then
            APP_NAME="${GITHUB_REPOSITORY##*/}"
          else
            APP_NAME="${{ inputs.app_name }}"
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "Application name: $APP_NAME"

          # Generate commit message prefix if not provided
          if [[ -z "${{ inputs.commit_message_prefix }}" ]]; then
            COMMIT_PREFIX="$APP_NAME"
          else
            COMMIT_PREFIX="${{ inputs.commit_message_prefix }}"
          fi
          echo "commit_prefix=$COMMIT_PREFIX" >> "$GITHUB_OUTPUT"
          echo "Commit message prefix: $COMMIT_PREFIX"

          # Generate artifact pattern if not provided
          if [[ -z "${{ inputs.artifact_pattern }}" ]]; then
            ARTIFACT_PATTERN="gitops-tags-${APP_NAME}*"
          else
            ARTIFACT_PATTERN="${{ inputs.artifact_pattern }}"
          fi
          echo "artifact_pattern=$ARTIFACT_PATTERN" >> "$GITHUB_OUTPUT"
          echo "Artifact pattern: $ARTIFACT_PATTERN"

      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          YQ_VERSION="${{ inputs.yq_version }}"
          YQ_BIN="yq_linux_amd64"
          YQ_URL="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BIN}"

          sudo curl -L "$YQ_URL" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install kustomize
        if: ${{ inputs.gitops_layout == 'kustomize' }}
        shell: bash
        env:
          KUSTOMIZE_VERSION: ${{ inputs.kustomize_version }}
        run: |
          set -euo pipefail
          # The kustomize release tag is "kustomize/vX.Y.Z" — the "/" must be
          # URL-encoded as %2F, and the asset filename keeps the "v" prefix.
          # Stripping "v" or leaving the slash unencoded produces a 404 page,
          # which then fails extraction with "gzip: stdin: not in gzip format".
          VERSION="${KUSTOMIZE_VERSION#v}"
          VERSION="v${VERSION}"
          URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${VERSION}/kustomize_${VERSION}_linux_amd64.tar.gz"
          curl -fsSL "$URL" -o /tmp/kustomize.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo install -m 755 /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Validate kustomize inputs
        if: ${{ inputs.gitops_layout == 'kustomize' }}
        shell: bash
        env:
          KUSTOMIZE_BASE_PATH: ${{ inputs.kustomize_base_path }}
          KUSTOMIZE_IMAGE_NAME: ${{ inputs.kustomize_image_name }}
        run: |
          set -euo pipefail
          if [[ -z "$KUSTOMIZE_BASE_PATH" ]]; then
            echo "::error::gitops_layout=kustomize requires kustomize_base_path."
            exit 1
          fi
          if [[ -z "$KUSTOMIZE_IMAGE_NAME" ]]; then
            echo "::error::gitops_layout=kustomize requires kustomize_image_name."
            exit 1
          fi

      - name: Validate helmfile inputs
        if: ${{ inputs.gitops_layout == 'helmfile' }}
        shell: bash
        env:
          MAPPINGS: ${{ inputs.yaml_key_mappings }}
        run: |
          set -euo pipefail
          if [[ -z "$MAPPINGS" ]]; then
            echo "::error::gitops_layout=helmfile requires yaml_key_mappings."
            exit 1
          fi

      - name: Resolve target clusters from deployment matrix
        id: resolve_clusters
        shell: bash
        env:
          APP_NAME: ${{ steps.setup.outputs.app_name }}
          MANIFEST: shared-workflows/${{ inputs.deployment_matrix_file }}
          DEPLOY_FIRMINO: ${{ inputs.deploy_in_firmino }}
          DEPLOY_CLOTILDE: ${{ inputs.deploy_in_clotilde }}
          DEPLOY_ANACLETO: ${{ inputs.deploy_in_anacleto }}
        run: |
          set -euo pipefail

          if [[ ! -f "$MANIFEST" ]]; then
            echo "::error::Deployment matrix manifest not found: $MANIFEST"
            exit 1
          fi

          echo "Reading deployment matrix: $MANIFEST"
          echo "App name: $APP_NAME"

          # Resolve clusters whose `apps:` list contains $APP_NAME.
          # Convert manifest to JSON via yq, then query with jq (more portable than yq's
          # native env() — and jq is preinstalled on the runner anyway).
          #
          # NOTE: We use `index($app)` instead of `contains([$app])` because jq's
          # contains() does substring matching on strings — "plugin-br-bank-transfer"
          # would falsely match "plugin-br-bank-transfer-jd". `index()` is exact equality.
          # Output one cluster per line, sorted for determinism.
          # Do not swallow yq/jq errors with `|| true` — a corrupt manifest or
          # broken query should fail fast, not be confused with "app not registered".
          # Pipefail ensures intermediate failures surface; an empty RESOLVED from
          # a *successful* query is the legitimate "no matching clusters" case and
          # is handled below.
          RESOLVED=$(yq -o=json '.' "$MANIFEST" \
            | jq -r --arg app "$APP_NAME" \
              '.clusters | to_entries[] | select(.value.apps // [] | index($app)) | .key' \
            | sort -u)

          if [[ -z "$RESOLVED" ]]; then
            echo "::warning::App '$APP_NAME' is not registered in any cluster of the deployment matrix."
            echo "If this is a new app, add it to $MANIFEST in shared-workflows."
            echo "clusters=" >> "$GITHUB_OUTPUT"
            echo "has_clusters=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Manifest resolution for '$APP_NAME':"
          while IFS= read -r line; do
            echo "  - $line"
          done <<< "$RESOLVED"

          # Apply force-off overrides from inputs.
          # An input set to "false" removes that cluster from the resolved set,
          # even if the manifest includes the app on it.
          FILTERED=""
          while IFS= read -r cluster; do
            [[ -z "$cluster" ]] && continue
            case "$cluster" in
              firmino)
                if [[ "$DEPLOY_FIRMINO" == "false" ]]; then
                  echo "  ✗ firmino — suppressed by deploy_in_firmino=false"
                  continue
                fi
                ;;
              clotilde)
                if [[ "$DEPLOY_CLOTILDE" == "false" ]]; then
                  echo "  ✗ clotilde — suppressed by deploy_in_clotilde=false"
                  continue
                fi
                ;;
              anacleto)
                if [[ "$DEPLOY_ANACLETO" == "false" ]]; then
                  echo "  ✗ anacleto — suppressed by deploy_in_anacleto=false"
                  continue
                fi
                ;;
            esac
            FILTERED="${FILTERED:+$FILTERED }$cluster"
          done <<< "$RESOLVED"

          if [[ -z "$FILTERED" ]]; then
            echo "::warning::All clusters resolved from the manifest were suppressed by force-off inputs."
            echo "clusters=" >> "$GITHUB_OUTPUT"
            echo "has_clusters=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo ""
          echo "Final cluster set: $FILTERED"
          echo "clusters=$FILTERED" >> "$GITHUB_OUTPUT"
          echo "has_clusters=true" >> "$GITHUB_OUTPUT"

          # Emit a JSON map of per-cluster env_suffixes / suffix_excludes_envs for
          # downstream steps. Defaults preserve the pre-multi-variant behavior:
          # - env_suffixes defaults to [""] (one expansion, empty suffix)
          # - suffix_excludes_envs defaults to []
          # Clusters that did not declare these fields therefore produce the exact
          # same env list as before (e.g. dev/stg/prd/sandbox for a prod tag).
          # Build a JSON array of resolved cluster names for jq. Splitting on the
          # known single-space delimiter (FILTERED is built with " " separators
          # above), then feeding each element to jq -R explicitly avoids the need
          # to rely on word-splitting via `$FILTERED` (shellcheck SC2086).
          CLUSTERS_JSON=$(printf '%s' "$FILTERED" | tr ' ' '\n' | jq -R . | jq -s .)
          ENV_CONFIG=$(yq -o=json '.' "$MANIFEST" \
            | jq -c --argjson clusters "$CLUSTERS_JSON" '
                .clusters
                | with_entries(select(.key as $k | $clusters | index($k)))
                | with_entries(.value = {
                    env_suffixes: (.value.env_suffixes // [""]),
                    suffix_excludes_envs: (.value.suffix_excludes_envs // []),
                    env_contexts: (.value.env_contexts // [])
                  })
              ')
          echo "env_config=$ENV_CONFIG" >> "$GITHUB_OUTPUT"
          echo "Per-cluster env config: $ENV_CONFIG"

      - name: Git pull before update
        shell: bash
        run: |
          set -e
          cd gitops || exit 1
          git pull origin main

      - name: Cleanup old artifacts (self-hosted runner safety)
        shell: bash
        run: |
          # Remove any existing artifacts from previous runs (important for self-hosted runners)
          echo "Cleaning up old artifacts directory..."
          rm -rf .gitops-tags
          echo "Cleanup complete"

      - name: Download GitOps tag artifacts (pattern-based)
        id: download-pattern
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ steps.setup.outputs.artifact_pattern }}
          path: .gitops-tags
          merge-multiple: true
          # Only download from this workflow run (default behavior, but explicit for safety)
          run-id: ${{ github.run_id }}
        continue-on-error: true

      - name: Fallback to legacy artifact name
        if: steps.download-pattern.outcome == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gitops-tags
          path: .gitops-tags
          run-id: ${{ github.run_id }}

      - name: Validate artifacts exist
        id: validate_artifacts
        shell: bash
        run: |
          echo "Checking for downloaded artifacts..."

          # Check if directory exists and has files
          if [[ ! -d ".gitops-tags" ]]; then
            echo "::error::No artifacts directory found. Build job may have been skipped or failed to produce artifacts."
            echo "artifacts_valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Count actual artifact files (not directories)
          ARTIFACT_COUNT=$(find .gitops-tags -type f -name "*.tag" 2>/dev/null | wc -l || echo "0")

          if [[ "$ARTIFACT_COUNT" -eq 0 ]]; then
            echo "::error::No artifact files found in .gitops-tags/. Build job may have been skipped or failed."
            echo "Directory contents:"
            ls -laR .gitops-tags/ 2>/dev/null || echo "Directory is empty or doesn't exist"
            echo "artifacts_valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Found $ARTIFACT_COUNT artifact file(s):"
          ls -la .gitops-tags/
          echo "artifacts_valid=true" >> "$GITHUB_OUTPUT"

      - name: Apply tags to values.yaml (multi-server)
        id: apply_tags
        shell: bash
        env:
          # Pass through env to avoid `${{ ... }}` interpolation directly into the
          # script body (CodeQL: actions/code-injection). IS_* are inherited from job env.
          APP_NAME: ${{ steps.setup.outputs.app_name }}
          HAS_CLUSTERS: ${{ steps.resolve_clusters.outputs.has_clusters }}
          RESOLVED_SERVERS: ${{ steps.resolve_clusters.outputs.clusters }}
          ENV_CONFIG: ${{ steps.resolve_clusters.outputs.env_config }}
          MAPPINGS: ${{ inputs.yaml_key_mappings }}
          CONFIGMAP_MAPPINGS: ${{ inputs.configmap_updates }}
          GITOPS_LAYOUT: ${{ inputs.gitops_layout }}
          KUSTOMIZE_BASE_PATH: ${{ inputs.kustomize_base_path }}
          KUSTOMIZE_IMAGE_NAME: ${{ inputs.kustomize_image_name }}
          KUSTOMIZE_ENVIRONMENTS: ${{ inputs.kustomize_environments }}
          MANIFEST_FILE: shared-workflows/${{ inputs.deployment_matrix_file }}
        run: |
          set -euo pipefail

          # Determine environments to update based on tag type (IS_* from job env)
          if [[ "$IS_BETA" == "true" ]]; then
            ENVIRONMENTS="dev"
            ENV_LABEL="beta/dev"
          elif [[ "$IS_RC" == "true" ]]; then
            ENVIRONMENTS="stg"
            ENV_LABEL="rc/stg"
          elif [[ "$IS_PRODUCTION" == "true" ]]; then
            ENVIRONMENTS="dev stg prd sandbox"
            ENV_LABEL="production"
          elif [[ "$IS_SANDBOX" == "true" ]]; then
            ENVIRONMENTS="sandbox"
            ENV_LABEL="sandbox"
          else
            echo "Unable to detect environment from tag: ${GITHUB_REF}"
            exit 1
          fi
          echo "env_label=$ENV_LABEL" >> "$GITHUB_OUTPUT"
          echo "Detected tag type: $ENV_LABEL"
          echo "Default environments (helmfile/tag-based): $ENVIRONMENTS"

          # Kustomize layout overrides the env loop based on user input or path placeholders.
          if [[ "$GITOPS_LAYOUT" == "kustomize" ]]; then
            if [[ -n "$KUSTOMIZE_ENVIRONMENTS" ]]; then
              ENVIRONMENTS="$KUSTOMIZE_ENVIRONMENTS"
              echo "Kustomize: env loop overridden via kustomize_environments: $ENVIRONMENTS"
            else
              # Detect literal "${ENV}" placeholder in the path. Build the needle
              # by concatenating to avoid SC2016 (single-quoted "${ENV}" looks like
              # an unexpanded expression to shellcheck).
              ENV_NEEDLE='$''{ENV}'
              if [[ "$KUSTOMIZE_BASE_PATH" != *"$ENV_NEEDLE"* ]]; then
                ENVIRONMENTS="-"
                echo "Kustomize: no \${ENV} placeholder in path, running once per server (sentinel env '-')"
              else
                echo "Kustomize: \${ENV} placeholder present, using tag-based env list"
              fi
            fi
          fi

          # Servers come from the deployment matrix manifest, filtered by force-off inputs.
          # See step `resolve_clusters` for resolution logic.
          if [[ "$HAS_CLUSTERS" != "true" ]]; then
            echo "No clusters selected for deployment (manifest empty for this app, or all clusters suppressed)."
            echo "sync_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_sync_targets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SERVERS="$RESOLVED_SERVERS"
          echo "Servers to deploy to: $SERVERS"

          # First, check which artifacts actually exist
          echo ""
          echo "Checking available artifacts..."
          AVAILABLE_ARTIFACTS=""
          for artifact_file in .gitops-tags/*; do
            if [[ -f "$artifact_file" ]]; then
              artifact_name=$(basename "$artifact_file")
              echo "  Found artifact: $artifact_name"
              AVAILABLE_ARTIFACTS="${AVAILABLE_ARTIFACTS}${artifact_name} "
            fi
          done

          if [[ -z "$AVAILABLE_ARTIFACTS" ]]; then
            echo "No artifacts found in .gitops-tags/"
            echo "sync_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_sync_targets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Track results
          UPDATED_FILES=""
          MISSING_FILES=""
          UPDATED_SERVERS_ENVS=""

          # Function to update a single YAML key using sed (preserves formatting)
          update_yaml_tag() {
            local file="$1"
            local yaml_path="$2"
            local new_tag="$3"

            # Extract the key name from yaml path (e.g., ".image.tag" -> "tag")
            local key_name="${yaml_path##*.}"

            # Use sed to replace only the tag value, preserving all formatting
            # This handles patterns like "tag: v1.0.0" or "tag: 'v1.0.0'" or 'tag: "v1.0.0"'
            if grep -q "^[[:space:]]*${key_name}:" "$file"; then
              # Replace the value after the key, preserving indentation and quotes
              sed -i -E "s/^([[:space:]]*${key_name}:[[:space:]]*)(['\"]?)([^'\"[:space:]]+)(['\"]?)$/\1\2${new_tag}\4/" "$file"
              return 0
            fi
            return 1
          }

          # Compute the effective env list for a given server by expanding
          # tag-derived envs against the cluster's env_suffixes and env_contexts,
          # except for envs listed in suffix_excludes_envs which stay bare.
          # When env_contexts is set, each expansion is prefixed: {context}/{env-variant}.
          # Falls back to a single empty-suffix expansion when env_config is empty
          # (e.g. kustomize layout with sentinel env "-", or clusters without the new fields).
          expand_envs_for_server() {
            local server="$1"
            local base_envs="$2"
            # Kustomize sentinel env "-" or empty config → return base_envs unchanged.
            if [[ -z "$ENV_CONFIG" || "$base_envs" == "-" ]]; then
              echo "$base_envs"
              return
            fi
            local suffixes excludes contexts
            suffixes=$(echo "$ENV_CONFIG" | jq -r --arg s "$server" '.[$s].env_suffixes // [""] | .[]' 2>/dev/null || echo "")
            excludes=$(echo "$ENV_CONFIG" | jq -r --arg s "$server" '.[$s].suffix_excludes_envs // [] | .[]' 2>/dev/null || echo "")
            contexts=$(echo "$ENV_CONFIG" | jq -r --arg s "$server" '.[$s].env_contexts // [] | .[]' 2>/dev/null || echo "")
            if [[ -z "$suffixes" ]]; then
              echo "$base_envs"
              return
            fi
            local out=""
            for base_env in $base_envs; do
              # Expand base_env × suffixes (or keep bare if excluded).
              local expanded=""
              if echo "$excludes" | grep -qx "$base_env" 2>/dev/null; then
                expanded="$base_env"
              else
                while IFS= read -r suffix; do
                  expanded="${expanded:+$expanded }${base_env}${suffix}"
                done <<< "$suffixes"
              fi
              # Apply contexts: prefix each expanded variant with "{context}/".
              # When no contexts are declared, emit variants as-is.
              if [[ -n "$contexts" ]]; then
                while IFS= read -r ctx; do
                  for variant in $expanded; do
                    out="${out:+$out }${ctx}/${variant}"
                  done
                done <<< "$contexts"
              else
                out="${out:+$out }$expanded"
              fi
            done
            echo "$out"
          }

          # Process each server and environment
          for SERVER in $SERVERS; do
            SERVER_ENVS=$(expand_envs_for_server "$SERVER" "$ENVIRONMENTS")
            if [[ "$SERVER_ENVS" != "$ENVIRONMENTS" ]]; then
              echo ""
              echo "Server $SERVER env expansion: '$ENVIRONMENTS' -> '$SERVER_ENVS'"
            fi
            for ENV in $SERVER_ENVS; do

              if [[ "$GITOPS_LAYOUT" == "kustomize" ]]; then
                # Resolve kustomize target dir (substitute ${SERVER} / ${ENV} placeholders).
                TARGET_DIR="$KUSTOMIZE_BASE_PATH"
                TARGET_DIR="${TARGET_DIR//\$\{SERVER\}/$SERVER}"
                TARGET_DIR="${TARGET_DIR//\$\{ENV\}/$ENV}"
                KUSTOMIZATION_FILE="gitops/${TARGET_DIR}/kustomization.yaml"

                echo ""
                echo "Processing: $SERVER/$ENV (kustomize)"
                echo "  Path: $KUSTOMIZATION_FILE"

                if [[ ! -f "$KUSTOMIZATION_FILE" ]]; then
                  echo "  WARNING: kustomization.yaml not found: $KUSTOMIZATION_FILE"
                  MISSING_FILES="${MISSING_FILES}${SERVER}/${ENV}:${KUSTOMIZATION_FILE}\n"
                  continue
                fi

                FILE_CHANGED=false
                FILE_BEFORE_HASH=$(sha256sum "$KUSTOMIZATION_FILE" | cut -d' ' -f1)

                # Apply each available artifact tag via `kustomize edit set image`.
                # The artifact value (TAG) is the only thing that varies; we set the
                # same image_name for every artifact since kustomize layouts typically
                # have a single image per kustomization.yaml. If an app has multiple
                # images, callers can extend kustomize_image_name later (out of scope here).
                for artifact_file in .gitops-tags/*; do
                  [[ -f "$artifact_file" ]] || continue
                  TAG="$(cut -d= -f2 < "$artifact_file" | tr -d '[:space:]')"
                  [[ -n "$TAG" ]] || continue
                  echo "    kustomize edit set image ${KUSTOMIZE_IMAGE_NAME}=${KUSTOMIZE_IMAGE_NAME}:${TAG}"
                  ( cd "gitops/${TARGET_DIR}" && kustomize edit set image "${KUSTOMIZE_IMAGE_NAME}=${KUSTOMIZE_IMAGE_NAME}:${TAG}" )
                done

                FILE_AFTER_HASH=$(sha256sum "$KUSTOMIZATION_FILE" | cut -d' ' -f1)
                if [[ "$FILE_BEFORE_HASH" != "$FILE_AFTER_HASH" ]]; then
                  FILE_CHANGED=true
                  UPDATED_FILES="${UPDATED_FILES}${KUSTOMIZATION_FILE}\n"
                  UPDATED_SERVERS_ENVS="${UPDATED_SERVERS_ENVS}${SERVER}:${ENV}\n"
                  echo "  Updated kustomization.yaml"
                else
                  echo "  No changes needed for this kustomization.yaml"
                fi

                if [[ -n "$CONFIGMAP_MAPPINGS" ]]; then
                  echo "::warning::configmap_updates is ignored when gitops_layout=kustomize (out of scope for v1)."
                fi

                continue
              fi

              # Check for a per-app helmfile_env override in the deployment matrix.
              # Some apps (e.g. rosiehr, cs-platform, forge, lerian-map on Benedita) have
              # their values.yaml under cross/ instead of the tag-derived env (dev/stg/prd).
              # The override is declared as clusters.<server>.app_helmfile_env.<app>: <env>.
              HELMFILE_ENV="$ENV"
              if [[ -f "$MANIFEST_FILE" ]]; then
                HELMFILE_ENV_OVERRIDE=$(yq -o=json '.' "$MANIFEST_FILE" \
                  | jq -r --arg server "$SERVER" --arg app "$APP_NAME" \
                    '.clusters[$server].app_helmfile_env[$app] // empty' 2>/dev/null || echo "")
                if [[ -n "$HELMFILE_ENV_OVERRIDE" ]]; then
                  HELMFILE_ENV="$HELMFILE_ENV_OVERRIDE"
                fi
              fi

              VALUES_FILE="gitops/environments/${SERVER}/helmfile/applications/${HELMFILE_ENV}/${APP_NAME}/values.yaml"

              echo ""
              echo "Processing: $SERVER/$ENV"
              if [[ "$HELMFILE_ENV" != "$ENV" ]]; then
                echo "  helmfile_env override: $HELMFILE_ENV (tag-derived: $ENV)"
              fi
              echo "  Path: $VALUES_FILE"

              # Check if file exists
              if [[ ! -f "$VALUES_FILE" ]]; then
                echo "  WARNING: Values file not found for ${SERVER}/${ENV}: ${VALUES_FILE}"
                MISSING_FILES="${MISSING_FILES}${SERVER}/${ENV}:${VALUES_FILE}\n"
                continue
              fi

              # Track if any changes were made to this file
              FILE_CHANGED=false

              # Apply mappings from inputs - only if artifact exists
              # MAPPINGS is set in step env: (avoids code-injection from inputs)
              while IFS='|' read -r artifact_key yaml_key; do
                ARTIFACT_FILE=".gitops-tags/${artifact_key}"
                if [[ -f "$ARTIFACT_FILE" ]]; then
                  TAG="$(cut -d= -f2 < "$ARTIFACT_FILE" | tr -d '[:space:]')"
                  if [[ -n "$TAG" ]]; then
                    # Get current value to check if update is needed
                    CURRENT_TAG=$(yq e "$yaml_key" "$VALUES_FILE" 2>/dev/null || echo "")
                    if [[ "$CURRENT_TAG" != "$TAG" ]]; then
                      # Use yq with explicit output to preserve formatting
                      TAG="$TAG" yq e "$yaml_key = strenv(TAG)" "$VALUES_FILE" > "${VALUES_FILE}.tmp"
                      mv "${VALUES_FILE}.tmp" "$VALUES_FILE"
                      echo "    Updated $yaml_key: $CURRENT_TAG -> $TAG"
                      FILE_CHANGED=true
                    else
                      echo "    Skipped $yaml_key: already set to $TAG"
                    fi
                  fi
                fi
              done < <(echo "$MAPPINGS" | jq -r 'to_entries[] | "\(.key)|\(.value)"')

              # Apply configmap updates if configured - only if artifact exists
              # CONFIGMAP_MAPPINGS is set in step env: (avoids code-injection from inputs)
              if [[ -n "$CONFIGMAP_MAPPINGS" ]]; then
                while IFS='|' read -r artifact_key configmap_key; do
                  ARTIFACT_FILE=".gitops-tags/${artifact_key}"
                  if [[ -f "$ARTIFACT_FILE" ]]; then
                    TAG="$(cut -d= -f2 < "$ARTIFACT_FILE" | tr -d '[:space:]')"
                    if [[ -n "$TAG" ]]; then
                      CURRENT_TAG=$(yq e "$configmap_key" "$VALUES_FILE" 2>/dev/null || echo "")
                      if [[ "$CURRENT_TAG" != "$TAG" ]]; then
                        TAG="$TAG" yq e "$configmap_key = strenv(TAG)" "$VALUES_FILE" > "${VALUES_FILE}.tmp"
                        mv "${VALUES_FILE}.tmp" "$VALUES_FILE"
                        echo "    Updated $configmap_key: $CURRENT_TAG -> $TAG"
                        FILE_CHANGED=true
                      else
                        echo "    Skipped $configmap_key: already set to $TAG"
                      fi
                    fi
                  fi
                done < <(echo "$CONFIGMAP_MAPPINGS" | jq -r 'to_entries[] | "\(.key)|\(.value)"')
              fi

              # Only track as updated if changes were actually made.
              # When app_helmfile_env overrides the env (e.g. forge: cross), the
              # sync target's env must use the override (HELMFILE_ENV), not the
              # tag-derived env, so the ArgoCD app name resolves correctly
              # (e.g. benedita-forge-cross, not benedita-forge-dev-st).
              if [[ "$FILE_CHANGED" == "true" ]]; then
                UPDATED_FILES="${UPDATED_FILES}${VALUES_FILE}\n"
                UPDATED_SERVERS_ENVS="${UPDATED_SERVERS_ENVS}${SERVER}:${HELMFILE_ENV}\n"
              else
                echo "  No changes needed for this file"
              fi
            done
          done

          # Report results
          echo ""
          echo "========================================="
          echo "Summary:"
          echo "========================================="
          if [[ -n "$UPDATED_FILES" ]]; then
            echo "Updated files:"
            echo -e "$UPDATED_FILES"
          else
            echo "No files were updated"
          fi

          if [[ -n "$MISSING_FILES" ]]; then
            echo ""
            echo "Missing files (skipped):"
            echo -e "$MISSING_FILES"
          fi

          # Save updated servers/envs for ArgoCD sync - only include files that actually changed.
          # Deduplicate (server:env) pairs: cross apps are visited once per outer env
          # iteration (e.g. 7 times on benedita for a prod tag) but always write to
          # the same override path, so a single sync target is correct.
          if [[ -n "$UPDATED_SERVERS_ENVS" ]]; then
            echo -e "$UPDATED_SERVERS_ENVS" | grep -v '^$' | sort -u > /tmp/updated_servers_envs.txt

            # Output sync targets as JSON array for matrix job
            SYNC_MATRIX=$(while IFS=: read -r s e; do
              [[ -n "$s" && -n "$e" ]] && echo "{\"server\":\"$s\",\"env\":\"$e\"}"
            done < /tmp/updated_servers_envs.txt | jq -s -c '.')
            echo "sync_matrix=$SYNC_MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_sync_targets=true" >> "$GITHUB_OUTPUT"
            echo "Sync matrix: $SYNC_MATRIX"
          else
            echo "sync_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_sync_targets=false" >> "$GITHUB_OUTPUT"
          fi

          COUNT=0
          if [[ -n "$UPDATED_FILES" ]]; then
            COUNT=$(echo -e "$UPDATED_FILES" | grep -c -v '^$' || true)
          fi
          echo "updated_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Show git diff
        shell: bash
        run: |
          cd gitops || exit 1
          echo "Changes to be committed:"
          git diff --stat
          echo ""
          echo "Detailed changes:"
          git diff

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY }}
          passphrase: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY_PASSWORD }}
          git_committer_name: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          git_committer_email: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          workdir: gitops

      - name: Commit & push (GitOps)
        run: |
          set -e
          cd gitops || exit 1

          # Get env label from apply_tags step
          ENV_LABEL="${{ steps.apply_tags.outputs.env_label }}"

          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -am "ci(${{ steps.setup.outputs.commit_prefix }}): update image tags ($ENV_LABEL)" || echo "No changes to commit"

          # Retry push with rebase and exponential backoff to handle concurrent updates
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi

            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "ERROR: Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi

            BACKOFF=$((2 ** i))
            echo "Push failed (attempt $i/$MAX_RETRIES), rebasing and retrying in ${BACKOFF}s..."
            sleep "$BACKOFF"
            git pull --rebase origin main
          done

  # ArgoCD Sync Job - runs in parallel for each server/env combination
  argocd_sync:
    name: ArgoCD Sync (${{ matrix.target.server }}/${{ matrix.target.env }})
    needs: [update_gitops]
    if: needs.update_gitops.outputs.has_sync_targets == 'true' && inputs.enable_argocd_sync
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.update_gitops.outputs.sync_matrix) }}
    steps:
      - name: Install ArgoCD CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/download/v3.0.6/argocd-linux-amd64
          sudo install -m 755 /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: Resolve ArgoCD application name
        id: resolve_argocd_app
        shell: bash
        env:
          TEMPLATE: ${{ inputs.argocd_app_name_template }}
          SERVER: ${{ matrix.target.server }}
          APP: ${{ needs.update_gitops.outputs.app_name }}
          ENV_NAME: ${{ matrix.target.env }}
        run: |
          set -euo pipefail
          NAME="$TEMPLATE"
          NAME="${NAME//\{server\}/$SERVER}"
          NAME="${NAME//\{app\}/$APP}"
          NAME="${NAME//\{env\}/$ENV_NAME}"
          # Normalize context-prefixed envs: "chaos/dev-st" → "chaos-dev-st".
          NAME="${NAME//\//-}"
          # Collapse "--" sequences (sentinel env "-" produces "--" inside template).
          while [[ "$NAME" == *--* ]]; do NAME="${NAME//--/-}"; done
          # Strip trailing "-" left over when sentinel env "-" lands at the end.
          NAME="${NAME%-}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved ArgoCD app name: $NAME"

      - name: Sync ArgoCD application
        shell: bash
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_GHUSER_TOKEN }}
          APP_NAME: ${{ steps.resolve_argocd_app.outputs.name }}
          ARGOCD_PRUNE: ${{ inputs.argocd_prune }}
        run: |
          set -uo pipefail

          PRUNE_FLAG=""
          if [[ "$ARGOCD_PRUNE" == "true" ]]; then
            PRUNE_FLAG="--prune"
          fi

          echo "::group::argocd app get $APP_NAME"
          if ! argocd app get "$APP_NAME" --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN" --grpc-web; then
            rc=$?
            echo "::endgroup::"
            echo "::warning::Failed to get ArgoCD app '$APP_NAME' (exit $rc). Skipping sync — check whether the app exists, auth is valid, and the user has 'applications, get' permission."
            exit 0
          fi
          echo "::endgroup::"

          echo "::group::argocd app sync $APP_NAME"
          for attempt in 1 2 3 4 5; do
            if argocd app sync "$APP_NAME" --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN" --grpc-web --async --timeout 180 $PRUNE_FLAG; then
              break
            fi
            if [[ "$attempt" == "5" ]]; then
              echo "::endgroup::"
              echo "::error::Sync failed for $APP_NAME after 5 attempts"
              exit 1
            fi
            echo "Sync attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          echo "::endgroup::"

          echo "::group::argocd app wait $APP_NAME"
          if ! argocd app wait "$APP_NAME" --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN" --grpc-web --timeout 180; then
            echo "::endgroup::"
            echo "::error::Timeout waiting for sync completion of $APP_NAME"
            exit 1
          fi
          echo "::endgroup::"

  # Slack notification
  notify:
    name: Notify
    needs: [update_gitops, argocd_sync]
    if: always()
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: ${{ needs.update_gitops.result == 'failure' && 'failure' || needs.argocd_sync.result == 'failure' && 'failure' || 'success' }}
      workflow_name: "GitOps Update"
      failed_jobs: ${{ needs.update_gitops.result == 'failure' && 'Update GitOps' || '' }}${{ needs.argocd_sync.result == 'failure' && 'ArgoCD Sync' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
