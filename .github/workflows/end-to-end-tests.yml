name: "End-to-End Tests"

# This reusable workflow runs the LerianStudio/end-to-end gray-box/black-box
# suite (Go + Allure 3) against an already-deployed environment, then uploads
# the static Allure report to the lerian-e2e-artifacts S3 bucket — the same
# bucket/role the JS products (e.g. product-console) already use, read by
# Palantir (self-service-testing)'s E2E page.

on:
  workflow_call:
    inputs:
      modules:
        description: 'Comma-separated list of candidate end-to-end test modules (e.g. "midaz-ledger,midaz-crm"). Each maps to ./cases/<module>/... and .env.<module>.<env>. Narrowed down to built_apps below when that input is set.'
        type: string
        required: true
      built_apps:
        description: 'JSON array of the components actually built this run (each entry {"name": ...}, as produced by build.yml''s matrix output). When set, only candidates in `modules` whose name also appears here are run — e.g. a ledger-only change runs only the midaz-ledger module. Empty/unset ("[]") runs every candidate in `modules` (back-compat).'
        type: string
        default: '[]'
      tenancy:
        description: 'Tenancy mode targeted by the deployed environment — st (single-tenant) | mt (multi-tenant).'
        type: string
        default: 'st'
      service_domain:
        description: 'Base domain the deployed services live under. URLs are built as https://<app>.<base_env>-<tenancy>.<service_domain>.'
        type: string
        default: 'lerian.net'
      s3_bucket:
        description: 'S3 bucket the Allure report is uploaded to (read by Palantir). Uploaded under <bucket>/<repo>/<channel>/<tag>/<module>/.'
        type: string
        default: 'lerian-e2e-artifacts'
      go_version:
        description: 'Go version to use (should match the end-to-end repo go.mod).'
        type: string
        default: '1.25'
      node_version:
        description: 'Node.js version to use (for the Allure 3 CLI).'
        type: string
        default: '20'
      runner_type:
        description: 'GitHub runner type to use. Needs reach to the deployed environment, so it defaults to eveo-lxc-runners rather than the build runner (matches api-dog-e2e-tests and the ungoliant job).'
        type: string
        default: 'eveo-lxc-runners'
      timeout:
        description: 'Per-run Go test timeout, forwarded to make test TIMEOUT=...'
        type: string
        default: '600s'
      dry_run:
        description: 'Preview mode: resolve and print the target environment, selected modules, and S3 destinations without uploading anything to S3. Tests still run.'
        type: boolean
        default: false
    outputs:
      has_modules:
        description: 'Whether at least one candidate module was selected to run this call (string "true"/"false"). "false" means no built component matched a candidate module and the run was a no-op.'
        value: ${{ jobs.end-to-end-tests.outputs.has_modules }}
    secrets:
      e2e_repo_token:
        description: 'Token with read access to the private end-to-end repository.'
        required: true
      aws_e2e_artifacts_role_arn:
        description: 'IAM role ARN assumed via OIDC to upload the Allure report to the S3 bucket. Optional — when unset, the S3 upload step is skipped and only the GitHub Actions artifact is produced.'
        required: false
      admin_tenant_1_username:
        required: false
      admin_tenant_1_password:
        required: false
      admin_tenant_2_username:
        required: false
      admin_tenant_2_password:
        required: false

permissions:
  contents: read

jobs:
  end-to-end-tests:
    name: End-to-End Tests
    runs-on: ${{ inputs.runner_type }}
    permissions:
      id-token: write
      contents: read
    outputs:
      has_modules: ${{ steps.select.outputs.has_modules }}
    env:
      AWS_E2E_ARTIFACTS_ROLE_ARN: ${{ secrets.aws_e2e_artifacts_role_arn }}
    steps:
      # The executed suite is pinned to a static, trusted internal repository —
      # NOT a caller-supplied input — so a compromised caller cannot redirect
      # `make test` execution at an attacker-controlled repo (CodeQL
      # actions/untrusted-checkout). Non-executed strings (domain, bucket) stay
      # configurable via inputs.
      - name: Checkout end-to-end suite
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: LerianStudio/end-to-end
          token: ${{ secrets.e2e_repo_token }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.go_version }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install Allure 3 CLI
        run: make install-allure

      # ----------------- Resolve target environment -----------------
      # Same beta->dev / rc->stg / else->prd mapping as ungoliant_release_diff,
      # combined with the caller's tenancy to match the end-to-end repo's
      # .env.<module>.benedita-<env>-<tenancy> naming and the products'
      # https://<app>.<env>-<tenancy>.<domain> URL convention.
      - name: Resolve target environment
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
          TENANCY: ${{ inputs.tenancy }}
        run: |
          set -euo pipefail
          case "$TENANCY" in
            st|mt) ;;
            *)
              echo "::error::tenancy must be 'st' or 'mt' (got '${TENANCY}')"
              exit 1
              ;;
          esac
          if [[ "$REF_NAME" == *-beta.* ]]; then
            BASE_ENV="dev"
          elif [[ "$REF_NAME" == *-rc.* ]]; then
            BASE_ENV="stg"
          else
            BASE_ENV="prd"
          fi
          ENV_NAME="benedita-${BASE_ENV}-${TENANCY}"
          {
            echo "base_env=${BASE_ENV}"
            echo "env_name=${ENV_NAME}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved environment: ${ENV_NAME}"

      # ----------------- Select modules to run -----------------
      # Scope the run to only the component(s) this tag actually rebuilt: a
      # ledger-only change runs only midaz-ledger, a crm-only change runs only
      # midaz-crm, and a change touching both (or shared_paths) runs both.
      # built_apps carries the build job's matrix output; matching is by name
      # against `modules`, so module names must equal the built app names. Each
      # candidate is validated (safe identifier + known cases/ dir) before it is
      # ever used as a Go package, env-file, or S3 path.
      - name: Select modules to run
        id: select
        env:
          MODULES: ${{ inputs.modules }}
          BUILT_APPS: ${{ inputs.built_apps }}
        run: |
          set -euo pipefail
          IFS=',' read -ra CANDIDATES <<< "$MODULES"
          # Distinguish two cases that must NOT be conflated:
          #   * no candidate module supplied at all -> misconfiguration, fail
          #     fast so a tagged release cannot go green without running e2e.
          #   * candidates supplied but none matched built_apps -> intentional
          #     no-op (has_modules=false), handled below.
          CANDIDATE_COUNT=0
          for MODULE in "${CANDIDATES[@]}"; do
            [[ -n "$(echo -n "$MODULE" | xargs)" ]] && CANDIDATE_COUNT=$((CANDIDATE_COUNT + 1))
          done
          if [[ "$CANDIDATE_COUNT" -eq 0 ]]; then
            echo "::error::No e2e modules supplied — set 'modules' (e.g. midaz-ledger,midaz-crm) when enabling e2e tests."
            exit 1
          fi
          BUILT_NAMES=()
          if [[ -n "$BUILT_APPS" && "$BUILT_APPS" != "[]" && "$BUILT_APPS" != "null" ]]; then
            mapfile -t BUILT_NAMES < <(printf '%s' "$BUILT_APPS" | jq -r '.[].name')
          fi
          SELECTED=()
          for MODULE in "${CANDIDATES[@]}"; do
            MODULE="$(echo -n "$MODULE" | xargs)"
            [[ -z "$MODULE" ]] && continue
            if [[ ! "$MODULE" =~ ^[a-z0-9][a-z0-9_-]*$ ]] || [[ ! -d "cases/$MODULE" ]]; then
              echo "::error::Invalid or unknown E2E module: '${MODULE}'"
              exit 1
            fi
            if [[ ${#BUILT_NAMES[@]} -eq 0 ]]; then
              SELECTED+=("$MODULE")
              continue
            fi
            for BUILT in "${BUILT_NAMES[@]}"; do
              if [[ "$BUILT" == "$MODULE" ]]; then
                SELECTED+=("$MODULE")
                break
              fi
            done
          done
          JOINED=$(IFS=,; echo "${SELECTED[*]:-}")
          echo "modules=${JOINED}" >> "$GITHUB_OUTPUT"
          if [[ ${#SELECTED[@]} -eq 0 ]]; then
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No candidate module in '${MODULES}' matched the built components (${BUILT_NAMES[*]:-none}); e2e run is a no-op."
          else
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
            echo "Selected modules: ${JOINED}"
          fi

      # ----------------- Run each module -----------------
      # Each module gets its own .env.<module>.<env> file (written here, never
      # committed) and its own ALLURE_RESULTS_DIR/ALLURE_REPORT_DIR so a second
      # module's `make test` does not wipe the first module's report (the
      # Makefile's `test` target rm -rf's those dirs unless KEEP_RESULTS is set).
      # An EXIT trap removes the generated credential files before the (persistent)
      # runner is released, whether or not the tests pass.
      - name: Run end-to-end suites
        id: run
        if: steps.select.outputs.has_modules == 'true'
        env:
          ENV_NAME: ${{ steps.target.outputs.env_name }}
          BASE_ENV: ${{ steps.target.outputs.base_env }}
          TENANCY: ${{ inputs.tenancy }}
          SERVICE_DOMAIN: ${{ inputs.service_domain }}
          MODULES: ${{ steps.select.outputs.modules }}
          TIMEOUT: ${{ inputs.timeout }}
          AUTH_URL: https://auth.${{ steps.target.outputs.base_env }}-${{ inputs.tenancy }}.${{ inputs.service_domain }}
          ADMIN_TENANT_1_USERNAME: ${{ secrets.admin_tenant_1_username }}
          ADMIN_TENANT_1_PASSWORD: ${{ secrets.admin_tenant_1_password }}
          ADMIN_TENANT_2_USERNAME: ${{ secrets.admin_tenant_2_username }}
          ADMIN_TENANT_2_PASSWORD: ${{ secrets.admin_tenant_2_password }}
        run: |
          set -euo pipefail
          # Generated .env files hold plaintext tenant credentials; create them
          # 0600 so no other process on a shared/persistent runner can read them
          # in the window before the EXIT trap removes them.
          umask 077
          GENERATED_ENV_FILES=()
          # shellcheck disable=SC2317  # invoked indirectly via `trap ... EXIT`
          cleanup() {
            if [[ ${#GENERATED_ENV_FILES[@]} -gt 0 ]]; then
              rm -f "${GENERATED_ENV_FILES[@]}"
            fi
          }
          trap cleanup EXIT

          IFS=',' read -ra MODULE_LIST <<< "$MODULES"
          FAILED=0
          for MODULE in "${MODULE_LIST[@]}"; do
            MODULE="$(echo -n "$MODULE" | xargs)"
            [[ -z "$MODULE" ]] && continue

            case "$MODULE" in
              midaz-ledger) APP=ledger ;;
              midaz-crm) APP=midaz-crm ;;
              *) APP="$MODULE" ;;
            esac
            SERVICE_URL="https://${APP}.${BASE_ENV}-${TENANCY}.${SERVICE_DOMAIN}"

            ENV_FILE=".env.${MODULE}.${ENV_NAME}"
            GENERATED_ENV_FILES+=("$ENV_FILE")
            echo "::group::Writing ${ENV_FILE}"
            {
              echo "MULTI_TENANT=$([[ "$TENANCY" == "mt" ]] && echo 1 || echo 0)"
              echo "AUTH_URL=${AUTH_URL}"
              echo "ADMIN_TENANT_1_USERNAME=${ADMIN_TENANT_1_USERNAME}"
              echo "ADMIN_TENANT_1_PASSWORD=${ADMIN_TENANT_1_PASSWORD}"
              echo "ADMIN_TENANT_2_USERNAME=${ADMIN_TENANT_2_USERNAME}"
              echo "ADMIN_TENANT_2_PASSWORD=${ADMIN_TENANT_2_PASSWORD}"
              case "$MODULE" in
                midaz-ledger) echo "LEDGER_URL=${SERVICE_URL}" ;;
                midaz-crm) echo "CRM_URL=${SERVICE_URL}" ;;
                *) echo "SERVICE_URL=${SERVICE_URL}" ;;
              esac
            } > "$ENV_FILE"
            echo "::endgroup::"

            RESULTS_DIR="reports/allure-results-${MODULE}"
            REPORT_DIR="reports/allure-report-${MODULE}"
            echo "::group::make test ENV=${ENV_NAME} PACKAGE=./cases/${MODULE}/..."
            make test \
              ENV_FILE="${ENV_FILE}" \
              PACKAGE="./cases/${MODULE}/..." \
              TIMEOUT="${TIMEOUT}" \
              ALLURE_RESULTS_DIR="${RESULTS_DIR}" \
              ALLURE_REPORT_DIR="${REPORT_DIR}" \
              || FAILED=1
            echo "::endgroup::"
          done
          exit "$FAILED"

      - name: Upload Allure reports (GitHub artifact)
        if: always() && steps.select.outputs.has_modules == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-allure-reports
          path: reports/allure-report-*
          retention-days: 30

      # ----------------- S3 Upload (optional, Palantir reads this bucket) -----------------
      - name: Configure AWS credentials for E2E artifacts upload
        id: aws_auth
        if: always() && steps.select.outputs.has_modules == 'true' && env.AWS_E2E_ARTIFACTS_ROLE_ARN != '' && !inputs.dry_run
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_E2E_ARTIFACTS_ROLE_ARN }}
          aws-region: us-east-2

      # Gate the copy on OIDC auth actually succeeding: with always(), a failed
      # configure step would otherwise let `aws s3 cp` run against whatever
      # ambient/stale AWS credentials linger on the persistent runner. In
      # dry-run the auth step is skipped, so allow the (write-free) preview.
      - name: Upload Allure reports to S3
        if: always() && steps.select.outputs.has_modules == 'true' && env.AWS_E2E_ARTIFACTS_ROLE_ARN != '' && (inputs.dry_run || steps.aws_auth.outcome == 'success')
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TAG_NAME: ${{ github.ref_name }}
          MODULES: ${{ steps.select.outputs.modules }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          # Channel derived from the tag's prerelease identifier, same
          # convention as the JS products' e2e_tests job. Path shape mirrors
          # it too: s3://<bucket>/<repo>/<channel>/<tag>/<leaf>/ — playwright's
          # <leaf> is the fixed "playwright-report"; ours is the module name,
          # since one run covers several modules.
          CHANNEL="main"
          if [[ "$TAG_NAME" == *-beta.* ]]; then
            CHANNEL="beta"
          elif [[ "$TAG_NAME" == *-rc.* ]]; then
            CHANNEL="rc"
          fi
          IFS=',' read -ra MODULE_LIST <<< "$MODULES"
          for MODULE in "${MODULE_LIST[@]}"; do
            MODULE="$(echo -n "$MODULE" | xargs)"
            [[ -z "$MODULE" ]] && continue
            REPORT_DIR="reports/allure-report-${MODULE}"
            S3_PATH="s3://${S3_BUCKET}/${REPO_NAME}/${CHANNEL}/${TAG_NAME}/${MODULE}/"
            if [[ ! -d "$REPORT_DIR" ]]; then
              echo "::warning::${REPORT_DIR} not found — skipping S3 upload for ${MODULE}"
              continue
            fi
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "::notice::[dry-run] would upload ${REPORT_DIR}/ to ${S3_PATH}"
              continue
            fi
            aws s3 cp "$REPORT_DIR/" "$S3_PATH" --recursive
            echo "::notice::Uploaded ${MODULE} Allure report to ${S3_PATH}"
          done
