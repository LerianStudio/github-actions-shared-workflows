name: "Frontend PR Analysis"

# Reusable workflow for Frontend/Node.js PR analysis in monorepos
# Handles change detection, linting, type checking, security, tests, and coverage
# All logic is centralized here for easy maintenance
#
# Features:
# - Change detection for monorepo and single-app repositories
# - ESLint for code quality
# - TypeScript type checking
# - npm audit for security vulnerabilities
# - Jest/Vitest unit tests with coverage
# - Coverage threshold with PR comments
# - Build verification
# - Slack notifications on failure
# - Support for npm, yarn, and pnpm package managers

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'JSON array of paths to monitor for changes (e.g., ["apps/web", "apps/console"]). If empty, treats repo as single-app and runs against root directory.'
        type: string
        required: false
        default: ''
      path_level:
        description: 'Directory depth level to extract app name'
        type: number
        default: 2
      app_name_prefix:
        description: 'Prefix for app names in matrix output'
        type: string
        default: ''
      node_version:
        description: 'Node.js version to use'
        type: string
        default: '22'
      package_manager:
        description: 'Package manager to use (npm, yarn, pnpm)'
        type: string
        default: 'npm'
      eslint_args:
        description: 'Additional arguments for ESLint'
        type: string
        default: ''
      audit_level:
        description: 'npm audit severity level (low, moderate, high, critical)'
        type: string
        default: 'high'
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        type: number
        default: 80
      fail_on_coverage_threshold:
        description: 'Fail the workflow if coverage is below threshold'
        type: boolean
        default: false
      enable_lint:
        description: 'Enable ESLint'
        type: boolean
        default: true
      enable_typecheck:
        description: 'Enable TypeScript type checking'
        type: boolean
        default: true
      enable_security:
        description: 'Enable security scanning (npm audit)'
        type: boolean
        default: true
      enable_tests:
        description: 'Enable unit tests'
        type: boolean
        default: true
      enable_coverage:
        description: 'Enable coverage check with PR comment'
        type: boolean
        default: true
      enable_build:
        description: 'Enable build verification'
        type: boolean
        default: true
      enable_i18n_check:
        description: 'Enable i18n key validation (runs i18n_check_script and i18n_keys_check_script)'
        type: boolean
        default: false
      i18n_check_script:
        description: 'npm script name for extraction-parity check (verifies no new keys leaked unextracted)'
        type: string
        default: 'check:i18n'
      i18n_keys_check_script:
        description: 'npm script name for locale-parity check (verifies key parity across locale files)'
        type: string
        default: 'check:i18n:keys'
      i18n_check_fail_on_violation:
        description: 'Fail the workflow if any i18n check reports violations. Set false to surface as warning only during rollout.'
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ============================================
  # CHANGE DETECTION
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.changed-paths.outputs.matrix }}
      has_changes: ${{ steps.changed-paths.outputs.has_changes }}
    steps:
      - name: Get changed paths
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@v1
        with:
          filter-paths: ${{ inputs.filter_paths }}
          path-level: ${{ inputs.path_level }}
          get-app-name: 'true'
          app-name-prefix: ${{ inputs.app_name_prefix }}
          fallback-app-name: ${{ inputs.app_name_prefix != '' && inputs.app_name_prefix || 'app' }}

  # ============================================
  # ESLINT
  # ============================================
  lint:
    name: Lint (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_lint
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ matrix.app.working_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn install --frozen-lockfile ;;
            pnpm) pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Run ESLint
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn eslint . ${{ inputs.eslint_args }} ;;
            pnpm) pnpm eslint . ${{ inputs.eslint_args }} ;;
            *) npx eslint . ${{ inputs.eslint_args }} ;;
          esac

  # ============================================
  # TYPESCRIPT TYPE CHECK
  # ============================================
  typecheck:
    name: Type Check (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_typecheck
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ matrix.app.working_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn install --frozen-lockfile ;;
            pnpm) pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Run TypeScript compiler
        working-directory: ${{ matrix.app.working_dir }}
        run: npx tsc --noEmit

  # ============================================
  # SECURITY SCANNING
  # ============================================
  security:
    name: Security (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_security
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ matrix.app.working_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn install --frozen-lockfile ;;
            pnpm) pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Run npm audit
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn audit --level ${{ inputs.audit_level }} || true ;;
            pnpm) pnpm audit --audit-level ${{ inputs.audit_level }} || true ;;
            *) npm audit --omit=dev --audit-level ${{ inputs.audit_level }} ;;
          esac

  # ============================================
  # UNIT TESTS
  # ============================================
  tests:
    name: Tests (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_tests
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ matrix.app.working_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn install --frozen-lockfile ;;
            pnpm) pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Run tests with coverage
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          # Vitest 3+ removed --coverageReporters CLI flag (use --coverage.reporter instead)
          # Jest and Vitest 2 still support --coverageReporters
          VITEST_MAJOR=$(node -e "try{console.log(require('vitest/package.json').version.split('.')[0])}catch{console.log('0')}" 2>/dev/null)

          if [[ "$VITEST_MAJOR" -ge 3 ]]; then
            COVERAGE_FLAGS=(--coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=lcov)
          else
            COVERAGE_FLAGS=(--coverageReporters=text --coverageReporters=json-summary --coverageReporters=lcov)
          fi

          case "${{ inputs.package_manager }}" in
            yarn) yarn test --coverage "${COVERAGE_FLAGS[@]}" ;;
            pnpm) pnpm test --coverage "${COVERAGE_FLAGS[@]}" ;;
            *) npm test -- --coverage "${COVERAGE_FLAGS[@]}" ;;
          esac

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.app.name }}
          path: |
            ${{ matrix.app.working_dir }}/coverage/
          retention-days: 7

  # ============================================
  # COVERAGE CHECK
  # ============================================
  coverage:
    name: Coverage (${{ matrix.app.name }})
    needs: [detect-changes, tests]
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_coverage
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-${{ matrix.app.name }}
          path: ${{ matrix.app.working_dir }}/coverage

      - name: Parse coverage
        id: coverage
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ -f coverage/coverage-summary.json ]]; then
            COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            STATEMENTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)

            {
              echo "coverage=$COVERAGE"
              echo "statements=$STATEMENTS"
              echo "branches=$BRANCHES"
              echo "functions=$FUNCTIONS"
            } >> "$GITHUB_OUTPUT"
            echo "Total line coverage: $COVERAGE%"
          else
            {
              echo "coverage=0"
              echo "statements=0"
              echo "branches=0"
              echo "functions=0"
            } >> "$GITHUB_OUTPUT"
            echo "No coverage file found"
          fi

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const statements = '${{ steps.coverage.outputs.statements }}';
            const branches = '${{ steps.coverage.outputs.branches }}';
            const functions = '${{ steps.coverage.outputs.functions }}';
            const threshold = '${{ inputs.coverage_threshold }}';
            const appName = '${{ matrix.app.name }}';
            const passFail = parseFloat(coverage) >= parseFloat(threshold) ? '✅ PASS' : '⚠️ BELOW THRESHOLD';

            const body = `## 📊 Unit Test Coverage Report: \`${appName}\`

            | Metric | Value | Status |
            |--------|-------|--------|
            | **Lines** | \`${coverage}%\` | ${passFail} |
            | **Statements** | \`${statements}%\` | |
            | **Branches** | \`${branches}%\` | |
            | **Functions** | \`${functions}%\` | |
            | **Threshold** | \`${threshold}%\` | |

            ---
            *Generated by Frontend PR Analysis workflow*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.body.includes(`Unit Test Coverage Report: \`${appName}\``)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Check coverage threshold
        if: inputs.fail_on_coverage_threshold
        env:
          COVERAGE: ${{ steps.coverage.outputs.coverage }}
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Coverage summary
        env:
          APP_NAME: ${{ matrix.app.name }}
          COV_LINES: ${{ steps.coverage.outputs.coverage }}
          COV_STATEMENTS: ${{ steps.coverage.outputs.statements }}
          COV_BRANCHES: ${{ steps.coverage.outputs.branches }}
          COV_FUNCTIONS: ${{ steps.coverage.outputs.functions }}
          COV_THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          {
            echo "## Coverage Summary: ${APP_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Lines | ${COV_LINES}% |"
            echo "| Statements | ${COV_STATEMENTS}% |"
            echo "| Branches | ${COV_BRANCHES}% |"
            echo "| Functions | ${COV_FUNCTIONS}% |"
            echo "| Threshold | ${COV_THRESHOLD}% |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================
  # BUILD VERIFICATION
  # ============================================
  build:
    name: Build (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_build
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ matrix.app.working_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn install --frozen-lockfile ;;
            pnpm) pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Build
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn build ;;
            pnpm) pnpm build ;;
            *) npm run build ;;
          esac

  # ============================================
  # I18N KEY CHECKS
  # ============================================
  i18n-check:
    name: i18n Check (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_i18n_check
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ matrix.app.working_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.working_dir }}
        env:
          PKG_MANAGER: ${{ inputs.package_manager }}
        run: |
          case "$PKG_MANAGER" in
            yarn) yarn install --frozen-lockfile ;;
            pnpm) pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Check i18n keys (extraction parity)
        id: i18n_extraction
        working-directory: ${{ matrix.app.working_dir }}
        continue-on-error: true
        env:
          PKG_MANAGER: ${{ inputs.package_manager }}
          I18N_SCRIPT: ${{ inputs.i18n_check_script }}
        run: |
          case "$PKG_MANAGER" in
            yarn) yarn run "$I18N_SCRIPT" ;;
            pnpm) pnpm run "$I18N_SCRIPT" ;;
            *) npm run "$I18N_SCRIPT" ;;
          esac

      - name: Check i18n keys (locale parity)
        id: i18n_locale
        working-directory: ${{ matrix.app.working_dir }}
        continue-on-error: true
        env:
          PKG_MANAGER: ${{ inputs.package_manager }}
          I18N_KEYS_SCRIPT: ${{ inputs.i18n_keys_check_script }}
        run: |
          case "$PKG_MANAGER" in
            yarn) yarn run "$I18N_KEYS_SCRIPT" ;;
            pnpm) pnpm run "$I18N_KEYS_SCRIPT" ;;
            *) npm run "$I18N_KEYS_SCRIPT" ;;
          esac

      - name: Fail on i18n violations
        if: inputs.i18n_check_fail_on_violation && (steps.i18n_extraction.outcome == 'failure' || steps.i18n_locale.outcome == 'failure')
        env:
          EXTRACTION_OUTCOME: ${{ steps.i18n_extraction.outcome }}
          LOCALE_OUTCOME: ${{ steps.i18n_locale.outcome }}
        run: |
          echo "::error::i18n validation failed (extraction=$EXTRACTION_OUTCOME, locale=$LOCALE_OUTCOME)"
          exit 1

  # ============================================
  # NO CHANGES DETECTED
  # ============================================
  no-changes:
    name: No Frontend Changes
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes != 'true'
    runs-on: ${{ inputs.runner_type }}
    steps:
      - name: Skip
        run: |
          echo "No frontend code changes detected in monitored paths."
          echo "Skipping frontend analysis workflows."

  # ============================================
  # SLACK NOTIFICATION
  # ============================================
  notify:
    name: Notify
    needs: [detect-changes, lint, typecheck, security, tests, build, i18n-check]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: ${{ (needs.lint.result == 'failure' || needs.typecheck.result == 'failure' || needs.security.result == 'failure' || needs.tests.result == 'failure' || needs.build.result == 'failure' || needs.i18n-check.result == 'failure') && 'failure' || 'success' }}
      workflow_name: "Frontend PR Analysis"
      failed_jobs: ${{ needs.lint.result == 'failure' && 'Lint, ' || '' }}${{ needs.typecheck.result == 'failure' && 'TypeCheck, ' || '' }}${{ needs.security.result == 'failure' && 'Security, ' || '' }}${{ needs.tests.result == 'failure' && 'Tests, ' || '' }}${{ needs.build.result == 'failure' && 'Build, ' || '' }}${{ needs.i18n-check.result == 'failure' && 'i18n Check' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
