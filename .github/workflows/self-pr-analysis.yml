name: Self — PR Analysis

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # ----------------- YAML Lint -----------------
  yamllint:
    name: YAML Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed YAML files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only \
              | grep -E '\.yml$' \
              | tr '\n' ' ' | sed 's/ $//')
          else
            files="."
          fi
          echo "files=${files}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run yamllint
        if: steps.changed.outputs.files != ''
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: ${{ steps.changed.outputs.files }}
          config_file: .yamllint.yml

  # ----------------- Action Lint -----------------
  actionlint:
    name: Action Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed workflow files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only \
              | grep -E '^\.github/workflows/.*\.yml$' \
              | tr '\n' ',' | sed 's/,$//')
          else
            files=".github/workflows/*.yml"
          fi
          echo "files=${files}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run actionlint
        if: steps.changed.outputs.files != ''
        uses: raven-actions/actionlint@v2.1.2
        with:
          files: ${{ steps.changed.outputs.files }}

  # ----------------- Pinned Actions Check -----------------
  pinned-actions:
    name: Pinned Actions Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed workflow and composite files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only \
              | grep -E '\.(yml|yaml)$' \
              | grep -E '(\.github/workflows/|src/)' \
              | tr '\n' ' ' | sed 's/ $//')
          else
            files=$(find .github/workflows/ src/ -name '*.yml' -o -name '*.yaml' | tr '\n' ' ')
          fi
          echo "files=${files}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check for unpinned actions
        if: steps.changed.outputs.files != ''
        run: |
          violations=0
          for file in ${{ steps.changed.outputs.files }}; do
            [ -f "$file" ] || continue
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              content=$(echo "$line" | cut -d: -f2-)
              # Skip LerianStudio internal actions (pinned to @main intentionally)
              if echo "$content" | grep -q "LerianStudio/"; then
                continue
              fi
              echo "::error file=${file},line=${line_num}::Unpinned action found: $(echo "$content" | xargs)"
              violations=$((violations + 1))
            done < <(grep -n 'uses:.*@\(main\|master\)' "$file" 2>/dev/null || true)
          done

          if [ "$violations" -gt 0 ]; then
            echo "::error::Found $violations unpinned action(s). Pin to a specific version tag or SHA."
            exit 1
          fi
          echo "All actions are properly pinned."

  # ----------------- Markdown Link Check -----------------
  markdown-link-check:
    name: Markdown Link Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed markdown files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only \
              | grep -E '\.md$' \
              | tr '\n' ',' | sed 's/,$//')
          else
            files=""
          fi
          echo "files=${files}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run markdown link check
        if: steps.changed.outputs.files != ''
        uses: tcort/github-action-markdown-link-check@v1.1.2
        with:
          file-path: ${{ steps.changed.outputs.files }}
          config-file: .github/markdown-link-check-config.json

  # ----------------- Spelling Check -----------------
  typos:
    name: Spelling Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run typos
        uses: crate-ci/typos@v1.44.0
