name: "Helm Release Notification"

# Reusable workflow for sending Slack notifications after Helm chart releases.
#
# Features:
# - Parses version table from README.md for rich Slack table display
# - Supports native Slack table blocks for component version matrix
# - Automatic release tag detection from git tags
# - Optional team mention in notification footer
# - dry_run mode for previewing notifications without sending
#
# Examples:
#   # Basic usage (called from release pipeline)
#   uses: LerianStudio/github-actions-shared-workflows/.github/workflows/helm-release-notification.yml@v1.0.0
#   with:
#     chart_name: "midaz-helm"
#     chart_path: "charts/midaz"
#   secrets:
#     SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_HELM }}
#     SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_DEVOPS }}

on:
  workflow_call:
    inputs:
      chart_name:
        description: 'Name of the Helm chart (e.g., midaz-helm)'
        required: true
        type: string
      chart_path:
        description: 'Path to the Helm chart directory (e.g., charts/midaz)'
        required: true
        type: string
      runner_type:
        description: 'Runner to use for the workflow'
        type: string
        default: 'ubuntu-latest'
      slack_color:
        description: 'Sidebar color for the Slack message'
        type: string
        default: '#36a64f'
      dry_run:
        description: 'Preview notification without sending'
        required: false
        type: boolean
        default: false
    secrets:
      SLACK_BOT_TOKEN:
        description: 'Slack Bot OAuth Token (xoxb-...)'
        required: true
      SLACK_CHANNEL:
        description: 'Slack channel ID for notifications'
        required: true
      SLACK_MENTION_GROUP:
        description: 'Slack user group ID to mention (e.g., S0614TZR7)'
        required: false
  workflow_dispatch:
    inputs:
      chart_name:
        description: 'Name of the Helm chart (e.g., midaz-helm)'
        required: true
        type: string
      chart_path:
        description: 'Path to the Helm chart directory (e.g., charts/midaz)'
        required: true
        type: string
      runner_type:
        description: 'Runner to use for the workflow'
        type: string
        default: 'ubuntu-latest'
      slack_color:
        description: 'Sidebar color for the Slack message'
        type: string
        default: '#36a64f'
      dry_run:
        description: 'Preview notification without sending'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ${{ inputs.runner_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        env:
          CHART_NAME_RAW: ${{ inputs.chart_name }}
        run: |
          set -euo pipefail

          # Format chart name for display: remove -helm suffix and convert to Title Case
          CHART_NAME_STRIPPED="${CHART_NAME_RAW%-helm}"
          CHART_NAME=$(echo "${CHART_NAME_STRIPPED//-/ }" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')

          # Get latest release tag for this chart
          LATEST_TAG=$(git tag -l "${CHART_NAME_RAW}-v*" --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No release tag found matching pattern '${CHART_NAME_RAW}-v*'"
            exit 1
          fi
          CHART_VERSION="${LATEST_TAG/${CHART_NAME_RAW}-v/}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${LATEST_TAG}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"

          {
            echo "chart_name=${CHART_NAME}"
            echo "chart_version=${CHART_VERSION}"
            echo "latest_tag=${LATEST_TAG}"
            echo "release_url=${RELEASE_URL}"
            echo "commit_url=${COMMIT_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse README version table
        id: readme
        env:
          CHART_NAME_RAW: ${{ inputs.chart_name }}
        run: |
          set -euo pipefail

          # Convert chart name to pattern for README section matching
          CHART_PATTERN=$(echo "$CHART_NAME_RAW" | sed 's/-helm$//' | sed 's/-/ /g')

          # Extract section for this chart from README
          CHART_SECTION=$(awk -v chart="$CHART_PATTERN" '
            BEGIN { IGNORECASE=1; found=0 }
            tolower($0) ~ tolower("### .*" chart) { found=1 }
            found && /^-+$/ { exit }
            found { print }
          ' README.md)

          if [ -n "$CHART_SECTION" ]; then
            HEADER_LINE=$(echo "$CHART_SECTION" | grep "| Chart Version |" | head -1)
            DATA_LINE=$(echo "$CHART_SECTION" | grep -A 2 "| Chart Version |" | tail -1)
          else
            HEADER_LINE=$(grep "| Chart Version |" README.md | head -1)
            DATA_LINE=$(grep -A 2 "| Chart Version |" README.md | tail -1)
          fi

          # Build README anchor URL
          README_ANCHOR=$(echo "$CHART_SECTION" | head -1 | sed 's/^### //' | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')
          README_URL="${{ github.server_url }}/${{ github.repository }}?tab=readme-ov-file#${README_ANCHOR}"

          {
            echo "header_line=${HEADER_LINE}"
            echo "data_line=${DATA_LINE}"
            echo "readme_url=${README_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::DRY RUN — no notification will be sent"
          echo "  chart_name     : ${{ steps.release.outputs.chart_name }}"
          echo "  chart_version  : ${{ steps.release.outputs.chart_version }}"
          echo "  latest_tag     : ${{ steps.release.outputs.latest_tag }}"
          echo "  release_url    : ${{ steps.release.outputs.release_url }}"
          echo "  commit_url     : ${{ steps.release.outputs.commit_url }}"
          echo "  readme_url     : ${{ steps.readme.outputs.readme_url }}"
          echo "  slack_channel  : configured"
          echo "  slack_color    : ${{ inputs.slack_color }}"
          echo "  mention_group  : ${{ secrets.SLACK_MENTION_GROUP != '' && 'configured' || 'not set' }}"
          echo "  header_line    : ${{ steps.readme.outputs.header_line }}"
          echo "  data_line      : ${{ steps.readme.outputs.data_line }}"

      - name: Send Slack notification
        if: ${{ !inputs.dry_run }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          MENTION_GROUP: ${{ secrets.SLACK_MENTION_GROUP }}
          CHART_NAME: ${{ steps.release.outputs.chart_name }}
          CHART_VERSION: ${{ steps.release.outputs.chart_version }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          COMMIT_URL: ${{ steps.release.outputs.commit_url }}
          README_URL: ${{ steps.readme.outputs.readme_url }}
          HEADER_LINE: ${{ steps.readme.outputs.header_line }}
          DATA_LINE: ${{ steps.readme.outputs.data_line }}
          SLACK_COLOR: ${{ inputs.slack_color }}
        run: |
          set -euo pipefail

          # Build native Slack table block from README version table
          TABLE_BLOCK=$(echo "{\"header\": \"$HEADER_LINE\", \"data\": \"$DATA_LINE\"}" | jq -c '
            (.header | split("|") | map(gsub("^\\s+|\\s+$"; "")) | map(select(. != "")) | map(gsub(" Version$"; ""))) as $headers |
            (.data | split("|") | map(gsub("^\\s+|\\s+$"; "")) | map(select(. != "")) | map(gsub("`"; ""))) as $values |
            $headers | map({type: "raw_text", text: .}) as $header_row |
            $values | map({type: "raw_text", text: .}) as $data_row |
            $headers | map({align: "center", is_wrapped: false}) as $col_settings |
            {
              type: "table",
              column_settings: $col_settings,
              rows: [$header_row, $data_row]
            }
          ')

          # Build context line with optional team mention
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WORKFLOW_NUM="${{ github.run_number }}"

          if [ -n "$MENTION_GROUP" ]; then
            CONTEXT_TEXT=":clock1: ${TIMESTAMP} | Workflow: <${WORKFLOW_URL}|#${WORKFLOW_NUM}> | cc: <!subteam^${MENTION_GROUP}>"
          else
            CONTEXT_TEXT=":clock1: ${TIMESTAMP} | Workflow: <${WORKFLOW_URL}|#${WORKFLOW_NUM}>"
          fi

          # Build Slack payload
          SLACK_PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg chart_name "$CHART_NAME" \
            --arg chart_version "$CHART_VERSION" \
            --arg release_url "$RELEASE_URL" \
            --arg commit_url "$COMMIT_URL" \
            --arg readme_url "$README_URL" \
            --argjson table_block "$TABLE_BLOCK" \
            --arg context "$CONTEXT_TEXT" \
            --arg color "$SLACK_COLOR" \
            '{
              channel: $channel,
              blocks: [
                {type: "header", text: {type: "plain_text", text: ("New Release: " + $chart_name + " Helm Chart :rocket:"), emoji: true}},
                $table_block,
                {type: "actions", elements: [
                  {type: "button", text: {type: "plain_text", text: "View Release", emoji: true}, url: $release_url, style: "primary"},
                  {type: "button", text: {type: "plain_text", text: "View Versions", emoji: true}, url: $readme_url},
                  {type: "button", text: {type: "plain_text", text: "View Commit", emoji: true}, url: $commit_url}
                ]},
                {type: "context", elements: [{type: "mrkdwn", text: $context}]}
              ],
              attachments: [{
                color: $color,
                blocks: []
              }]
            }')

          RESPONSE=$(curl -s --fail-with-body \
            --connect-timeout 10 --max-time 30 \
            --retry 3 --retry-delay 2 --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-type: application/json; charset=utf-8" \
            --data "$SLACK_PAYLOAD" \
            "https://slack.com/api/chat.postMessage")

          if echo "$RESPONSE" | jq -e '.ok == true' > /dev/null; then
            echo "::notice::Slack notification sent successfully"
          else
            echo "::warning::Failed to send Slack notification"
            echo "$RESPONSE" | jq .
            exit 1
          fi
