name: "Go PR Analysis"

# Reusable workflow for Go PR analysis in monorepos
# Handles change detection, CI, security, and coverage checks per changed app
# All logic is centralized here for easy maintenance

on:
  workflow_call:
    inputs:
      runner_type:
        description: 'GitHub runner type'
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2404'
      filter_paths:
        description: 'JSON array of paths to monitor for changes (e.g., ["apps/api", "apps/worker"]). If empty, treats repo as single-app and runs against root directory.'
        type: string
        required: false
        default: ''
      path_level:
        description: 'Directory depth level to extract app name'
        type: number
        default: 2
      app_name_prefix:
        description: 'Prefix for app names in matrix output'
        type: string
        default: ''
      go_version:
        description: 'Go version to use'
        type: string
        default: '1.23'
      golangci_lint_version:
        description: 'GolangCI-Lint version'
        type: string
        default: 'v1.62.2'
      golangci_lint_args:
        description: 'Additional arguments for golangci-lint'
        type: string
        default: '--timeout=5m'
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        type: number
        default: 80
      fail_on_coverage_threshold:
        description: 'Fail the workflow if coverage is below threshold'
        type: boolean
        default: false
      enable_lint:
        description: 'Enable GolangCI-Lint'
        type: boolean
        default: true
      enable_security:
        description: 'Enable security scanning (gosec, govulncheck)'
        type: boolean
        default: true
      enable_tests:
        description: 'Enable unit tests'
        type: boolean
        default: true
      enable_coverage:
        description: 'Enable coverage check with PR comment'
        type: boolean
        default: true
      enable_build:
        description: 'Enable build verification'
        type: boolean
        default: true
      go_private_modules:
        description: 'GOPRIVATE pattern for private Go modules (e.g., github.com/LerianStudio/*)'
        type: string
        default: ''
      enable_integration_tests:
        description: 'Enable integration tests (requires make test-integration target)'
        type: boolean
        default: false
      integration_test_command:
        description: 'Command to run integration tests'
        type: string
        default: 'make test-integration'
      enable_test_determinism:
        description: 'Enable test determinism check (runs tests multiple times with shuffle)'
        type: boolean
        default: false
      test_determinism_runs:
        description: 'Number of times to run tests for determinism check'
        type: number
        default: 3

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ============================================
  # CHANGE DETECTION
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA_ENV: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            # For PRs, compare base and head
            git fetch origin "$PR_BASE_SHA" --depth=1 2>/dev/null || true
            FILES=$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA" 2>/dev/null || git diff --name-only "origin/${BASE_REF}...HEAD")
          elif [[ "$EVENT_BEFORE" == "0000000000000000000000000000000000000000" ]] || [[ -z "$EVENT_BEFORE" ]]; then
            if PREV_COMMIT=$(git rev-parse HEAD^); then
              FILES=$(git diff --name-only "$PREV_COMMIT" HEAD)
            else
              FILES=$(git ls-tree -r --name-only HEAD)
            fi
          else
            FILES=$(git diff --name-only "$EVENT_BEFORE" "$GITHUB_SHA_ENV")
          fi
          printf "files<<EOF\n%s\nEOF\n" "$FILES" >> "$GITHUB_OUTPUT"

      - name: Build matrix from changed paths
        id: set-matrix
        shell: bash
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          FILTER_PATHS='${{ inputs.filter_paths }}'
          PATH_LEVEL="${{ inputs.path_level }}"
          APP_NAME_PREFIX="${{ inputs.app_name_prefix }}"

          if [[ -z "$FILES" ]]; then
            echo "No files changed."
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Single-app mode: if filter_paths is empty, run against root directory
          if [[ -z "$FILTER_PATHS" ]] || [[ "$FILTER_PATHS" == "[]" ]] || [[ "$FILTER_PATHS" == "" ]]; then
            echo "Single-app mode: no filter_paths specified, running against root directory"
            if [[ -n "$APP_NAME_PREFIX" ]]; then
              APP_NAME="$APP_NAME_PREFIX"
            else
              APP_NAME="app"
            fi
            MATRIX="[{\"name\":\"$APP_NAME\",\"working_dir\":\".\"}]"
            echo "Single app matrix: $MATRIX"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Monorepo mode: filter and build matrix from changed paths
          echo "Monorepo mode: filtering by paths $FILTER_PATHS"

          # Get directory for each file
          DIRS=$(echo "$FILES" | xargs -n1 dirname)

          # Trim to first N path segments
          if [[ -n "$PATH_LEVEL" ]] && [[ "$PATH_LEVEL" -gt 0 ]]; then
            DIRS=$(echo "$DIRS" | cut -d'/' -f-"$PATH_LEVEL")
          fi

          # Filter paths
          FILTER_LIST=$(echo "$FILTER_PATHS" | jq -r '.[]' 2>/dev/null || echo "")
          if [[ -n "$FILTER_LIST" ]]; then
            FILTERED=""
            while read -r DIR; do
              while read -r FILTER; do
                if [[ "$DIR" == "$FILTER"* ]]; then
                  FILTERED+="$DIR"$'\n'
                  break
                fi
              done <<< "$FILTER_LIST"
            done <<< "$DIRS"
            DIRS="$FILTERED"
          fi

          # Deduplicate and remove empty lines
          DIRS=$(echo "$DIRS" | grep -v '^$' | sort -u || true)

          if [[ -z "$DIRS" ]]; then
            echo "No matching directories found."
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build matrix with app names
          MATRIX="["
          FIRST=true
          while read -r DIR; do
            if [[ -n "$APP_NAME_PREFIX" ]]; then
              APP_NAME="${APP_NAME_PREFIX}-$(echo "$DIR" | rev | cut -d'/' -f1 | rev)"
            else
              APP_NAME="$(echo "$DIR" | rev | cut -d'/' -f1 | rev)"
            fi
            ENTRY="{\"name\":\"$APP_NAME\",\"working_dir\":\"$DIR\"}"
            if $FIRST; then
              MATRIX+="$ENTRY"
              FIRST=false
            else
              MATRIX+=",$ENTRY"
            fi
          done <<< "$DIRS"
          MATRIX+="]"

          echo "Changed apps matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  # ============================================
  # GOLANGCI-LINT
  # ============================================
  lint:
    name: Lint (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_lint
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Install golangci-lint
        env:
          GOLANGCI_LINT_VERSION: ${{ inputs.golangci_lint_version }}
        run: |
          if [[ ! "$GOLANGCI_LINT_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid golangci-lint version: $GOLANGCI_LINT_VERSION (expected format vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          go install "github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Detect Makefile lint target
        id: detect-make
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ -f "Makefile" ]] || [[ -f "makefile" ]] || [[ -f "GNUmakefile" ]]; then
            if make -n lint >/dev/null 2>&1; then
              echo "Makefile with 'lint' target detected"
              echo "use_make=true" >> "$GITHUB_OUTPUT"
            else
              echo "Makefile exists but no 'lint' target found"
              echo "use_make=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Makefile found"
            echo "use_make=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GolangCI-Lint (make)
        if: steps.detect-make.outputs.use_make == 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: make lint

      - name: Run GolangCI-Lint (direct)
        if: steps.detect-make.outputs.use_make != 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: golangci-lint run ${{ inputs.golangci_lint_args }}

  # ============================================
  # SECURITY SCANNING
  # ============================================
  security:
    name: Security (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_security
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Detect Makefile sec target
        id: detect-make
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ -f "Makefile" ]] || [[ -f "makefile" ]] || [[ -f "GNUmakefile" ]]; then
            if make -n sec >/dev/null 2>&1; then
              echo "Makefile with 'sec' target detected"
              echo "use_make=true" >> "$GITHUB_OUTPUT"
            else
              echo "Makefile exists but no 'sec' target found"
              echo "use_make=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Makefile found"
            echo "use_make=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Security (make)
        if: steps.detect-make.outputs.use_make == 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: make sec
        continue-on-error: true

      - name: Run Gosec for SARIF
        id: gosec-sarif
        uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0
        with:
          args: -no-fail -fmt sarif -out gosec-${{ matrix.app.name }}.sarif ./${{ matrix.app.working_dir }}/...

      - name: Upload Gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: gosec-${{ matrix.app.name }}.sarif
          category: gosec-${{ matrix.app.name }}
        continue-on-error: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.app.working_dir }}
        run: govulncheck ./...
        continue-on-error: true

  # ============================================
  # UNIT TESTS
  # ============================================
  tests:
    name: Tests (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_tests
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Detect Makefile test target
        id: detect-make
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          # Look for Makefile targets that generate coverage
          # Priority: coverage-unit > cover-html > test (no coverage)
          if [[ -f "Makefile" ]] || [[ -f "makefile" ]] || [[ -f "GNUmakefile" ]]; then
            if make -n coverage-unit >/dev/null 2>&1; then
              echo "Makefile with 'coverage-unit' target detected"
              {
                echo "use_make=true"
                echo "make_target=coverage-unit"
              } >> "$GITHUB_OUTPUT"
            elif make -n cover-html >/dev/null 2>&1; then
              echo "Makefile with 'cover-html' target detected"
              {
                echo "use_make=true"
                echo "make_target=cover-html"
              } >> "$GITHUB_OUTPUT"
            elif make -n test >/dev/null 2>&1; then
              echo "Makefile with 'test' target detected (no coverage)"
              {
                echo "use_make=true"
                echo "make_target=test"
                echo "no_coverage=true"
              } >> "$GITHUB_OUTPUT"
            else
              echo "No test targets found in Makefile, using go test"
              echo "use_make=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Makefile found, using go test"
            echo "use_make=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dependencies
        if: steps.detect-make.outputs.use_make != 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: go mod download

      - name: Run tests (make)
        if: steps.detect-make.outputs.use_make == 'true'
        working-directory: ${{ matrix.app.working_dir }}
        env:
          CGO_ENABLED: 1
        run: |
          make ${{ steps.detect-make.outputs.make_target }}
          # Normalize coverage file name for downstream jobs
          # Check various locations where coverage might be generated
          if [[ -f "coverage.out" ]] && [[ ! -f "coverage.txt" ]]; then
            cp coverage.out coverage.txt
          fi
          if [[ -f "reports/unit_coverage.out" ]] && [[ ! -f "coverage.txt" ]]; then
            cp reports/unit_coverage.out coverage.txt
          fi
          if [[ -f "artifacts/coverage.out" ]] && [[ ! -f "coverage.txt" ]]; then
            cp artifacts/coverage.out coverage.txt
          fi
          if [[ -f "artifacts/coverage-unit.out" ]] && [[ ! -f "coverage.txt" ]]; then
            cp artifacts/coverage-unit.out coverage.txt
          fi

      - name: Generate coverage (fallback for make test)
        if: steps.detect-make.outputs.use_make == 'true' && steps.detect-make.outputs.no_coverage == 'true'
        working-directory: ${{ matrix.app.working_dir }}
        env:
          CGO_ENABLED: 1
        run: |
          # make test ran but doesn't generate coverage, run go test for coverage only
          echo "Generating coverage with go test (make test doesn't generate coverage)"

          # Get package list, excluding /tests/ and /api/ directories (standard exclusions)
          PACKAGES=$(go list ./... | awk '!/\/tests($|\/)/' | awk '!/\/api($|\/)/')

          if [[ -n "$PACKAGES" ]]; then
            echo "$PACKAGES" | xargs go test -coverprofile=coverage.txt -covermode=atomic > /dev/null 2>&1 || true
          else
            go test -coverprofile=coverage.txt -covermode=atomic ./... > /dev/null 2>&1 || true
          fi

      - name: Run tests (go)
        if: steps.detect-make.outputs.use_make != 'true'
        working-directory: ${{ matrix.app.working_dir }}
        env:
          CGO_ENABLED: 1
        run: |
          # Get package list, excluding /tests/ and /api/ directories (standard exclusions)
          # .ignorecoverunit patterns are applied to the coverage REPORT, not to test execution
          PACKAGES=$(go list ./... | awk '!/\/tests($|\/)/' | awk '!/\/api($|\/)/')

          if [[ -z "$PACKAGES" ]]; then
            echo "No packages found after filtering /tests/ and /api/"
            exit 0
          fi

          PACKAGE_COUNT=$(echo "$PACKAGES" | wc -l | tr -d ' ')
          echo "Running tests on $PACKAGE_COUNT packages (excluded /tests/, /api/)"
          echo "$PACKAGES" | xargs go test -v -race -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.app.name }}
          path: ${{ matrix.app.working_dir }}/coverage.txt
          retention-days: 7

  # ============================================
  # COVERAGE CHECK
  # ============================================
  coverage:
    name: Coverage (${{ matrix.app.name }})
    needs: [detect-changes, tests]
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_coverage
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-${{ matrix.app.name }}
          path: ${{ matrix.app.working_dir }}

      - name: Filter coverage with .ignorecoverunit
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ ! -f coverage.txt ]]; then
            echo "No coverage.txt file found, skipping filter"
            exit 0
          fi

          # Check for .ignorecoverunit in working dir first, then repository root
          IGNORE_FILE=""
          if [[ -f .ignorecoverunit ]]; then
            IGNORE_FILE=".ignorecoverunit"
            echo "Using .ignorecoverunit from working directory"
          elif [[ -f "$GITHUB_WORKSPACE/.ignorecoverunit" ]]; then
            IGNORE_FILE="$GITHUB_WORKSPACE/.ignorecoverunit"
            echo "Using .ignorecoverunit from repository root"
          else
            echo "No .ignorecoverunit file found, using full coverage"
            exit 0
          fi

          echo "Filtering coverage with .ignorecoverunit patterns..."

          # Read patterns, filter comments and empty lines, convert to pipe-separated regex
          PATTERNS=$(grep -v '^#' "$IGNORE_FILE" | grep -v '^[[:space:]]*$' | tr '\n' '|' | sed 's/|$//')

          if [[ -z "$PATTERNS" ]]; then
            echo "No patterns found in .ignorecoverunit"
            exit 0
          fi

          echo "Patterns: $PATTERNS"

          # Convert glob patterns to regex (escape dots, convert * to .*)
          REGEX_PATTERNS=$(echo "$PATTERNS" | sed 's/\./\\./g' | sed 's/\*/.*/g')
          echo "Regex patterns: $REGEX_PATTERNS"

          # Keep header line, filter body
          head -1 coverage.txt > coverage_filtered.txt
          tail -n +2 coverage.txt | grep -vE "$REGEX_PATTERNS" >> coverage_filtered.txt || true

          BEFORE=$(wc -l < coverage.txt | tr -d ' ')
          AFTER=$(wc -l < coverage_filtered.txt | tr -d ' ')
          echo "Filtered coverage: $BEFORE lines -> $AFTER lines"

          mv coverage_filtered.txt coverage.txt

      - name: Calculate coverage
        id: coverage
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ -f coverage.txt ]]; then
            COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
            echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
            echo "Total coverage: $COVERAGE%"

            # Generate coverage by package table
            {
              echo "## Coverage by Package"
              echo ""
              echo "| Package | Coverage |"
              echo "|---------|----------|"
            } > coverage-report.md

            # Aggregate coverage by package
            go tool cover -func=coverage.txt | grep -v "total:" | awk '
            {
              if (NF >= 3) {
                split($1, parts, ":");
                filepath = parts[1];
                split(filepath, pathparts, "/");
                n = length(pathparts);
                pkg = "";
                for (i = 1; i < n; i++) {
                  if (i > 1) pkg = pkg "/";
                  pkg = pkg pathparts[i];
                }
                cov_str = $NF;
                gsub(/%/, "", cov_str);
                cov = cov_str + 0;
                pkg_lines[pkg] += 1;
                pkg_coverage[pkg] += cov;
              }
            }
            END {
              for (p in pkg_coverage) {
                if (pkg_lines[p] > 0) {
                  avg = pkg_coverage[p] / pkg_lines[p];
                  printf "| `%s` | %.1f%% |\n", p, avg;
                }
              }
            }' | sort >> coverage-report.md
          else
            echo "coverage=0" >> "$GITHUB_OUTPUT"
            echo "No coverage file found"
            echo "No coverage data available" > coverage-report.md
          fi

      - name: Generate HTML coverage report
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ -f coverage.txt ]]; then
            go tool cover -html=coverage.txt -o coverage.html
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report-${{ matrix.app.name }}
          path: |
            ${{ matrix.app.working_dir }}/coverage.txt
            ${{ matrix.app.working_dir }}/coverage.html
            ${{ matrix.app.working_dir }}/coverage-report.md
          retention-days: 30

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.MANAGE_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const threshold = '${{ inputs.coverage_threshold }}';
            const appName = '${{ matrix.app.name }}';
            const workingDir = '${{ matrix.app.working_dir }}';
            const passFail = parseFloat(coverage) >= parseFloat(threshold) ? '✅ PASS' : '⚠️ BELOW THRESHOLD';

            let coverageReport = '';
            try {
              const path = require('path');
              const fullPath = path.join(process.cwd(), workingDir, 'coverage-report.md');
              console.log('Reading coverage report from:', fullPath);
              coverageReport = fs.readFileSync(fullPath, 'utf8');
              console.log('Coverage report content length:', coverageReport.length);
            } catch (err) {
              console.log('Error reading coverage report:', err.message);
              coverageReport = 'Coverage report not available';
            }

            const body = `## 📊 Unit Test Coverage Report: \`${appName}\`

            | Metric | Value |
            |--------|-------|
            | **Overall Coverage** | \`${coverage}%\` ${passFail} |
            | **Threshold** | \`${threshold}%\` |

            ${coverageReport}

            ---
            *Generated by Go PR Analysis workflow*`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.body.includes(`Unit Test Coverage Report: \`${appName}\``)
            );

            if (botComment) {
              console.log('Updating existing comment:', botComment.id);
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
              console.log('Comment updated successfully');
            } else {
              console.log('Creating new comment');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log('Comment created successfully');
            }

      - name: Check coverage threshold
        if: inputs.fail_on_coverage_threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          THRESHOLD=${{ inputs.coverage_threshold }}
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi

      - name: Coverage summary
        working-directory: ${{ matrix.app.working_dir }}
        env:
          APP_NAME: ${{ matrix.app.name }}
          COVERAGE: ${{ steps.coverage.outputs.coverage }}
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          {
            echo "## Coverage Summary: $APP_NAME"
            echo ""
            echo "- **Total Coverage**: ${COVERAGE}%"
            echo "- **Threshold**: ${THRESHOLD}%"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f coverage.txt ]]; then
            {
              echo "### Coverage by Function"
              echo ""
              echo '```'
              go tool cover -func=coverage.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================
  # BUILD VERIFICATION
  # ============================================
  build:
    name: Build (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_build
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Detect Makefile build target
        id: detect-make
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          if [[ -f "Makefile" ]] || [[ -f "makefile" ]] || [[ -f "GNUmakefile" ]]; then
            if make -n build >/dev/null 2>&1; then
              echo "Makefile with 'build' target detected"
              echo "use_make=true" >> "$GITHUB_OUTPUT"
            else
              echo "Makefile exists but no 'build' target found"
              echo "use_make=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Makefile found"
            echo "use_make=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dependencies
        if: steps.detect-make.outputs.use_make != 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: go mod download

      - name: Build (make)
        if: steps.detect-make.outputs.use_make == 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: make build

      - name: Build (go)
        if: steps.detect-make.outputs.use_make != 'true'
        working-directory: ${{ matrix.app.working_dir }}
        run: go build -v ./...

  # ============================================
  # INTEGRATION TESTS
  # ============================================
  integration-tests:
    name: Integration Tests (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_integration_tests
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Run integration tests
        working-directory: ${{ matrix.app.working_dir }}
        run: ${{ inputs.integration_test_command }}

  # ============================================
  # TEST DETERMINISM
  # ============================================
  test-determinism:
    name: Test Determinism (${{ matrix.app.name }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && inputs.enable_test_determinism
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private Go modules
        if: inputs.go_private_modules != ''
        run: |
          git config --global url."https://${{ secrets.MANAGE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.go_private_modules }}

      - name: Run tests ${{ inputs.test_determinism_runs }} times
        working-directory: ${{ matrix.app.working_dir }}
        run: |
          echo "Running tests ${{ inputs.test_determinism_runs }} times to verify determinism..."

          # Always use go test with shuffle for determinism, regardless of Makefile
          # The tests job validates that tests pass; this job validates they're deterministic
          PACKAGES=$(go list ./... | awk '!/\/tests($|\/)/' | awk '!/\/api($|\/)/')
          if [[ -z "$PACKAGES" ]]; then
            echo "No packages found after filtering /tests/ and /api/"
            exit 0
          fi

          for i in $(seq 1 ${{ inputs.test_determinism_runs }}); do
            echo "Run $i/${{ inputs.test_determinism_runs }}"
            if ! echo "$PACKAGES" | xargs go test -count=1 -shuffle=on; then
              echo "Tests failed on run $i"
              exit 1
            fi
          done
          echo "All ${{ inputs.test_determinism_runs }} test runs passed (deterministic)"

  # ============================================
  # NO CHANGES DETECTED
  # ============================================
  no-changes:
    name: No Go Changes
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes != 'true'
    runs-on: ${{ inputs.runner_type }}
    steps:
      - name: Skip
        run: |
          echo "No Go code changes detected in monitored paths."
          echo "Skipping Go analysis workflows."

  # ============================================
  # SLACK NOTIFICATION
  # ============================================
  notify:
    name: Notify
    needs: [detect-changes, lint, security, tests, build, integration-tests, test-determinism]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/slack-notify.yml
    with:
      status: ${{ (needs.lint.result == 'failure' || needs.security.result == 'failure' || needs.tests.result == 'failure' || needs.build.result == 'failure' || needs.integration-tests.result == 'failure' || needs.test-determinism.result == 'failure') && 'failure' || 'success' }}
      workflow_name: "Go PR Analysis"
      failed_jobs: ${{ needs.lint.result == 'failure' && 'Lint, ' || '' }}${{ needs.security.result == 'failure' && 'Security, ' || '' }}${{ needs.tests.result == 'failure' && 'Tests, ' || '' }}${{ needs.build.result == 'failure' && 'Build, ' || '' }}${{ needs.integration-tests.result == 'failure' && 'Integration Tests, ' || '' }}${{ needs.test-determinism.result == 'failure' && 'Test Determinism' || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
