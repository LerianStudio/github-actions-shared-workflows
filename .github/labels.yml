# Label definitions for github-actions-shared-workflows
# Synced automatically by .github/workflows/labels-sync.yml
# Run the workflow manually after adding or changing labels here.

# ── Workflows ──────────────────────────────────────────────────────────────────

- name: workflow
  color: "0075ca"
  description: Changes to one or more reusable workflow files

- name: golang
  color: "00ADD8"
  description: Changes to Go-related workflows

- name: typescript
  color: "3178C6"
  description: Changes to TypeScript or Frontend workflows

- name: security
  color: "e11d48"
  description: Changes to security workflows or vulnerability reporting policy

# ── Change types ───────────────────────────────────────────────────────────────

- name: documentation
  color: "0e8a16"
  description: Improvements or additions to documentation

- name: dependencies
  color: "ededed"
  description: Dependency updates (usually opened by Dependabot)

- name: github-config
  color: "f9d0c4"
  description: Changes to repository configuration (templates, CODEOWNERS, labeler, etc.)

- name: bug
  color: "d73a4a"
  description: Something is not working as expected

- name: enhancement
  color: "a2eeef"
  description: New feature or improvement request

# ── PR size ────────────────────────────────────────────────────────────────────

- name: size/XS
  color: "3CBF00"
  description: "PR changes < 50 lines"

- name: size/S
  color: "5D9801"
  description: "PR changes 50–199 lines"

- name: size/M
  color: "7F7203"
  description: "PR changes 200–499 lines"

- name: size/L
  color: "A14C05"
  description: "PR changes 500–999 lines"

- name: size/XL
  color: "C32607"
  description: "PR changes ≥ 1000 lines — consider splitting"

# ── Triage ─────────────────────────────────────────────────────────────────────

- name: triage
  color: "e4e669"
  description: Needs initial assessment by the DevOps team

- name: skip-changelog
  color: "ffffff"
  description: This change does not need a changelog entry

- name: breaking-change
  color: "b60205"
  description: Callers must update their workflow configuration after this change

# ── Capabilities ──────────────────────────────────────────────────────────────

- name: config
  color: "c5def5"
  description: Changes to repository configuration composite actions (src/config/)

- name: notify
  color: "fbca04"
  description: Changes to notification composite actions (src/notify/)

- name: lint
  color: "7c3aed"
  description: Changes to linting and code quality checks

- name: validate
  color: "1d76db"
  description: Changes to PR validation composite actions (src/validate/)

- name: deployment-matrix
  color: "5319e7"
  description: Changes to the canonical deployment matrix (config/deployment-matrix.yml)

- name: routine
  color: "1f6feb"
  description: Changes to periodic maintenance routines (self-routine.yml and related reusables)

# ── Stale management ──────────────────────────────────────────────────────────

- name: stale
  color: "795548"
  description: No recent activity — will be closed if not updated

- name: no-stale
  color: "fef2c0"
  description: Exempt from stale auto-close

- name: work-in-progress
  color: "fbca04"
  description: Active work — exempt from stale auto-close

- name: pinned
  color: "1d76db"
  description: Pinned discussion/tracker — exempt from stale auto-close
