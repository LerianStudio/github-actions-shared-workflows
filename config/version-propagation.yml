# Version Propagation Matrix
#
# Source of truth for which downstream repositories receive automatic version
# bumps when `LerianStudio/github-actions-shared-workflows` publishes a new
# production release on `main`.
#
# Scope today: rewrite `uses: LerianStudio/github-actions-shared-workflows/...@vX.Y.Z`
# references inside `.github/workflows/*.yml` of each listed repository.
# Nothing else (no input/secret/structure edits).
#
# Layout: repository-keyed map. Each `owner/name` is a key whose value is the
# per-repo configuration block. An empty block (`{}`) means "use all defaults".
# This shape lets us add per-repo specifics later without touching siblings.
#
# Per-repo keys (all optional unless noted):
#   target_branch          branch where the bump is pushed (default `develop`)
#   workflow_files         glob list relative to `.github/workflows/`
#   auto_merge_pr_fallback when push falls back to PR, enable `gh pr merge
#                          --auto --squash` keyed by bump level
#   enabled                false skips the repo without removing the entry
#                          (handy for short-term pauses; default true)
#
# Resolution at runtime (executed by `src/config/version-propagation`):
#   1. Controller fires from `release: published` on this repo's `main`.
#   2. Reads this file at the published tag of shared-workflows.
#   3. For each enabled repo: clone target_branch shallow, rewrite version
#      pins, try direct push; on failure OR when bump is `major`, open a PR.
#   4. Pre-releases (`v*-beta.N` from `develop`) are skipped.
#
# Out of scope (do NOT add here):
#   - Workflow input or secret renames (manual migration only).
#   - Repos not consuming shared-workflows.
#   - Non-workflow files (Dockerfile, go.mod, etc. — Dependabot handles those).

version: 1

defaults:
  target_branch: develop
  workflow_files:
    - "*.yml"
  auto_merge_pr_fallback:
    patch: true
    minor: false
    major: false
  enabled: true

repositories:
  LerianStudio/go-boilerplate-ddd:
    target_branch: main
